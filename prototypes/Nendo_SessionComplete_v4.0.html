.env-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 22%, rgba(0,0,0,0.65) 100%);
  z-index: 2;
  pointer-events: none;
}

.env-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(165deg, rgba(6,8,6,0.68) 0%, rgba(4,6,4,0.46) 50%, rgba(6,8,6,0.72) 100%);
  z-index: 3;
  pointer-events: none;
}

.env-texture {
  position: absolute; inset: 0;
  background: none;
  opacity: 0.025;
  z-index: 4;
  pointer-events: none;
}

/* ── Particle Canvas ── */
#particle-canvas {
  position: absolute; inset: 0;
  z-index: 5;
  pointer-events: none;
}

/* ── UI Layer ── */
.ui-layer {
  position: absolute; inset: 0;
  z-index: 10;
}

/* ── Complete Layout ── */
.complete-layout {
  position: absolute;
  inset: 0 0 44px 0;
  display: flex;
  align-items: center;
}

/* LEFT — Aura orb */
.complete-left {
  flex: 0 0 42%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.aura-orb {
  width: 88px; height: 88px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%,
    rgba(180,225,190,0.92) 0%,
    rgba(122,184,154,0.72) 38%,
    rgba(70,140,100,0.45) 75%,
    rgba(40,90,65,0.2) 100%);
  box-shadow:
    0 0 34px rgba(122,184,154,0.45),
    0 0 68px rgba(122,184,154,0.2);
  animation: orbBreath 3.5s ease-in-out infinite;
}

@keyframes orbBreath {
  0%,100% { transform: scale(1);    box-shadow: 0 0 34px rgba(122,184,154,0.42), 0 0 68px rgba(122,184,154,0.18); }
  50%      { transform: scale(1.07); box-shadow: 0 0 52px rgba(122,184,154,0.62), 0 0 95px rgba(122,184,154,0.28); }
}

/* Floating ring around orb */
.orb-ring {
  position: absolute;
  width: 112px; height: 112px;
  border-radius: 50%;
  border: 0.5px solid rgba(122,184,154,0.2);
  animation: ringPulse 4s ease-in-out infinite;
  pointer-events: none;
}
.orb-ring-2 {
  position: absolute;
  width: 136px; height: 136px;
  border-radius: 50%;
  border: 0.5px solid rgba(122,184,154,0.1);
  animation: ringPulse 4s ease-in-out infinite 1.3s;
  pointer-events: none;
}
@keyframes ringPulse {
  0%,100% { opacity: 0.5; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.04); }
}

.orb-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.aura-stage-label {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(122,184,154,0.5);
}

.aura-stage-name {
  font-family: 'Crimson Pro', serif;
  font-size: 11.5px;
  font-style: italic;
  color: rgba(240,235,224,0.3);
  letter-spacing: 0.04em;
}

/* RIGHT — Results */
.complete-right {
  flex: 1;
  padding: 0 30px 0 4px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0;
}

.complete-label {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.22em;

<script>
var QUOTES = [
  'The still water sees the sky clearly.',
  'Your breath was here before your thoughts.',
  'The warrior who knows stillness strikes with precision.',
  'Each breath is a step on the path. You have taken many today.',
  'Before the blade is drawn, the mind is still.',
  'The ninja does not rush. The ninja arrives.'
];

/* Entrance animation */
(function initComplete(){
  // Count up XP
  var cur = 0, target = 75;
  var xpEl = document.getElementById('complete-xp');
  var iv = setInterval(function(){
    cur = Math.min(cur + 3, target);
    xpEl.textContent = '+' + cur + ' XP';
    if (cur >= target) clearInterval(iv);
  }, 28);

  // Fill XP bar after short delay
  setTimeout(function(){
    document.getElementById('xp-fill').style.width = '62%';
  }, 400);

  // Show quote
  setTimeout(function(){
    var quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    var qEl = document.getElementById('complete-quote');
    qEl.textContent = '"' + quote + '"';
    qEl.classList.add('visible');
  }, 1800);

  // Show return button
  setTimeout(function(){
    document.getElementById('return-btn').classList.add('visible');
  }, 3200);
})();

/* Particle System — celebratory mixed motes */
(function(){
  var canvas = document.getElementById('particle-canvas');
  var ctx    = canvas.getContext('2d');
  var W = 844, H = 390;
  var COLOURS = [
    [122,184,154],  /* green */
    [200,175,110],  /* gold */
    [180,220,190],  /* light green */
    [240,235,224],  /* cream */
  ];
  var N = 28;
  var motes = [];
  function rand(a,b){ return a + Math.random()*(b-a); }
  function mk(){
    var c = COLOURS[Math.floor(Math.random()*COLOURS.length)];
    return { x:rand(0,W), y:rand(H*0.1,H), vy:rand(-0.22,-0.06), vx:rand(-0.06,0.06),
             r:rand(0.4,1.5), life:rand(0,1), sp:rand(0.003,0.007), c:c };
  }
  for(var i=0;i<N;i++){ motes.push(mk()); motes[i].life=Math.random(); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    motes.forEach(function(m){
      m.life+=m.sp; if(m.life>1){ Object.assign(m,mk()); m.life=0; }
      var a=m.life<0.15?m.life/0.15:m.life>0.75?1-(m.life-0.75)/0.25:1; a*=0.45;
      m.x+=m.vx; m.y+=m.vy;
      var g=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.r*2.5);
      g.addColorStop(0,'rgba('+m.c[0]+','+m.c[1]+','+m.c[2]+','+a+')');
      g.addColorStop(1,'rgba('+m.c[0]+','+m.c[1]+','+m.c[2]+',0)');
      ctx.beginPath(); ctx.arc(m.x,m.y,m.r*2.5,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
