<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Display — Prototype v1.3</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#0A0A12;
  font-family:'Crimson Pro',serif;
  color:rgba(245,240,232,0.85);
  overflow:hidden;
}

/* ══════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════ */
.page{
  display:flex;
  width:100%;height:100%;
  padding:24px;
  gap:32px;
}
.aura-stage{
  flex:0 0 340px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}
.controls{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:20px;
  max-width:440px;
}

/* ══════════════════════════════════════
   AVATAR
   ══════════════════════════════════════ */
.avatar-container{
  position:relative;
  width:220px;
  height:320px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.avatar-body{
  width:88px;
  height:220px;
  border-radius:44px 44px 18px 18px;
  background:linear-gradient(180deg, rgba(60,60,80,0.15) 0%, rgba(40,40,60,0.1) 100%);
  border:0.5px solid rgba(245,240,232,0.12);
  position:relative;
  z-index:10;
  transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1), border-color 0.8s ease;
}
.avatar-body::before{
  content:'';
  position:absolute;
  top:-30px; left:50%;
  transform:translateX(-50%);
  width:44px; height:44px;
  border-radius:50%;
  background:rgba(60,60,80,0.12);
  border:0.5px solid rgba(245,240,232,0.1);
}

/* ══════════════════════════════════════
   AURA LAYERS
   ══════════════════════════════════════ */
.aura-layer{
  position:absolute;
  pointer-events:none;
  z-index:1;
  transition: opacity 0.8s ease, box-shadow 1.2s ease, background 1.2s ease, transform 0.6s ease;
}
.aura-L1{ inset:20%; border-radius:46px 46px 22px 22px; }
.aura-L2{ inset:10%; border-radius:52px 52px 28px 28px; }
.aura-L3{ inset:0%;  border-radius:58px 58px 34px 34px; }
.aura-L4{ inset:-12%; border-radius:66px 66px 40px 40px; }
.aura-L5{ inset:-26%; border-radius:78px 78px 50px 50px; }

/* Default breathing */
.aura-breathe-1{ animation: auraBreathe1 4.0s ease-in-out infinite; }
.aura-breathe-2{ animation: auraBreathe2 5.2s ease-in-out infinite; }
.aura-breathe-3{ animation: auraBreathe3 6.5s ease-in-out infinite; }
.aura-breathe-4{ animation: auraBreathe4 7.8s ease-in-out infinite; }
.aura-breathe-5{ animation: auraBreathe5 9.0s ease-in-out infinite; }

@keyframes auraBreathe1{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
@keyframes auraBreathe2{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
@keyframes auraBreathe3{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
@keyframes auraBreathe4{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes auraBreathe5{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

/* Surge breathing (80%+) */
.aura-surge-1{ animation: auraSurge1 2.4s ease-in-out infinite; }
.aura-surge-2{ animation: auraSurge2 3.0s ease-in-out infinite; }
.aura-surge-3{ animation: auraSurge3 3.6s ease-in-out infinite; }
.aura-surge-4{ animation: auraSurge4 4.2s ease-in-out infinite; }
.aura-surge-5{ animation: auraSurge5 4.8s ease-in-out infinite; }

@keyframes auraSurge1{ 0%,100%{transform:scale(1)} 35%{transform:scale(1.06)} 65%{transform:scale(0.98)} }
@keyframes auraSurge2{ 0%,100%{transform:scale(1)} 40%{transform:scale(1.09)} 70%{transform:scale(0.97)} }
@keyframes auraSurge3{ 0%,100%{transform:scale(1)} 30%{transform:scale(1.10)} 60%{transform:scale(0.96)} }
@keyframes auraSurge4{ 0%,100%{transform:scale(1)} 45%{transform:scale(1.13)} 75%{transform:scale(0.95)} }
@keyframes auraSurge5{ 0%,100%{transform:scale(1)} 35%{transform:scale(1.16)} 65%{transform:scale(0.94)} }

/* Corona ring (80%+) */
.corona-ring{
  position:absolute;
  inset:-34%;
  border-radius:80px 80px 52px 52px;
  pointer-events:none; z-index:2;
  opacity:0;
  transition:opacity 1.0s ease, border-color 1.0s ease, box-shadow 1.0s ease;
  border:1px solid transparent;
}
.corona-ring.active{
  opacity:1;
  animation:coronaPulse 2.8s ease-in-out infinite;
}
@keyframes coronaPulse{ 0%,100%{transform:scale(1);opacity:0.6} 50%{transform:scale(1.04);opacity:1} }

/* ── Rim-light layer (dark stages 10–13) ── */
.rim-light{
  position:absolute;
  inset:18%;
  border-radius:48px 48px 20px 20px;
  pointer-events:none;
  z-index:9; /* just behind avatar */
  opacity:0;
  transition:opacity 1.0s ease, box-shadow 1.0s ease;
}

/* ── Mote canvas (floating particles) ── */
.mote-canvas{
  position:absolute;
  inset:-30%;
  pointer-events:none;
  z-index:3;
}

/* ── Colour bleed layer (90%+ next-stage preview) ── */
.bleed-layer{
  position:absolute;
  inset:-20%;
  border-radius:74px 74px 46px 46px;
  pointer-events:none;
  z-index:0;
  opacity:0;
  transition:opacity 1.2s ease, background 1.2s ease;
}

/* ══════════════════════════════════════
   TRANSITION OVERLAY — cinematic level-up
   ══════════════════════════════════════ */
.transition-overlay{
  position:absolute;
  inset:-50%;
  pointer-events:none;
  z-index:25;
  opacity:0;
}
/* Contract ring (squeezes inward) */
.contract-ring{
  position:absolute;
  inset:20%;
  border-radius:50%;
  border:2px solid transparent;
  opacity:0;
  pointer-events:none;
  z-index:26;
}
/* Burst flash */
.burst-flash{
  position:absolute;
  inset:-40%;
  border-radius:50%;
  pointer-events:none;
  z-index:27;
  opacity:0;
}

/* ══════════════════════════════════════
   STAGE INFO
   ══════════════════════════════════════ */
.stage-info{
  text-align:center;
  margin-top:16px;
  z-index:10;
}
.stage-name{
  font-family:'Cinzel',serif;
  font-size:16px; font-weight:600;
  letter-spacing:0.1em;
  margin-bottom:2px;
  transition:color 0.8s ease;
}
.stage-phase{
  font-family:'Cinzel',serif;
  font-size:8px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:rgba(245,240,232,0.25);
}
.stage-meaning{
  font-size:12px; font-style:italic;
  color:rgba(245,240,232,0.35);
  margin-top:6px; max-width:260px; line-height:1.5;
}
.surge-label{
  font-family:'Cinzel',serif;
  font-size:7px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  margin-top:6px;
  opacity:0;
  transition:opacity 0.8s ease, color 0.8s ease;
}
.surge-label.visible{ opacity:1; }

/* ══════════════════════════════════════
   XP BAR
   ══════════════════════════════════════ */
.xp-bar-wrap{
  width:100%; max-width:260px;
  margin-top:12px; z-index:10;
}
.xp-bar-track{
  width:100%; height:3px;
  background:rgba(245,240,232,0.06);
  border-radius:2px; overflow:hidden;
  position:relative;
}
.xp-bar-fill{
  height:100%; border-radius:2px;
  transition:width 0.6s ease, background 0.8s ease;
}
.xp-bar-shimmer{
  position:absolute; top:0;right:0;bottom:0;
  width:0%; border-radius:2px;
  opacity:0;
  transition:opacity 0.6s ease;
  pointer-events:none;
}
.xp-bar-shimmer.active{
  opacity:1;
  animation:barShimmer 1.8s ease-in-out infinite;
}
@keyframes barShimmer{ 0%,100%{opacity:0.4} 50%{opacity:0.9} }

.xp-bar-label{
  display:flex; justify-content:space-between; margin-top:4px;
}
.xp-bar-label span{
  font-family:'Cinzel',serif;
  font-size:8px; letter-spacing:0.12em;
  color:rgba(245,240,232,0.2);
}

/* ══════════════════════════════════════
   CONTROLS
   ══════════════════════════════════════ */
.ctrl-section{ margin-bottom:8px; }
.ctrl-label{
  font-family:'Cinzel',serif; font-size:9px;
  letter-spacing:0.18em; text-transform:uppercase;
  color:rgba(245,240,232,0.3); margin-bottom:8px;
}
.ctrl-value{
  font-family:'Cinzel',serif; font-size:11px;
  letter-spacing:0.06em; color:rgba(245,240,232,0.6);
  float:right;
}
input[type=range]{
  -webkit-appearance:none; appearance:none;
  width:100%; height:2px;
  background:rgba(245,240,232,0.1);
  border-radius:1px; outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px; border-radius:50%;
  background:rgba(245,240,232,0.6);
  border:1px solid rgba(245,240,232,0.15);
  cursor:grab; transition:background 0.3s;
}
input[type=range]::-webkit-slider-thumb:hover{ background:rgba(245,240,232,0.85); }

.stage-selector{ display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
.stage-dot{
  width:28px;height:28px; border-radius:50%;
  cursor:pointer; border:1.5px solid transparent;
  transition:transform 0.15s ease, border-color 0.3s ease;
  position:relative;
}
.stage-dot:hover{ transform:scale(1.12); }
.stage-dot.active{ border-color:rgba(245,240,232,0.5); transform:scale(1.15); }
.stage-dot-num{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif; font-size:7px; font-weight:700;
  pointer-events:none;
}

.detail-readout{
  padding:14px 18px;
  border:0.5px solid rgba(245,240,232,0.06);
  border-radius:10px; background:rgba(245,240,232,0.02);
}
.readout-row{
  display:flex; justify-content:space-between;
  align-items:center; padding:4px 0;
}
.readout-key{
  font-family:'Cinzel',serif; font-size:8px;
  letter-spacing:0.14em; text-transform:uppercase;
  color:rgba(245,240,232,0.25);
}
.readout-val{
  font-size:12px; color:rgba(245,240,232,0.55); font-style:italic;
}

/* Responsive */
@media (max-width:700px){
  .page{ flex-direction:column; padding:16px; gap:16px; overflow-y:auto; }
  .aura-stage{ flex:none; }
  .controls{ max-width:100%; }
}
</style>
</head>
<body>

<div class="page">
  <div class="aura-stage">
    <div class="avatar-container" id="avatar-container">
      <!-- Colour bleed (behind everything) -->
      <div class="bleed-layer" id="bleed"></div>
      <!-- Aura layers -->
      <div class="aura-layer aura-L5 aura-breathe-5" id="aL5"></div>
      <div class="aura-layer aura-L4 aura-breathe-4" id="aL4"></div>
      <div class="aura-layer aura-L3 aura-breathe-3" id="aL3"></div>
      <div class="aura-layer aura-L2 aura-breathe-2" id="aL2"></div>
      <div class="aura-layer aura-L1 aura-breathe-1" id="aL1"></div>
      <!-- Corona ring -->
      <div class="corona-ring" id="corona"></div>
      <!-- Rim light (dark stages) -->
      <div class="rim-light" id="rim-light"></div>
      <!-- Mote canvas -->
      <canvas class="mote-canvas" id="mote-canvas"></canvas>
      <!-- Avatar -->
      <div class="avatar-body" id="avatar-body"></div>
      <!-- Transition elements -->
      <div class="contract-ring" id="contract-ring"></div>
      <div class="burst-flash" id="burst-flash"></div>
    </div>

    <div class="stage-info">
      <div class="stage-name" id="info-name">Tomoshibi</div>
      <div class="stage-phase" id="info-phase">Phase 1 · Kindling</div>
      <div class="stage-meaning" id="info-meaning">A single small flame — the first flicker of awareness</div>
      <div class="surge-label" id="surge-label">Aura surging</div>
    </div>

    <div class="xp-bar-wrap">
      <div class="xp-bar-track">
        <div class="xp-bar-fill" id="xp-fill"></div>
        <div class="xp-bar-shimmer" id="xp-shimmer"></div>
      </div>
      <div class="xp-bar-label">
        <span id="xp-label-left">0 XP</span>
        <span id="xp-label-right">Stage 2 →</span>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-section">
      <div class="ctrl-label">Aura Stage <span class="ctrl-value" id="ctrl-stage-val">1 — Tomoshibi</span></div>
      <div class="stage-selector" id="stage-selector"></div>
    </div>
    <div class="ctrl-section">
      <div class="ctrl-label">XP within stage <span class="ctrl-value" id="ctrl-xp-val">50%</span></div>
      <input type="range" id="xp-slider" min="0" max="100" value="50">
    </div>
    <div class="ctrl-section">
      <div class="ctrl-label">Simulate Level-Up</div>
      <button id="btn-levelup" style="
        font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.12em;
        text-transform:uppercase;color:rgba(245,240,232,0.6);
        background:rgba(245,240,232,0.06);border:0.5px solid rgba(245,240,232,0.1);
        border-radius:6px;padding:8px 20px;cursor:pointer;
        transition:background 0.2s,color 0.2s;
      ">Advance to next stage →</button>
    </div>
    <div class="detail-readout">
      <div class="readout-row">
        <span class="readout-key">Aura colour</span>
        <span class="readout-val" id="r-hex">#FAF6EE</span>
      </div>
      <div class="readout-row">
        <span class="readout-key">Density</span>
        <span class="readout-val" id="r-density">50%</span>
      </div>
      <div class="readout-row">
        <span class="readout-key">Active layers</span>
        <span class="readout-val" id="r-layers">3 of 5</span>
      </div>
      <div class="readout-row">
        <span class="readout-key">State</span>
        <span class="readout-val" id="r-state">Normal</span>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   STAGE DATA
   ══════════════════════════════════════════════════════ */
const STAGES = [
  { name:'Tomoshibi', phase:'Phase 1 · Kindling', meaning:'A single small flame — the first flicker of awareness',
    hex:'#FAF6EE', rgb:[250,246,238] },
  { name:'Hikari', phase:'Phase 1 · Kindling', meaning:'Warm light — the aura becomes visible for the first time',
    hex:'#F5EDD0', rgb:[245,237,208] },
  { name:'Kogane', phase:'Phase 2 · Rising', meaning:'Gold — energy builds, the aura warms and brightens',
    hex:'#F0D060', rgb:[240,208,96] },
  { name:'Kohaku', phase:'Phase 2 · Rising', meaning:'Amber — the gold deepens, intention strengthens',
    hex:'#E8B830', rgb:[232,184,48] },
  { name:'Kagayaki', phase:'Phase 2 · Rising', meaning:'Radiance — the aura is visible at a distance',
    hex:'#D89018', rgb:[216,144,24] },
  { name:'Moeru', phase:'Phase 2 · Rising', meaning:'Smouldering — heat building toward combustion',
    hex:'#C86C08', rgb:[200,108,8] },
  { name:'Akane', phase:'Phase 3 · Burning', meaning:'Red-orange — fire finding its true form',
    hex:'#C05020', rgb:[192,80,32] },
  { name:'Honoo', phase:'Phase 3 · Burning', meaning:'Full flame — total combustion, nothing held back',
    hex:'#A83018', rgb:[168,48,24] },
  { name:'Homura', phase:'Phase 3 · Burning', meaning:'Blaze — the fire at its most intense',
    hex:'#8A1A10', rgb:[138,26,16] },
  { name:'Shinku', phase:'Phase 3 · Burning', meaning:'Deep crimson — fire condensing into mastery',
    hex:'#6A0808', rgb:[106,8,8] },
  { name:'Kurenai', phase:'Phase 4 · Forging', meaning:'Ancient crimson bleeding toward violet — power transforming',
    hex:'#4A0A28', rgb:[74,10,40] },
  { name:'Tasogare', phase:'Phase 4 · Forging', meaning:'Twilight — the moment between fire and something beyond',
    hex:'#2A0535', rgb:[42,5,53] },
  { name:'—', phase:'Stage 13 · Alone', meaning:'No name has been given to this stage. Those who reach it do not need one.',
    hex:'#1A0535', rgb:[26,5,53] },
];

const DISPLAY_COLORS = [
  '#FAF6EE','#F5EDD0','#F0D060','#E8B830','#D89018','#C86C08',
  '#C05020','#A83018','#8A1A10','#9A4040','#A04070','#9050B0','#B060FF'
];

/* Brighter glow RGB for visibility */
const GLOW_RGB = [
  [250,246,238],[245,237,208],[240,208,96],[232,184,48],
  [216,144,24],[200,108,8],[192,80,32],[168,48,24],
  [168,50,30],[160,64,64],[160,64,112],[144,80,176],
  [176,96,255]
];

/* Rim-light RGB — bright edge colour for dark stages */
const RIM_RGB = [
  null,null,null,null,null,null,null,null,null,
  [220,90,90],    // Shinku  — warm crimson edge
  [200,80,140],   // Kurenai — rose-violet edge
  [170,100,210],  // Tasogare — violet edge
  [200,130,255],  // Stage 13 — bright violet edge
];

/* ══════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════ */
let currentStage = 0;
let currentXP    = 50;
let isSurging    = false;
let isTransitioning = false;

/* ══════════════════════════════════════════════════════
   DENSITY  (unchanged from v1.1)
   ══════════════════════════════════════════════════════ */
function densityFromXP(xp, stageIndex) {
  const raw = 1 - Math.pow(1 - xp / 100, 2);
  return stageIndex === 0
    ? 0.15 + raw * 0.85
    : 0.25 + raw * 0.75;
}

/* ══════════════════════════════════════════════════════
   SURGE MODE  (80%+)
   ══════════════════════════════════════════════════════ */
function setSurgeMode(active) {
  if (active === isSurging) return;
  isSurging = active;

  const layers = [
    document.getElementById('aL1'),
    document.getElementById('aL2'),
    document.getElementById('aL3'),
    document.getElementById('aL4'),
    document.getElementById('aL5'),
  ];

  layers.forEach((el, i) => {
    const n = 'aura-breathe-' + (i+1);
    const s = 'aura-surge-'   + (i+1);
    el.classList.remove(active ? n : s);
    el.classList.add(active ? s : n);
  });

  document.getElementById('corona').classList.toggle('active', active);
  document.getElementById('surge-label').classList.toggle('visible', active);
  document.getElementById('xp-shimmer').classList.toggle('active', active);
}

/* ══════════════════════════════════════════════════════
   FLOATING MOTES — canvas-based particles
   Sparse embers that drift upward around the aura.
   Count scales with density: 0 at low, up to 18 at max.
   ══════════════════════════════════════════════════════ */
const moteCanvas = document.getElementById('mote-canvas');
const mCtx = moteCanvas.getContext('2d');
let motes = [];
let moteRaf;

function initMoteCanvas() {
  const rect = moteCanvas.parentElement.getBoundingClientRect();
  moteCanvas.width  = rect.width * 1.6;
  moteCanvas.height = rect.height * 1.6;
}

function spawnMotes(count, r, g, b) {
  const w = moteCanvas.width;
  const h = moteCanvas.height;
  const cx = w / 2;
  const cy = h / 2;

  // Keep existing motes that are still alive, trim excess
  while (motes.length > count) motes.pop();

  // Spawn new motes to reach target count
  while (motes.length < count) {
    const angle = Math.random() * Math.PI * 2;
    const radius = 40 + Math.random() * 80;
    motes.push({
      x: cx + Math.cos(angle) * radius,
      y: cy + Math.sin(angle) * radius,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -(0.2 + Math.random() * 0.5),         // drift upward
      size: 1 + Math.random() * 2.5,
      life: Math.random(),                        // 0–1 lifecycle
      speed: 0.003 + Math.random() * 0.004,
      r, g, b,
      maxOpacity: 0.25 + Math.random() * 0.35,
    });
  }

  // Update colour on existing motes
  motes.forEach(m => { m.r = r; m.g = g; m.b = b; });
}

function tickMotes() {
  mCtx.clearRect(0, 0, moteCanvas.width, moteCanvas.height);
  const cx = moteCanvas.width / 2;
  const cy = moteCanvas.height / 2;

  motes.forEach(m => {
    m.life += m.speed;
    if (m.life > 1) {
      // Respawn at bottom-ish area
      const angle = Math.random() * Math.PI * 2;
      const radius = 30 + Math.random() * 70;
      m.x = cx + Math.cos(angle) * radius;
      m.y = cy + Math.sin(angle) * (radius * 0.6) + 30;
      m.life = 0;
    }

    m.x += m.vx + Math.sin(m.life * Math.PI * 4) * 0.15;
    m.y += m.vy;

    // Fade in then out over lifecycle
    const fade = m.life < 0.2
      ? m.life / 0.2
      : m.life > 0.75
        ? (1 - m.life) / 0.25
        : 1;
    const alpha = fade * m.maxOpacity;

    mCtx.beginPath();
    mCtx.arc(m.x, m.y, m.size, 0, Math.PI * 2);
    mCtx.fillStyle = `rgba(${m.r},${m.g},${m.b},${alpha})`;
    mCtx.fill();

    // Tiny glow
    mCtx.beginPath();
    mCtx.arc(m.x, m.y, m.size * 3, 0, Math.PI * 2);
    mCtx.fillStyle = `rgba(${m.r},${m.g},${m.b},${alpha * 0.15})`;
    mCtx.fill();
  });

  moteRaf = requestAnimationFrame(tickMotes);
}

/* ══════════════════════════════════════════════════════
   MAIN RENDER
   ══════════════════════════════════════════════════════ */
function updateAura() {
  const s   = STAGES[currentStage];
  const [r,g,b] = GLOW_RGB[currentStage];
  const d   = densityFromXP(currentXP, currentStage);
  const isDark = currentStage >= 9;

  // ── Surge ──
  setSurgeMode(currentXP >= 80);
  const surgeBoost = isSurging ? 1.25 : 1.0;

  // ── Aura layers ──
  const thresholds = [0.0, 0.15, 0.35, 0.55, 0.75];
  const layers = ['aL1','aL2','aL3','aL4','aL5'].map(id => document.getElementById(id));

  let activeLayers = 0;
  layers.forEach((el, i) => {
    const t = thresholds[i];
    if (d >= t) {
      activeLayers++;
      const progress = Math.min((d - t) / (1 - t), 1);
      const maxOp = [0.40, 0.28, 0.18, 0.10, 0.06][i];
      const op = progress * maxOp * surgeBoost;
      const spread = [8,14,22,32,44][i] * (0.4 + progress * 0.6) * surgeBoost;
      const blur   = [12,20,30,44,60][i] * (0.5 + progress * 0.5) * surgeBoost;

      el.style.opacity = '1';
      el.style.background = `radial-gradient(ellipse at 50% 45%, rgba(${r},${g},${b},${op}) 0%, rgba(${r},${g},${b},${op*0.3}) 60%, transparent 100%)`;
      el.style.boxShadow = `0 0 ${blur}px ${spread}px rgba(${r},${g},${b},${op*0.7})`;
    } else {
      el.style.opacity = '0';
      el.style.background = 'none';
      el.style.boxShadow = 'none';
    }
  });

  // ── Rim light (dark stages only) ──
  const rim = document.getElementById('rim-light');
  if (isDark && RIM_RGB[currentStage]) {
    const [rr,rg,rb] = RIM_RGB[currentStage];
    const rimOp = 0.15 + d * 0.35;
    const rimSpread = 4 + d * 12;
    const rimBlur   = 10 + d * 20;
    rim.style.opacity = '1';
    rim.style.background = 'none';
    rim.style.boxShadow = `0 0 ${rimBlur}px ${rimSpread}px rgba(${rr},${rg},${rb},${rimOp * 0.3}), inset 0 0 ${rimBlur * 0.6}px rgba(${rr},${rg},${rb},${rimOp * 0.5})`;
    rim.style.border = `0.5px solid rgba(${rr},${rg},${rb},${rimOp * 0.4})`;
  } else {
    rim.style.opacity = '0';
    rim.style.boxShadow = 'none';
    rim.style.border = 'none';
  }

  // ── Colour bleed (90%+, next stage preview) ──
  const bleed = document.getElementById('bleed');
  if (currentXP >= 90 && currentStage < 12) {
    const next = GLOW_RGB[currentStage + 1];
    const bleedStrength = (currentXP - 90) / 10; // 0→1 over 90–100%
    const bleedOp = bleedStrength * 0.12;
    bleed.style.opacity = '1';
    bleed.style.background = `radial-gradient(ellipse at 50% 45%, transparent 40%, rgba(${next[0]},${next[1]},${next[2]},${bleedOp}) 70%, rgba(${next[0]},${next[1]},${next[2]},${bleedOp * 0.5}) 100%)`;
  } else {
    bleed.style.opacity = '0';
  }

  // ── Corona ring colour ──
  const corona = document.getElementById('corona');
  corona.style.borderColor = `rgba(${r},${g},${b},0.2)`;
  corona.style.boxShadow = `0 0 30px 8px rgba(${r},${g},${b},0.08), inset 0 0 20px rgba(${r},${g},${b},0.04)`;

  // ── Avatar body tint ──
  const bodyTint = d * 0.12;
  const body = document.getElementById('avatar-body');
  body.style.background = `linear-gradient(180deg, rgba(${r},${g},${b},${bodyTint+0.03}) 0%, rgba(${r},${g},${b},${bodyTint*0.5}) 100%)`;
  body.style.borderColor = `rgba(${r},${g},${b},${0.1+d*0.2})`;

  // ── Motes — count scales with density ──
  // Below 40% density: no motes. 40–100%: 0→18 motes.
  const moteCount = d < 0.4 ? 0 : Math.round((d - 0.4) / 0.6 * 18);
  spawnMotes(moteCount, r, g, b);

  // ── UI updates ──
  document.getElementById('info-name').textContent = s.name;
  document.getElementById('info-name').style.color = DISPLAY_COLORS[currentStage];
  document.getElementById('info-phase').textContent = s.phase;
  document.getElementById('info-meaning').textContent = s.meaning;
  document.getElementById('surge-label').style.color = DISPLAY_COLORS[currentStage];

  const fill = document.getElementById('xp-fill');
  fill.style.width = currentXP + '%';
  fill.style.background = `linear-gradient(90deg, rgba(${r},${g},${b},0.5), rgba(${r},${g},${b},0.8))`;

  const shimmer = document.getElementById('xp-shimmer');
  shimmer.style.width = '20%';
  shimmer.style.background = `linear-gradient(90deg, transparent, rgba(${r},${g},${b},0.4))`;

  document.getElementById('xp-label-left').textContent = currentXP + '% XP';
  document.getElementById('xp-label-right').textContent = currentStage < 12
    ? 'Stage ' + (currentStage + 2) + ' →'
    : '— · —';

  document.getElementById('ctrl-stage-val').textContent = (currentStage+1) + ' — ' + s.name;
  document.getElementById('ctrl-xp-val').textContent = currentXP + '%';
  document.getElementById('r-hex').textContent = s.hex;
  document.getElementById('r-density').textContent = Math.round(d * 100) + '%';
  document.getElementById('r-layers').textContent = activeLayers + ' of 5';

  let stateLabel = 'Normal';
  if (currentXP >= 90) stateLabel = 'Surging · Bleeding';
  else if (currentXP >= 80) stateLabel = 'Surging';
  else if (d < 0.3) stateLabel = 'Faint';
  else if (d < 0.55) stateLabel = 'Gentle';
  else stateLabel = 'Strong';
  document.getElementById('r-state').textContent = stateLabel;

  document.querySelectorAll('.stage-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === currentStage);
  });
}

/* ══════════════════════════════════════════════════════
   CINEMATIC LEVEL-UP  v1.3

   Sequence (total ~1.6s):
   0ms    — Breathing halts, layers begin contracting
   300ms  — Aura fully contracted against avatar
   500ms  — Bright burst flash from center
   600ms  — Stage changes, new colour at 0% XP
   900ms  — Aura expands outward in new colour
   1400ms — Normal breathing resumes
   ══════════════════════════════════════════════════════ */
function triggerLevelUp() {
  if (currentStage >= 12 || isTransitioning) return;
  isTransitioning = true;

  const oldRGB = GLOW_RGB[currentStage];
  const newRGB = GLOW_RGB[currentStage + 1];
  const layers = ['aL1','aL2','aL3','aL4','aL5'].map(id => document.getElementById(id));
  const body   = document.getElementById('avatar-body');
  const contractRing = document.getElementById('contract-ring');
  const burstFlash   = document.getElementById('burst-flash');

  // ── Phase 1: Contract (0–300ms) ──
  // Kill breathing animations temporarily
  layers.forEach(el => {
    el.style.animation = 'none';
    el.classList.remove('aura-breathe-1','aura-breathe-2','aura-breathe-3','aura-breathe-4','aura-breathe-5');
    el.classList.remove('aura-surge-1','aura-surge-2','aura-surge-3','aura-surge-4','aura-surge-5');
  });

  // Contract all layers inward
  layers.forEach((el, i) => {
    el.style.transition = 'all 0.3s cubic-bezier(0.6,0,0.4,1)';
    const contractInset = 30 + i * 2;
    el.style.inset = contractInset + '%';
    el.style.opacity = String(0.6 - i * 0.1);
  });

  // Contract ring appears squeezing inward
  contractRing.style.transition = 'all 0.3s ease-in';
  contractRing.style.inset = '25%';
  contractRing.style.opacity = '0.6';
  contractRing.style.borderColor = `rgba(${oldRGB[0]},${oldRGB[1]},${oldRGB[2]},0.5)`;
  contractRing.style.boxShadow = `inset 0 0 20px rgba(${oldRGB[0]},${oldRGB[1]},${oldRGB[2]},0.3)`;

  // ── Phase 2: Hold + Burst (300–600ms) ──
  setTimeout(() => {
    // Contract ring squeezes tight
    contractRing.style.transition = 'all 0.2s ease-in';
    contractRing.style.inset = '32%';
    contractRing.style.opacity = '1';

    // Burst flash
    setTimeout(() => {
      burstFlash.style.transition = 'none';
      burstFlash.style.opacity = '0.8';
      burstFlash.style.transform = 'scale(0.5)';
      burstFlash.style.background = `radial-gradient(circle, rgba(255,255,255,0.5) 0%, rgba(${newRGB[0]},${newRGB[1]},${newRGB[2]},0.3) 40%, transparent 70%)`;

      // Expand burst
      requestAnimationFrame(() => {
        burstFlash.style.transition = 'all 0.5s ease-out';
        burstFlash.style.opacity = '0';
        burstFlash.style.transform = 'scale(2)';
      });

      // Kill contract ring
      contractRing.style.transition = 'opacity 0.2s';
      contractRing.style.opacity = '0';
    }, 200);
  }, 300);

  // ── Phase 3: Stage change + Expand (600ms) ──
  setTimeout(() => {
    // Change stage
    currentStage++;
    currentXP = 0;
    isSurging = false;
    document.getElementById('xp-slider').value = 0;

    // Reset layer insets to originals
    const insets = ['20%','10%','0%','-12%','-26%'];
    layers.forEach((el, i) => {
      el.style.transition = 'all 0.5s cubic-bezier(0.34,1.56,0.64,1)';
      el.style.inset = insets[i];
    });

    // Update aura colours
    updateAura();
  }, 600);

  // ── Phase 4: Restore breathing (1400ms) ──
  setTimeout(() => {
    const layers2 = ['aL1','aL2','aL3','aL4','aL5'].map(id => document.getElementById(id));
    layers2.forEach((el, i) => {
      el.style.animation = '';
      el.style.transition = 'opacity 0.8s ease, box-shadow 1.2s ease, background 1.2s ease, transform 0.6s ease';
      el.classList.add('aura-breathe-' + (i+1));
    });

    // Clean up transition elements
    contractRing.style.inset = '20%';
    burstFlash.style.transition = 'none';
    burstFlash.style.opacity = '0';

    isTransitioning = false;
  }, 1400);
}

/* ══════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════ */
function init() {
  initMoteCanvas();

  const sel = document.getElementById('stage-selector');
  STAGES.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'stage-dot';
    dot.style.background = s.hex;
    if (i >= 9) dot.style.boxShadow = 'inset 0 0 0 1px rgba(180,80,255,0.25)';

    const num = document.createElement('div');
    num.className = 'stage-dot-num';
    num.textContent = i + 1;
    num.style.color = i < 6 ? 'rgba(10,10,18,0.5)' : 'rgba(245,240,232,0.4)';
    dot.appendChild(num);

    dot.addEventListener('click', () => {
      if (isTransitioning) return;
      currentStage = i;
      updateAura();
    });
    sel.appendChild(dot);
  });

  document.getElementById('xp-slider').addEventListener('input', (e) => {
    if (isTransitioning) return;
    currentXP = parseInt(e.target.value);
    updateAura();
  });

  document.getElementById('btn-levelup').addEventListener('click', triggerLevelUp);

  const btn = document.getElementById('btn-levelup');
  btn.addEventListener('mouseenter', () => { btn.style.background = 'rgba(245,240,232,0.1)'; btn.style.color = 'rgba(245,240,232,0.85)'; });
  btn.addEventListener('mouseleave', () => { btn.style.background = 'rgba(245,240,232,0.06)'; btn.style.color = 'rgba(245,240,232,0.6)'; });

  // Resize handler for mote canvas
  window.addEventListener('resize', initMoteCanvas);

  updateAura();
  tickMotes();
}

init();
</script>
