<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ninja Learning â Student Profile</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{
  width:100%;height:100%;
  overflow:hidden;
  /* Force landscape on mobile */
  min-height:100vw;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  background:#061006;color:#f0f0f0;
  font-size:16px;line-height:1.5;
  width:100%;height:100%;
  overflow:hidden;
  /* Landscape enforcement */
  display:flex;flex-direction:column;
}
/* ââ CSS VARIABLES ââ */
:root{
  --bg:#f4f4f0;--surf:#fff;--surf2:#f8f8f5;--bdr:#e0e0d8;--bdr2:#ccc;
  --tx:#1a1a2e;--tx2:#555;--tx3:#999;
  --gold:#B8720F;--gb:#FAEEDA;--gt:#5C3205;
  --grn:#1B4D2E;--gnb:#E0F0E8;--gnt:#1B4D2E;
  --red:#6B1A1A;--rb:#F5E0E0;--rt:#6B1A1A;
  --blu:#0C447C;--bb:#E6F1FB;--bt:#0C447C;
  --r:10px;--rs:6px;
  --dk:#0c1f0c;--dk2:#091609;--dk3:#061006;
  --gold-warm:#d4882a;--xp-fill:#5acd30;
}

/* ââ FIXED LANDSCAPE SHELL ââ */
.shell{
  position:fixed;top:0;left:0;
  width:100vw;height:100vh;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* ââ VILLAGE BG ââ */
.village-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.v-layer{position:absolute;inset:0;width:100%;height:100%;}

/* ââ SCREEN SYSTEM ââ */
.scr{display:none;position:absolute;inset:0;z-index:1;}
.scr.on{display:flex;}

/* ââââââââââââââââââââââââââââââââââââââââââ
   PROFILE SCREEN â true landscape layout
ââââââââââââââââââââââââââââââââââââââââââ */
.profile-wrap{
  width:100%;height:100%;
  display:flex;flex-direction:row;
  overflow:hidden;
}

/* ââ AVATAR COLUMN 38.2% ââ */
.avatar-col{
  width:38.2%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding:0 0 3% 0;gap:8px;
  position:relative;z-index:3;flex-shrink:0;
}
.avatar-fig{
  width:52%;aspect-ratio:1/1.75;
  background:rgba(255,255,255,0.06);
  border:none;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:rgba(255,255,255,0.28);text-align:center;line-height:1.6;
}
.stripes-row{display:flex;gap:7px;align-items:center;}
.belt-badge{
  background:rgba(8,8,8,0.82);border:1px solid rgba(255,255,255,0.16);
  border-radius:12px;padding:8px 14px;
  display:flex;align-items:center;gap:9px;width:84%;
}
.belt-name{font-size:13px;color:#fff;font-weight:700;line-height:1.3;}
.belt-tier{font-size:11px;color:rgba(255,255,255,0.42);}
.stats-strip{display:flex;gap:6px;width:84%;}
.stat-pip{
  flex:1;background:rgba(8,8,8,0.7);border:1px solid rgba(255,255,255,0.12);
  border-radius:9px;padding:6px 4px;text-align:center;
  min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.sp-val{font-size:15px;color:#fff;font-weight:700;}
.sp-key{font-size:10px;color:rgba(255,255,255,0.4);}

/* ââ RIGHT PANEL 61.8% ââ */
.right-panel{
  flex:1;height:100%;display:flex;flex-direction:column;
  padding:10px 16px 10px 4px;gap:8px;
  z-index:3;min-width:0;overflow:hidden;
}
.demo-bar{
  display:flex;gap:6px;background:rgba(255,255,255,0.06);
  border-radius:8px;padding:4px;flex-shrink:0;
}
.demo-btn{
  flex:1;padding:6px 8px;font-size:10px;font-weight:700;
  border-radius:5px;border:none;background:transparent;
  color:rgba(255,255,255,0.38);cursor:pointer;transition:all .12s;text-align:center;
}
.demo-btn.on{background:rgba(90,205,48,0.2);color:#a0e870;border:1px solid rgba(90,205,48,0.3);}
.challenge-banner{
  background:rgba(180,100,0,0.82);border:1px solid rgba(255,180,0,0.5);
  border-radius:10px;padding:9px 12px;
  display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:44px;
}
.cb-dot{width:22px;height:22px;border-radius:50%;background:rgba(255,180,0,0.28);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#ffd700;flex-shrink:0;}
.cb-txt{font-size:11px;color:#fff;line-height:1.4;flex:1;}
.cb-days{font-size:10px;color:#ffd700;font-weight:700;}
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(8,8,8,0.68);border:1px solid rgba(255,255,255,0.11);
  border-radius:10px;padding:8px 14px;flex-shrink:0;min-height:44px;
}
.student-name{font-size:16px;font-weight:700;color:#fff;}
.level-badge{
  background:rgba(212,136,42,0.2);border:1px solid rgba(212,136,42,0.4);
  border-radius:20px;padding:4px 12px;font-size:11px;color:var(--gold-warm);font-weight:700;
}
.xp-row{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.xp-label{font-size:10px;color:rgba(255,255,255,0.38);white-space:nowrap;}
.xp-track{flex:1;height:7px;background:rgba(255,255,255,0.12);border-radius:4px;overflow:hidden;}
.xp-fill-bar{height:100%;border-radius:4px;}
.activity-card{
  background:rgba(8,8,8,0.65);border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;overflow:hidden;
  display:flex;flex-direction:column;flex:0 0 auto;max-height:34%;flex-shrink:0;
}
.card-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.08);}
.card-tab{
  flex:1;padding:8px 0;font-size:11px;text-align:center;
  color:rgba(255,255,255,0.35);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;min-height:36px;
}
.card-tab.on{color:#fff;border-bottom-color:var(--xp-fill);}
.card-body{padding:6px 10px;display:flex;flex-direction:column;gap:5px;overflow:hidden;}
.a-row{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.05);border-radius:7px;
  padding:6px 8px;min-height:34px;
}
.a-ico{width:20px;height:20px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;}
.a-txt{font-size:11px;color:rgba(255,255,255,0.8);flex:1;line-height:1.3;}
.a-meta{font-size:10px;color:rgba(255,255,255,0.38);white-space:nowrap;}

/* ââ NAV BUTTONS â clean, instructor-app style ââ */
.nav-cluster{
  display:flex;justify-content:center;gap:8px;
  margin-top:auto;padding-bottom:4px;flex-shrink:0;
}
.nav-btn{
  flex:1;max-width:110px;
  background:rgba(8,8,8,0.82);border:1.5px solid rgba(255,255,255,0.18);
  border-radius:10px;padding:10px 8px 8px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;transition:all .15s;min-height:60px;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn:active{background:rgba(30,60,20,0.9);transform:scale(0.97);}
.nav-btn.active-page{border-color:var(--xp-fill);background:rgba(20,55,10,0.88);}
.nav-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
.nav-lbl{font-size:11px;color:rgba(255,255,255,0.72);font-weight:700;}
.nav-btn.active-page .nav-lbl{color:#a0e870;}

/* ââââââââââââââââââââââââââââââââââââââââââ
   SLIDE PAGES â fixed overlay
ââââââââââââââââââââââââââââââââââââââââââ */
.slide-page{
  position:fixed;inset:0;z-index:10;
  background:var(--dk2);display:none;flex-direction:column;overflow:hidden;
}
.slide-page.open{display:flex;}
.slide-header{
  display:flex;align-items:center;gap:12px;
  padding:12px 18px;background:rgba(6,6,6,0.9);
  border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;min-height:52px;
}
.back-btn{
  width:36px;height:36px;min-width:36px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#fff;cursor:pointer;transition:background .12s;
  -webkit-tap-highlight-color:transparent;
}
.back-btn:active{background:rgba(255,255,255,0.16);}
.slide-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.slide-title{font-size:16px;font-weight:700;color:#fff;}
.slide-sub{font-size:11px;color:rgba(255,255,255,0.35);margin-left:auto;}
.slide-body{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px;}
.slide-body::-webkit-scrollbar{width:3px;}
.slide-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.38);margin-bottom:6px;}

/* ââââââââââââââââââââââââââââââââââââââââââ
   TRAINING PAGE
ââââââââââââââââââââââââââââââââââââââââââ */
.training-layout{flex:1;display:flex;gap:14px;overflow:hidden;}
.train-col-left{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
.train-col-left::-webkit-scrollbar{display:none;}
.train-avatar-center{width:116px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:10px;padding-top:4px;}
.train-col-right{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
.train-col-right::-webkit-scrollbar{display:none;}
.train-avatar-fig{width:84px;aspect-ratio:1/1.7;background:rgba(255,255,255,0.06);border:none;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.25);text-align:center;}
.train-belt-pip{width:60px;height:18px;border-radius:4px;position:relative;overflow:hidden;flex-shrink:0;}
.train-belt-stripe{position:absolute;top:30%;left:0;right:0;height:40%;}
.train-belt-name{font-size:10px;color:rgba(255,255,255,0.5);text-align:center;}
.challenge-card{background:rgba(212,136,42,0.1);border:1px solid rgba(212,136,42,0.28);border-radius:12px;padding:13px 14px;display:flex;flex-direction:column;gap:8px;flex:1;}
.ch-group-badge{display:inline-flex;align-items:center;background:rgba(212,136,42,0.22);border-radius:5px;padding:3px 9px;font-size:10px;color:var(--gold-warm);font-weight:700;}
.ch-title{font-size:14px;font-weight:700;color:#fff;line-height:1.4;}
.ch-desc{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.6;}
.ch-prog-row{display:flex;justify-content:space-between;margin-bottom:4px;}
.ch-prog-lbl{font-size:10px;color:rgba(255,255,255,0.35);}
.ch-prog-val{font-size:10px;color:var(--gold-warm);font-weight:700;}
.ch-prog-track{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.ch-prog-fill{height:100%;background:var(--gold-warm);border-radius:3px;}
.ch-days{font-size:10px;color:rgba(212,136,42,0.65);text-align:right;margin-top:3px;}
.upcoming-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;min-height:44px;}
.up-name{font-size:13px;font-weight:700;color:#fff;}
.up-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;}
.up-days{font-size:12px;font-weight:700;color:#5acd30;}
.dailies-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;flex:1;}
.daily-row{display:flex;align-items:center;gap:10px;min-height:44px;}
.daily-ico{width:34px;height:34px;border-radius:9px;background:rgba(90,205,48,0.15);border:1px solid rgba(90,205,48,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.daily-name{font-size:12px;font-weight:700;color:#fff;}
.daily-rep{font-size:10px;color:rgba(255,255,255,0.42);margin-top:1px;}
.daily-dots{display:flex;gap:4px;margin-top:4px;}
.d-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.1);}
.d-dot.done{background:#5acd30;}
.d-dot.today{background:var(--gold-warm);}
.d-sep{height:.5px;background:rgba(255,255,255,0.07);}

/* ââââââââââââââââââââââââââââââââââââââââââ
   TECHNIQUES PAGE
ââââââââââââââââââââââââââââââââââââââââââ */
.tech-cats{display:flex;gap:6px;flex-shrink:0;}
.tech-cat{flex:1;padding:8px 0;text-align:center;font-size:11px;font-weight:700;border-radius:9px;cursor:pointer;min-height:38px;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);background:rgba(8,8,8,0.5);transition:all .15s;}
.tech-cat.on{background:rgba(40,90,20,0.7);color:#8cd870;border-color:rgba(90,205,48,0.35);}
.tech-cat.add{flex:0.4;font-size:10px;color:rgba(255,255,255,0.22);}
.tech-list{display:flex;flex-direction:column;gap:7px;}
.tech-item{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:11px;padding:10px 12px;cursor:pointer;transition:all .15s;min-height:56px;}
.tech-item:active{background:rgba(255,255,255,0.09);}
.tech-item.locked{opacity:.4;}
.tech-thumb{width:68px;height:42px;background:rgba(15,40,10,0.85);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);position:relative;}
.play-ring{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;}
.tech-duration{position:absolute;bottom:3px;right:4px;font-size:8px;color:rgba(255,255,255,0.5);background:rgba(0,0,0,0.55);border-radius:3px;padding:1px 4px;}
.tech-name{font-size:12px;font-weight:700;color:#fff;line-height:1.3;}
.tech-meta{font-size:10px;color:rgba(255,255,255,0.42);margin-top:2px;}
.tech-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.tech-chevron{font-size:14px;color:rgba(255,255,255,0.3);flex-shrink:0;}
/* Technique detail panel */
.tech-detail-panel{position:absolute;inset:0;z-index:5;background:var(--dk);display:none;flex-direction:column;overflow:hidden;}
.tech-detail-panel.open{display:flex;}
.video-mock{background:#0a1a0a;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;aspect-ratio:16/9;max-height:40%;border-bottom:1px solid rgba(255,255,255,0.07);}
.video-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.video-play-btn{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.video-play-btn:active{transform:scale(0.95);}
.video-play-btn.playing{background:rgba(212,136,42,0.3);border-color:var(--gold-warm);}
.video-title-overlay{font-size:12px;color:rgba(255,255,255,0.6);text-align:center;padding:0 20px;}
.scrubber-row{position:absolute;bottom:0;left:0;right:0;padding:10px 16px;background:linear-gradient(transparent,rgba(0,0,0,0.7));}
.scrubber-track{height:4px;background:rgba(255,255,255,0.2);border-radius:2px;cursor:pointer;}
.scrubber-fill{height:100%;background:var(--gold-warm);border-radius:2px;transition:width .3s;}
.time-row{display:flex;justify-content:space-between;margin-top:6px;}
.time-lbl{font-size:10px;color:rgba(255,255,255,0.5);}
.tech-detail-body{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px;}
.td-title{font-size:18px;font-weight:700;color:#fff;}
.td-badges{display:flex;gap:8px;flex-wrap:wrap;}
.td-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;}
.td-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.7;}
.td-steps{display:flex;flex-direction:column;gap:8px;}
.td-step{display:flex;gap:12px;align-items:flex-start;}
.td-step-num{width:26px;height:26px;border-radius:50%;background:rgba(90,205,48,0.15);border:1px solid rgba(90,205,48,0.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#8cd870;flex-shrink:0;}
.td-step-txt{font-size:12px;color:rgba(255,255,255,0.65);line-height:1.6;padding-top:3px;}

/* ââââââââââââââââââââââââââââââââââââââââââ
   ACHIEVEMENTS PAGE â Honeycomb + Avatar
ââââââââââââââââââââââââââââââââââââââââââ */
.ach-wrap{
  flex:1;display:flex;flex-direction:row;
  overflow:hidden;padding:14px 18px;gap:16px;
}

/* Left: avatar panel */
.ach-avatar-col{
  width:140px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding-top:8px;
}

/* ââ HONEYCOMB CSS ââ
   Uses offset rows to create a true hex grid.
   Each row is offset by half a cell width.
*/
.hive{
  display:flex;flex-direction:column;gap:0;
  width:100%;
}
.hive-row{
  display:flex;flex-direction:row;
  margin-bottom:-8px; /* row overlap for honeycomb tight pack */
}
.hive-row.offset{
  margin-left:calc((100% / 6) / 2);/* offset alternate rows by half cell */
}

/* Each hex cell */
.hive-cell{
  position:relative;
  width:calc(100% / 6);
  aspect-ratio:1/1.155; /* hex height = width * (2/â3) â 1.155 */
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s;
  padding:3px;
}
.hive-cell:active{transform:scale(0.93);}

/* The actual hex badge SVG + content */
.hive-badge{
  position:relative;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}
.hive-badge svg.hex-bg{
  position:absolute;inset:0;width:100%;height:100%;
}
.hive-badge-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;width:100%;height:100%;padding-bottom:12%;
}
.hive-badge-name{

  color:rgba(255,255,255,0.75);line-height:1.2;
  padding:0 4px;
}

/* Medal dots below badge name */

function pip(c,s,w=24,h=10){return`<div style="width:${w}px;height:${h}px;border-radius:3px;background:${c};position:relative;overflow:hidden;flex-shrink:0;">${s?`<div style="position:absolute;top:30%;left:0;right:0;height:40%;background:${s};"></div>`:''}</div>`;}
function esvg(sym,stroke,sz,op){const sw=1.6;let i='';if(sym==='air')i=`<path d="M8 14 Q14 9 20 14 Q14 19 8 14Z" fill="none" stroke="${stroke}" stroke-width="${sw}" opacity="${op}"/><path d="M10 19 Q16 14 22 19" fill="none" stroke="${stroke}" stroke-width="${sw}" opacity="${op*0.6}"/><circle cx="16" cy="14" r="1.2" fill="${stroke}" opacity="${op}"/>`;else if(sym==='earth')i=`<polygon points="16,8 24,22 8,22" fill="none" stroke="${stroke}" stroke-width="${sw}" opacity="${op}"/><line x1="10" y1="18" x2="22" y2="18" stroke="${stroke}" stroke-width="${sw}" opacity="${op}"/>`;else if(sym==='water')i=`<path d="M16 8 C16 8 22 15 22 19 C22 22.3 19.3 25 16 25 C12.7 25 10 22.3 10 19 C10 15 16 8 16 8Z" fill="none" stroke="${stroke}" stroke-width="${sw}" opacity="${op}"/><path d="M12 20 Q16 17 20 20" fill="none" stroke="${stroke}" stroke-width="${sw*0.8}" opacity="${op*0.7}"/>`;else if(sym==='fire')i=`<path d="M16 7 C16 7 21 13 21 18 C21 21.3 18.8 24 16 24 C13.2 24 11 21.3 11 18 C11 15 13 12 13 12 C13 12 14 15 16 15 C16 15 14 11 16 7Z" fill="none" stroke="${stroke}" stroke-width="${sw}" opacity="${op}"/>`;return`<svg width="${sz}" height="${sz}" viewBox="0 0 32 32">${i}</svg>`;}
function eico(ei,sz,half){const e=EL[ei];const f=e.f,s=e.st;if(half)return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;border:1.5px solid ${s};position:relative;overflow:hidden;flex-shrink:0;"><div style="position:absolute;left:0;top:0;width:50%;height:100%;background:${f};"></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">${esvg(e.sym,s,sz*0.72,0.85)}</div></div>`;return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;border:1.5px solid ${s};background:${f};flex-shrink:0;display:flex;align-items:center;justify-content:center;">${esvg(e.sym,s,sz*0.72,0.9)}</div>`;}
function eicoEmpty(ei,sz){const e=EL[ei];return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;border:1px solid ${e.st};background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:0.28;">${esvg(e.sym,e.st,sz*0.72,0.5)}</div>`;}

let curDemo='kai',curTechCat='Striking',curProfileTab='activity';

function renderProfile(){
  const s=STUDENTS[curDemo];const b=BD[s.bi];
  document.getElementById('student-name').textContent=s.name;
  document.getElementById('student-level').textContent='Level '+s.level;
  const xpPct=Math.round(s.xp/s.xp_max*100);
  document.getElementById('xp-fill').style.width=xpPct+'%';
  document.getElementById('xp-label').textContent=s.xp+' / '+s.xp_max;
  document.getElementById('stat-attend').textContent=s.attend+'%';
  document.getElementById('stat-grade').textContent=s.next_grade;
  document.getElementById('profile-belt-badge').innerHTML=`${pip(b.c,b.s,36,17)}<div><div class="belt-name">${b.n}</div><div class="belt-tier">${getTierLabel(s.bi)} Â· Belt ${s.bi+1}</div></div>`;
  renderStripes(s);
  const banner=document.getElementById('challenge-banner');
  if(s.challenge_pending){
    banner.style.display='flex';
    document.getElementById('cb-title').textContent='Challenge Pending â '+s.challenge_belt;
    document.getElementById('cb-days').textContent=s.challenge_days_remaining+' days remaining Â· Set by '+s.challenge_assigned_by;
  } else { banner.style.display='none'; }
  setProfileTab(curProfileTab);
}
function renderStripes(s){
  const wrap=document.getElementById('profile-stripes');wrap.innerHTML='';
  for(let i=0;i<4;i++){
    const v=s.bi>=8?s.str[i]:s.str[i];
    if(s.bi>=8){ wrap.innerHTML+=v>=1?eico(0,28,false):eicoEmpty(0,28); }
    else{ if(v>=1)wrap.innerHTML+=eico(i,28,false); else if(v>=0.5)wrap.innerHTML+=eico(i,28,true); else wrap.innerHTML+=eicoEmpty(i,28); }
  }
}
function setDemo(id){
  curDemo=id;
  document.getElementById('demo-ryo').classList.toggle('on',id==='kai');
  document.getElementById('demo-hana').classList.toggle('on',id==='mia');
  renderProfile();
}
function setProfileTab(tab){
  curProfileTab=tab;
  ['activity','profile','stats'].forEach(t=>document.getElementById('ptab-'+t).classList.toggle('on',t===tab));
  const s=STUDENTS[curDemo];const body=document.getElementById('profile-card-body');
  if(tab==='activity'){
    body.innerHTML=s.activity.map(r=>`<div class="a-row"><div class="a-ico" style="background:${r.ic};color:${r.tc};">${r.ico}</div><span class="a-txt">${r.txt}</span><span class="a-meta">${r.meta}</span></div>`).join('');
  } else if(tab==='profile'){
    body.innerHTML=[['Name',s.name],['Age',s.age],['Joined',s.joined],['Class',s.class_label],['Membership',s.membership]].map(([l,v])=>`<div class="a-row"><span class="a-txt" style="color:rgba(255,255,255,0.45);font-size:10px;">${l}</span><span class="a-meta">${v}</span></div>`).join('');
  } else {
    body.innerHTML=[
      ['â','rgba(90,205,48,0.18)','#8cd870',`Attendance: ${s.attend}%`],
      ['â','rgba(255,180,0,0.18)','#ffd700',`Belt: ${BD[s.bi].n}`],
      ['â','rgba(100,140,255,0.18)','#8aabff',`Techniques: ${s.techniques.filter(t=>t.status==='complete').length} completed`],
      ['â','rgba(255,200,0,0.18)','#ffd700',`Badges: ${Object.values(s.badge_progress).reduce((a,b)=>a+b.earned.length,0)} earned`],
    ].map(([i,ic,tc,txt])=>`<div class="a-row"><div class="a-ico" style="background:${ic};color:${tc};">${i}</div><span class="a-txt">${txt}</span></div>`).join('');
  }
}

// ââ NAVIGATION ââ
function openPage(page){
  document.getElementById('page-'+page).classList.add('open');
  document.getElementById('nav-'+page).classList.add('active-page');
  if(page==='training')renderTraining();
  if(page==='techniques')renderTechniques();
  if(page==='achievements')renderAchievements();
}
function closePage(page){
  document.getElementById('page-'+page).classList.remove('open');
  document.getElementById('nav-'+page).classList.remove('active-page');
  if(page==='techniques')closeTechDetail();
}

// ââ TRAINING ââ
function renderTraining(){
  const s=STUDENTS[curDemo];const b=BD[s.bi];
  document.getElementById('training-sub').textContent=s.name+' Â· '+s.age_group;
  const tbp=document.getElementById('train-belt-pip');
  tbp.style.background=b.c;tbp.innerHTML=b.s?`<div class="train-belt-stripe" style="background:${b.s};"></div>`:'';
  document.getElementById('train-belt-name').textContent=b.n;
  const cp=s.challenge_progress;const pct=Math.round(cp.done/cp.total*100);
  document.getElementById('challenge-card').innerHTML=`<div><span class="ch-group-badge">${s.age_group}</span></div><div class="ch-title">Balance &amp; Focus</div><div class="ch-desc">Hold a one-legged stance for 30 seconds. Both sides. Can you reach 60 seconds?</div><div style="margin-top:auto;"><div class="ch-prog-row"><span class="ch-prog-lbl">Class progress</span><span class="ch-prog-val">${cp.done} / ${cp.total} done</span></div><div class="ch-prog-track"><div class="ch-prog-fill" style="width:${pct}%;"></div></div><div class="ch-days">4 days left</div></div>`;
  const uc=s.upcoming_class;
  document.getElementById('upcoming-list').innerHTML=`<div class="upcoming-item"><div><div class="up-name">${uc.name}</div><div class="up-sub">${uc.sub}</div></div><div class="up-days">${uc.days}</div></div>`;
  document.getElementById('dailies-card').innerHTML=s.dailies.map((d,i)=>`${i>0?'<div class="d-sep"></div>':''}<div class="daily-row"><div class="daily-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8cd870" stroke-width="2" stroke-linecap="round"><path d="M6 12 L10 16 L18 8"/></svg></div><div style="flex:1;"><div class="daily-name">${d.name}</div><div class="daily-rep">${d.reps}</div><div class="daily-dots">${d.dots.map(st=>`<div class="d-dot ${st==='done'?'done':st==='today'?'today':''}"></div>`).join('')}</div></div></div>`).join('');
}

// ââ TECHNIQUES ââ
const TECH_CATS=['Striking','Grappling','Shuriken-jutsu'];
function renderTechniques(){
  const s=STUDENTS[curDemo];
  document.getElementById('techniques-sub').textContent=s.techniques.filter(t=>t.status==='complete').length+' completed';
  document.getElementById('tech-cats').innerHTML=TECH_CATS.map(c=>`<div class="tech-cat ${c===curTechCat?'on':''}" onclick="setTechCat('${c}')">${c}</div>`).join('')+`<div class="tech-cat add">+ Add</div>`;
  const items=s.techniques.filter(t=>t.cat===curTechCat);
  document.getElementById('tech-list').innerHTML=items.map(t=>{
    const sc=t.status==='complete'?'#5acd30':t.status==='progress'?'#d4882a':'rgba(255,255,255,0.18)';
    const idx=s.techniques.findIndex(x=>x.name===t.name);
    return`<div class="tech-item ${t.status==='locked'?'locked':''}" onclick="${t.status!=='locked'?`openTechDetail(${idx})`:''}"><div class="tech-thumb"><div class="play-ring"><svg width="12" height="12" viewBox="0 0 10 10"><polygon points="3,2 8,5 3,8" fill="${t.status==='locked'?'rgba(255,255,255,0.3)':'#fff'}" opacity="${t.status==='locked'?0.4:0.85}"/></svg></div><span class="tech-duration">${t.dur}</span></div><div style="flex:1;min-width:0;"><div class="tech-name">${t.name}</div><div class="tech-meta">${t.diff} Â· ${t.cat}</div></div><div class="tech-status-dot" style="background:${sc};"></div>${t.status!=='locked'?'<div class="tech-chevron">âº</div>':''}</div>`;
  }).join('');
}
function setTechCat(cat){curTechCat=cat;renderTechniques();}
function openTechDetail(idx){
  const t=STUDENTS[curDemo].techniques[idx];stopPlay();
  document.getElementById('tech-detail-panel').classList.add('open');
  document.getElementById('td-header-title').textContent=t.name;
  document.getElementById('video-title-overlay').textContent=t.name;
  document.getElementById('td-title').textContent=t.name;
  const dc=t.diff==='Beginner'?'rgba(90,205,48,0.2)':t.diff==='Intermediate'?'rgba(212,136,42,0.2)':'rgba(200,60,60,0.2)';
  const dtc=t.diff==='Beginner'?'#8cd870':t.diff==='Intermediate'?'#d4882a':'#ff8888';
  document.getElementById('td-badges').innerHTML=`<div class="td-badge" style="background:${dc};color:${dtc};">${t.diff}</div><div class="td-badge" style="background:rgba(100,140,255,0.18);color:#8aabff;">${t.cat}</div><div class="td-badge" style="background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);">${t.dur}</div>`;
  document.getElementById('td-desc').textContent=t.desc;
  document.getElementById('td-steps').innerHTML=t.steps.map((st,i)=>`<div class="td-step"><div class="td-step-num">${i+1}</div><div class="td-step-txt">${st}</div></div>`).join('');
  const parts=t.dur.split(':');playDuration=parseInt(parts[0])*60+parseInt(parts[1]);playPos=0;updateScrubber();
  document.getElementById('time-total').textContent=t.dur;
}
function closeTechDetail(){document.getElementById('tech-detail-panel').classList.remove('open');stopPlay();}
function togglePlay(){isPlaying?stopPlay():startPlay();}
function startPlay(){
  isPlaying=true;document.getElementById('play-icon').style.display='none';document.getElementById('pause-icon').style.display='block';document.getElementById('video-play-btn').classList.add('playing');
  playTimer=setInterval(()=>{playPos=Math.min(playPos+1,playDuration);updateScrubber();if(playPos>=playDuration)stopPlay();},1000);
}
function stopPlay(){
  isPlaying=false;clearInterval(playTimer);document.getElementById('play-icon').style.display='block';document.getElementById('pause-icon').style.display='none';document.getElementById('video-play-btn').classList.remove('playing');
}
function updateScrubber(){
  const pct=playDuration>0?Math.round(playPos/playDuration*100):0;
  document.getElementById('scrubber-fill').style.width=pct+'%';
  const m=Math.floor(playPos/60),sec=playPos%60;
  document.getElementById('time-cur').textContent=m+':'+(sec<10?'0':'')+sec;
}
function scrub(e){const rect=e.currentTarget.getBoundingClientRect();playPos=Math.round((e.clientX-rect.left)/rect.width*playDuration);updateScrubber();}

// ââ ACHIEVEMENTS â HONEYCOMB ââ
function renderAchievements(){
  const s=STUDENTS[curDemo];const b=BD[s.bi];
  // Avatar col
  document.getElementById('ach-student-name').textContent=s.name;
  const ap=document.getElementById('ach-belt-pip');
  ap.style.cssText=`width:54px;height:15px;border-radius:3px;background:${b.c};position:relative;overflow:hidden;`;
  ap.innerHTML=b.s?`<div class="ach-belt-stripe" style="background:${b.s};"></div>`:'';
  document.getElementById('ach-belt-name').textContent=b.n;
  const totalEarned=Object.values(s.badge_progress).reduce((a,bp)=>a+bp.earned.length,0);
  const totalPossible=BADGES.length*3;
  document.getElementById('ach-badges-earned').textContent=totalEarned+' / '+totalPossible+' medals';
  document.getElementById('achievements-sub').textContent=totalEarned+' medals earned';

  // Build honeycomb rows â 4 cells per row, alternating offset
  const cells=BADGES.map((badge,bi)=>{
    const bp=s.badge_progress[badge.id]||{current:0,earned:[]};
    const topLevel=bp.earned.length>0?bp.earned[bp.earned.length-1]:-1;
    const medalColors=['#c07830','#c8c8c8','#ffd700'];
    const medalNames=['bronze','silver','gold'];
    const earned=topLevel>=0;
    // Hex glow colour based on highest medal earned
    const glowCol=earned?medalColors[topLevel]:'rgba(255,255,255,0.08)';
    const borderCol=earned?medalColors[topLevel]:'rgba(255,255,255,0.14)';
    const bgFill=earned?'rgba(18,18,18,0.96)':'rgba(8,8,8,0.94)';
    const iconCol=earned?medalColors[topLevel]:'rgba(255,255,255,0.22)';
    const glowFilter=earned?`filter:drop-shadow(0 0 6px ${medalColors[topLevel]}88);`:'';
    const medalDots=medalNames.map((m,mi)=>`<div class="medal-dot ${bp.earned.includes(mi)?m+'-earned':''}"></div>`).join('');
    return`
    <div class="hive-cell" onclick="openBadge('${badge.id}')">
      <div class="hive-badge" style="${glowFilter}">
        <svg class="hex-bg" viewBox="0 0 100 116" xmlns="http://www.w3.org/2000/svg">
          <!-- shadow -->
          <polygon points="50,2 98,29 98,87 50,114 2,87 2,29" fill="rgba(0,0,0,0.4)" transform="translate(0,2)"/>
          <!-- body -->
          <polygon points="50,2 98,29 98,87 50,114 2,87 2,29" fill="${bgFill}" stroke="${borderCol}" stroke-width="${earned?2:1}"/>
          <!-- inner ring -->
          <polygon points="50,10 88,32 88,82 50,104 12,82 12,32" fill="none" stroke="${earned?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.08)'}" stroke-width="1"/>
        </svg>
        <div class="hive-badge-content">
          ${animalSvg(badge.icon,22,iconCol)}
        </div>
        <div class="hive-badge-name" style="color:${earned?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.3)'};">${badge.name}</div>
        <div class="hive-medals">${medalDots}</div>
      </div>
    </div>`;
  });

  // Arrange into honeycomb rows of 4 (offset alternating)
  const perRow=4;const rows=[];
  for(let i=0;i<cells.length;i+=perRow){
    rows.push({cells:cells.slice(i,i+perRow),offset:Math.floor(i/perRow)%2===1});
  }
  document.getElementById('badge-hive').innerHTML=rows.map(r=>`
    <div class="hive-row ${r.offset?'offset':''}">${r.cells.join('')}</div>`).join('');
}

function openBadge(id){
  const badge=BADGES.find(b=>b.id===id);
  const s=STUDENTS[curDemo];
  const bp=s.badge_progress[id]||{current:0,earned:[]};
  const medalColors={bronze:'#c07830',silver:'#c8c8c8',gold:'#ffd700'};
  const medalBg={bronze:'rgba(192,120,48,0.15)',silver:'rgba(200,200,200,0.1)',gold:'rgba(255,215,0,0.12)'};
  const topEarned=bp.earned.length>0;
  const iconCol=topEarned?medalColors[badge.levels[bp.earned[bp.earned.length-1]].medal]:'rgba(255,255,255,0.3)';
  document.getElementById('bm-header').innerHTML=`
    <div class="bm-animal-icon" style="background:${topEarned?medalBg[badge.levels[bp.earned[bp.earned.length-1]].medal]:'rgba(255,255,255,0.05)'};">${animalSvg(badge.icon,28,iconCol)}</div>
    <div class="bm-name">${badge.name}</div>
    <div class="bm-theme">${badge.theme}</div>`;
  document.getElementById('bm-body').innerHTML=`<div class="bm-tier">`+badge.levels.map((lv,li)=>{
    const earned=bp.earned.includes(li);
    const mc=medalColors[lv.medal];
    const mb=medalBg[lv.medal];
    const prog=Math.min(100,Math.round(bp.current/lv.target*100));
    return`<div class="bm-tier-row" style="background:${earned?mb:'rgba(255,255,255,0.03)'};">
      <div class="bm-medal" style="background:${earned?mc+'22':'rgba(255,255,255,0.06)'};">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${earned?mc:'rgba(255,255,255,0.2)'}" stroke-width="1.5"><circle cx="12" cy="12" r="8"/><path d="M9 12 L11 14 L15 10"/></svg>
      </div>
      <div style="flex:1;">
        <div class="bm-tier-lbl" style="color:${earned?mc:'rgba(255,255,255,0.5)'};">${lv.label}</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.35);">${lv.desc}</div>
        ${!earned?`<div class="bm-prog-bar"><div class="bm-prog-fill" style="width:${prog}%;background:${mc};"></div></div>`:'' }
      </div>
      <div class="bm-tier-check" style="color:${earned?mc:'rgba(255,255,255,0.15)'};">${earned?'â':'Â·'}</div>
    </div>`;
  }).join('')+`</div>`;
  document.getElementById('badge-modal').classList.add('op');
}
function closeBadgeModal(e){if(e.target===document.getElementById('badge-modal'))document.getElementById('badge-modal').classList.remove('op');}

(function(){
  const p=new URLSearchParams(window.location.search).get("student");
  if(p&&STUDENTS[p]){curDemo=p;}
})();
renderProfile();
