}
.screen { position:relative; z-index:2; width:100%; height:100%; }

/* ═══ Layout ═══ */
.layout { display:flex; height:100%; padding:0 30px; }

/* ─── Column separators ─── */
.col-sep {
  width:1px; align-self:stretch; margin:28px 0;
  background: linear-gradient(to bottom,
    transparent 0%,
    rgba(245,240,232,0.045) 20%,
    rgba(245,240,232,0.045) 80%,
    transparent 100%
  );
}

/* ════════════════════════════════════════
   LEFT COLUMN — Identity + Belt + Stripes + Stats
════════════════════════════════════════ */
.col-left {
  flex:0 0 240px;
  display:flex; flex-direction:column;
  align-items:center;
  padding:24px 8px 20px 4px;
  gap:0;
  justify-content:center;
  text-align:center;
}

/* Name */
.id-name {
  font-family:'Cinzel',serif; font-size:16px; font-weight:600;
  letter-spacing:0.07em; color:rgba(245,240,232,0.92);
  text-shadow:0 0 20px rgba(245,240,232,0.08);
  margin-bottom:3px;
}

/* Aura */
.id-aura {
  font-family:'Crimson Pro',serif; font-size:11.5px; font-weight:300; font-style:italic;
  color:rgba(210,178,90,0.72);
  margin-bottom:14px;
}

/* Belt display */
.id-belt-row {
  display:flex; align-items:center; gap:10px; justify-content:center;
  margin-bottom:3px;
}
.belt-bar {
  width:80px; height:13px; border-radius:3px; overflow:hidden; position:relative;
}
.belt-bar-fill { width:100%; height:100%; transition:background 0.3s; }
.belt-bar-stripe {
  position:absolute; left:0; right:0; top:50%; transform:translateY(-50%);
  height:35%; display:none;
}
.id-belt-name {
  font-family:'Cinzel',serif; font-size:11px; font-weight:600;
  letter-spacing:0.05em; color:rgba(245,240,232,0.8);
}
.id-belt-tier {
  font-family:'Cinzel',serif; font-size:7.5px; letter-spacing:0.13em;
  text-transform:uppercase; color:rgba(245,240,232,0.3);
  margin-bottom:12px;
}

/* Stripes */
.id-stripes {
  display:flex; gap:5px; justify-content:center;
  margin-bottom:16px;
}
.stripe-badge-wrap { display:flex; flex-direction:column; align-items:center; gap:1px; }
.stripe-badge-label {
  font-family:'Crimson Pro',serif; font-size:7px; font-weight:300;
  color:rgba(245,240,232,0.3); text-transform:uppercase; letter-spacing:0.05em;
}

/* Stats */
.id-stats {
  display:flex; gap:16px; justify-content:center;
}
.id-stat {
  display:flex; align-items:baseline; gap:4px;
}
.id-stat .val {
  font-family:'Cinzel',serif; font-size:13px; font-weight:600;
  color:rgba(245,240,232,0.75);
}
.id-stat .lbl {
  font-family:'Crimson Pro',serif; font-size:9px; font-weight:300; font-style:italic;
  color:rgba(245,240,232,0.35);
}

/* ════════════════════════════════════════
   CENTER COLUMN — Avatar
════════════════════════════════════════ */
.col-center {
  flex:1;
  display:flex; align-items:flex-end; justify-content:center;
  position:relative;
  min-width:0;
}

/* Ground — extends full width of center, slight perspective hint */
.ground {
  position:absolute; bottom:0; left:-20px; right:-20px; height:50px;
  background: linear-gradient(to top,
    rgba(245,240,232,0.035) 0%,
    rgba(245,240,232,0.01) 60%,
    transparent 100%
  );
  z-index:0;
}
.ground::after {
  content:''; position:absolute; bottom:8px; left:50%;
  transform:translateX(-50%);
  width:110px; height:2px; border-radius:50%;
  background:rgba(245,240,232,0.04);
  box-shadow: 0 0 12px 4px rgba(245,240,232,0.02);
}

/* Character — positioned slightly back (higher ground contact = further away feel) */
.char-wrap {
  position:relative; z-index:2;
  width:124px; height:295px;
  margin-bottom:10px;
  display:flex; align-items:flex-end; justify-content:center;
  overflow:visible;
}

/* Aura canvas — full-frame: spans the entire device frame so the glow
   bleeds to the edges without any geometric cutoff. Canvas pixel
   dimensions are set by sizeCanvas() on init / device switch.
   z-index:-1 places it behind all screen content but above the hero.  */
.aura-canvas {
  position: absolute;
  inset: 0;
  z-index: -1;
  pointer-events: none;
}

/* ════════════════════════════════════════
   RIGHT COLUMN — Nav pills
════════════════════════════════════════ */
.col-right {
  flex:0 0 230px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:9px; padding:16px 4px 16px 8px;
}

.nav-pill {
  width:auto; min-width:155px; padding:10px 13px;
  border-radius:12px;
  background: rgba(245,240,232,0.035);
  border:1px solid rgba(245,240,232,0.07);
  backdrop-filter: blur(12px);
  display:flex; align-items:center; gap:11px;
  cursor:pointer; transition:all 0.3s;
}
.nav-pill:hover {
  background:rgba(245,240,232,0.065);
  border-color:rgba(245,240,232,0.14);
  transform:translateX(3px);
}
.pill-icon {
  width:30px; height:30px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  background:rgba(245,240,232,0.05); flex-shrink:0;
}
.pill-icon svg { width:17px; height:17px; }
.pill-text { display:flex; flex-direction:column; gap:1px; }
.pill-title {
  font-family:'Cinzel',serif; font-size:10.5px; letter-spacing:0.05em;
  color:rgba(245,240,232,0.85);
}
.pill-sub {
  font-family:'Crimson Pro',serif; font-size:9.5px; font-weight:300; font-style:italic;
  color:rgba(245,240,232,0.35);
}

/* ═══ iPad ═══ */

  transition: transform 0.15s, box-shadow 0.15s;
  position:relative;
}
.stage-dot:hover { transform:scale(1.25); }

  transform:scale(1.35);
  box-shadow:0 0 8px 2px var(--dot-glow,rgba(255,255,255,0.5));
  border-color:rgba(255,255,255,0.6);
}

.xp-slider {
  flex:1; -webkit-appearance:none; appearance:none;

.xp-val {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.08em;

  if (id==='air') return '<g transform="translate('+(cx-5*s)+','+(cy-4*s)+') scale('+s+')" '+op+'><path d="M2,3 Q5,0 8,3" stroke="'+fill+'" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1,6 Q5,2.5 9,6" stroke="'+fill+'" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="5" cy="8.5" r="1" fill="'+fill+'"/></g>';
  if (id==='earth') return '<g transform="translate('+(cx-5*s)+','+(cy-5*s)+') scale('+s+')" '+op+'><polygon points="5,1 9,9 1,9" stroke="'+fill+'" stroke-width="1.5" fill="none" stroke-linejoin="round"/><line x1="2.5" y1="6.5" x2="7.5" y2="6.5" stroke="'+fill+'" stroke-width="1.5" stroke-linecap="round"/></g>';
  if (id==='water') return '<g transform="translate('+(cx-4.5*s)+','+(cy-5.5*s)+') scale('+s+')" '+op+'><path d="M4.5,1 Q8,4 8,6.5 Q8,10 4.5,10 Q1,10 1,6.5 Q1,4 4.5,1Z" stroke="'+fill+'" stroke-width="1.5" fill="none" stroke-linejoin="round"/></g>';
  if (id==='fire') return '<g transform="translate('+(cx-4.5*s)+','+(cy-5*s)+') scale('+s+')" '+op+'><path d="M4.5,0 Q7,3 6,5 Q8,3 6.5,7 Q5.5,10 4.5,10 Q3.5,10 2.5,7 Q1,3 3,5 Q2,3 4.5,0Z" stroke="'+fill+'" stroke-width="1.3" fill="none" stroke-linejoin="round"/></g>';
  return '';
}

function makeBadgeSVG(el, state) {
  var r=13,cx=14,cy=14,sz=28;
  var uid = el.id+'_'+Math.random().toString(36).slice(2,6);
  if (state==='ghost') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 28 28"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="rgba(245,240,232,0.04)" stroke="'+el.accentStroke+'" stroke-width="1" stroke-opacity="0.22"/></svg>';
  if (state==='full') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 28 28"><defs><radialGradient id="fg_'+uid+'" cx="38%" cy="32%"><stop offset="0%" stop-color="rgba(255,255,255,0.18)"/><stop offset="100%" stop-color="rgba(0,0,0,0.08)"/></radialGradient></defs><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+el.darkBg+'"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="url(#fg_'+uid+')"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+el.accentStroke+'" stroke-width="1.5"/>'+elementSymbol(el.id,cx,cy,el.accentFill)+'</svg>';
  if (state==='half') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 28 28"><defs><clipPath id="lh_'+uid+'"><rect x="0" y="0" width="14" height="28"/></clipPath><clipPath id="rh_'+uid+'"><rect x="14" y="0" width="14" height="28"/></clipPath></defs><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+el.darkBg+'" clip-path="url(#lh_'+uid+')"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="rgba(245,240,232,0.04)" clip-path="url(#rh_'+uid+')"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+el.accentStroke+'" stroke-width="1.5"/><line x1="14" y1="1" x2="14" y2="27" stroke="rgba(245,240,232,0.15)" stroke-width="0.5"/>'+elementSymbol(el.id,cx-3.5,cy,el.accentFill,0.75)+'</svg>';
  return '';
}

function renderStripes(belt, ss) {
  var c = document.getElementById('stripe-badges'); c.innerHTML='';
  if (belt.stripeRule==='shokyu') {
    ELEMENTS.forEach(function(el,i) {
      var w=document.createElement('div'); w.className='stripe-badge-wrap';
      w.innerHTML=makeBadgeSVG(el,ss[i]===1?'full':'ghost')+'<div class="stripe-badge-label">'+el.label+'</div>';
      c.appendChild(w);
    });
  } else if (belt.stripeRule==='chokyu') {
    ELEMENTS.forEach(function(el,i) {
      var h=ss[i]||[0,0]; var st=(h[0]&&h[1])?'full':h[0]?'half':'ghost';
      var w=document.createElement('div'); w.className='stripe-badge-wrap';
      w.innerHTML=makeBadgeSVG(el,st)+'<div class="stripe-badge-label">'+el.label+'</div>';
      c.appendChild(w);
    });
  } else {
    var airEl=ELEMENTS[0]; var earned=ss[0]||0;
    for(var j=0;j<4;j++) {
      var w=document.createElement('div'); w.className='stripe-badge-wrap';
      w.innerHTML=makeBadgeSVG(airEl,j<earned?'full':'ghost')+'<div class="stripe-badge-label">Air '+(j+1)+'</div>';
      c.appendChild(w);
    }
  }
}

function renderBelt(beltId) {
  currentBeltId=beltId;
  var belt=BELTS.find(function(b){return b.id===beltId}); if(!belt) return;

  document.getElementById('belt-fill').style.background=belt.colour;
  document.getElementById('belt-name').textContent=belt.name.replace(' Belt','');
  document.getElementById('belt-tier').textContent=belt.tierDisp;

  var s=document.getElementById('belt-stripe');
  if(belt.stripe){ s.style.display='block'; s.style.background=belt.stripe; }
  else { s.style.display='none'; }

  // Character belt
  document.getElementById('char-belt').setAttribute('fill',belt.colour);
  // Tint belt tails to match belt
  var tailColour = belt.colour + '55';
  var tailL = document.getElementById('char-belt-tail-l');
  var tailR = document.getElementById('char-belt-tail-r');
  if (tailL) tailL.setAttribute('stroke', tailColour);
  if (tailR) tailR.setAttribute('stroke', tailColour);
  var cs=document.getElementById('char-belt-stripe');
  if(belt.stripe){ cs.setAttribute('fill',belt.stripe); cs.setAttribute('opacity','0.6'); }
  else { cs.setAttribute('opacity','0'); }

  renderStripes(belt, DEMO_STRIPES[beltId]||[]);

  document.querySelectorAll('.belt-swatch').forEach(function(sw){
    sw.classList.toggle('active',sw.dataset.id===beltId);
  });
}

function buildSwitchers() {
  var tiers={shokyu:[],chokyu:[],jokyu:[]};
  BELTS.forEach(function(b){tiers[b.tier.toLowerCase()].push(b)});
  ['shokyu','chokyu','jokyu'].forEach(function(tier){
    var c=document.getElementById('switcher-'+tier);
    tiers[tier].forEach(function(belt){
      var sw=document.createElement('div');
      sw.className='belt-swatch'+(belt.id===currentBeltId?' active':'');
      sw.dataset.id=belt.id;
      sw.style.cssText='width:18px;height:8px;border-radius:2px;cursor:pointer;transition:all 0.2s;background:'+belt.colour+';border:1px solid rgba(245,240,232,0.15);';
      if(belt.stripe) sw.style.borderColor=belt.stripe+'99';
      sw.onclick=function(){ renderBelt(belt.id); };
      c.appendChild(sw);
    });
  });
}

/* ── Gender toggle ── */
  var _gender = 'male';
  function setGender(g) {
    _gender = g;
    var male   = document.getElementById('avatar-male');
    var female = document.getElementById('avatar-female');
    if (g === 'male') {
      male.style.display   = '';
      female.style.display = 'none';
    } else {
      male.style.display   = 'none';
      female.style.display = '';
    }
    document.getElementById('btn-male').classList.toggle('active',   g === 'male');
    document.getElementById('btn-female').classList.toggle('active', g === 'female');
    /* Restart aura so surge label repositions cleanly */
    NinjaAura.start(NinjaAura.currentStage, NinjaAura.currentXP);
  }

  function setDevice(type) {
  document.getElementById('frame').className='frame '+(type==='ipad'?'ipad':'');
  document.getElementById('btn-iphone').classList.toggle('active',type==='iphone');
  document.getElementById('btn-ipad').classList.toggle('active',type==='ipad');
}

buildSwitchers();
renderBelt('shin-mori');

</script>
<script src="../assets/js/aura.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════════
   STUDENT PROFILE — Aura integration  v4.1
   Engine:  ../assets/js/aura.js  (NinjaAura public API)
   ═══════════════════════════════════════════════════════════════════ */

/* ── Profile aura state ── */
var _ctrlStage      = 2;   /* selected stage index (0-12) */
var _ctrlXP         = 60;  /* current XP value (0-100)    */
var _profileQuality = 1;   /* tracks quality for readout label */

/* ── Quality helpers ── */
function _profileAutoDetect() {
  var cores  = navigator.hardwareConcurrency || 2;
  var retina = (window.devicePixelRatio || 1) >= 2;
  if (cores <= 2)           return NinjaAura.Q_REDUCED;
  if (cores >= 4 && retina) return NinjaAura.Q_ENHANCED;
  return NinjaAura.Q_STANDARD;
}

/* Profile-level setQuality wrapper — updates engine + UI buttons */
function setQuality(q) {
  _profileQuality = q;
  ['btn-q-reduced','btn-q-standard','btn-q-enhanced'].forEach(function(id, i) {
    var el = document.getElementById(id);
    if (el) el.classList.toggle('active', i === q);
  });
  NinjaAura.setQuality(q);
}

/* ── Lock / unlock dev controls during level-up transition ── */
function _setControlsLocked(locked) {
  var els = document.querySelectorAll('.stage-dot, .xp-slider, #btn-levelup');
  els.forEach(function(el) {
    el.style.pointerEvents = locked ? 'none' : '';
    el.style.opacity       = locked ? '0.35' : '';
  });
}

/* ── Surge label overlay on the character ── */
function _updateSurgeLabel(surge, xp, stageIndex) {
  var el = document.getElementById('surge-label');
  if (!el) return;
  if (surge) {
    el.style.opacity = Math.min((xp - 80) / 10, 1).toFixed(2);
    el.textContent   = '⚡ Aura surging';
    var rgb = NinjaAura.STAGES[stageIndex].rgb;
    el.style.color      = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.9)';
    el.style.textShadow = '0 0 10px rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.6)';
  } else {
    el.style.opacity = '0';
  }
}

/* ── Stage dot selector ── */
function buildStageDots() {
  var container = document.getElementById('stage-dots');
  if (!container) return;
  container.innerHTML = '';
  NinjaAura.STAGES.forEach(function(s, i) {
    var dot = document.createElement('div');
    dot.className = 'stage-dot' + (i === _ctrlStage ? ' active' : '');
    var r = s.rgb[0], g = s.rgb[1], b = s.rgb[2];
    dot.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
    dot.style.setProperty('--dot-glow', 'rgba(' + r + ',' + g + ',' + b + ',0.7)');
    dot.title = (i + 1) + '. ' + s.name;
    dot.addEventListener('click', function() { selectStage(i); });
    container.appendChild(dot);
  });
}

function selectStage(index) {
  _ctrlStage = index;
  document.querySelectorAll('.stage-dot').forEach(function(d, i) {
    d.classList.toggle('active', i === index);
  });
  updateReadout();
  NinjaAura.start(_ctrlStage, _ctrlXP);
}

function onXPChange(val) {
  _ctrlXP = parseInt(val, 10);
  var slider = document.getElementById('xp-slider');
  if (slider) slider.style.setProperty('--xp-pct', _ctrlXP + '%');
  var xpVal = document.getElementById('xp-val');
  if (xpVal) xpVal.textContent = _ctrlXP + '%';
  updateReadout();
  NinjaAura.start(_ctrlStage, _ctrlXP);
  /* Auto-trigger level-up when slider reaches 100 */
  if (_ctrlXP === 100 && _ctrlStage < 12) {
    setTimeout(NinjaAura.triggerLevelUp, 400);
  }
}

function updateReadout() {
  var el = document.getElementById('aura-readout');
  if (!el) return;
  var s       = NinjaAura.STAGES[_ctrlStage];
  var density = NinjaAura.auraDensity(_ctrlXP, _ctrlStage);
  var surgeTag = _ctrlXP >= 80 ? ' &nbsp;<span style="color:rgba(255,200,80,0.9)">⚡ SURGE</span>' : '';
  var bleedTag = _ctrlXP >= 90 && _ctrlStage < 12
    ? ' &nbsp;<span style="color:rgba(180,160,255,0.8)">↗ BLEED</span>' : '';
  var qLabels = ['Reduced','Standard','Enhanced'];
  var qTag    = ' &nbsp;·&nbsp; <span>' + qLabels[_profileQuality] + '</span>';
  el.innerHTML = 'Stage <span>' + (_ctrlStage + 1) + '</span> &nbsp;·&nbsp; '
               + '<span>' + s.name + '</span> &nbsp;·&nbsp; '
               + 'XP <span>' + _ctrlXP + '%</span> &nbsp;·&nbsp; '
               + 'Density <span>' + (density * 100).toFixed(0) + '%</span>'
               + surgeTag + bleedTag + qTag;
}

/* ── Initialise NinjaAura engine with profile callbacks ── */
NinjaAura.init({
  canvasId:    'aura-canvas',
  frameId:     'frame',
  charWrapSel: '.char-wrap',
  onSurge: function(surge, xp, stageIndex) {
    _updateSurgeLabel(surge, xp, stageIndex);
  },
  onLevelUpStart: function() {
    _setControlsLocked(true);
  },
  onLevelUpStage: function(newStageIndex) {
    _ctrlStage = newStageIndex;
    _ctrlXP    = 0;
    /* Sync dot highlight */
    document.querySelectorAll('.stage-dot').forEach(function(d, i) {
      d.classList.toggle('active', i === newStageIndex);
    });
    /* Sync XP slider */
    var sl = document.getElementById('xp-slider');
    if (sl) { sl.value = 0; sl.style.setProperty('--xp-pct', '0%'); }
    var xv = document.getElementById('xp-val');
    if (xv) xv.textContent = '0%';
  },
  onLevelUpEnd: function() {
    _setControlsLocked(false);
    updateReadout();
  },
});

/* ── Patch setDevice to resize canvas then restart aura ── */
var _origSetDevice = setDevice;
setDevice = function(type) {
  _origSetDevice(type);
  setTimeout(function() {
    NinjaAura.resize();
    NinjaAura.start(NinjaAura.currentStage, NinjaAura.currentXP);
  }, 50);
};

/* ── Boot: build UI, set quality, then start aura ── */
buildStageDots();
_profileQuality = _profileAutoDetect();
setQuality(_profileQuality);   /* sets engine quality + updates buttons */
updateReadout();
var _initSlider = document.getElementById('xp-slider');
if (_initSlider) _initSlider.style.setProperty('--xp-pct', _ctrlXP + '%');
NinjaAura.start(_ctrlStage, _ctrlXP);

</script>
</body></html>
