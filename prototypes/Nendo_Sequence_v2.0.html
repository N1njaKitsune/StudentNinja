<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nendō — Sequence Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', serif;
            background: #0A0A12;
            color: #E8E8E8;
            overflow: hidden;
        }

        .device-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            gap: 40px;
            background: #000;
        }

        .device-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .device-btn {
            padding: 8px 16px;
            background: #1a1a22;
            border: 1px solid #7AB89A;
            color: #7AB89A;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            font-size: 12px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .device-btn.active {
            background: #7AB89A;
            color: #0A0A12;
        }

        .device-btn:hover {
            opacity: 0.8;
        }

        /* Device Frames */
        .device {
            display: none;
            width: 844px;
            height: 390px;
            border: 12px solid #1a1a1a;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
            background: #0A0A12;
        }

        .device.active {
            display: flex;
        }

        .device.tablet {
            width: 1194px;
            height: 834px;
            border-radius: 60px;
        }

        /* Screen Content */
        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Background Layers */
        .screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0A0A12 0%, #1a1a28 50%, #0f0f1a 100%);
            z-index: 0;
        }

        .screen::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 50% 50%, rgba(122, 184, 154, 0.08) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        .ambient-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(122, 184, 154, 0.4), transparent);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-20px) translateX(10px) scale(1.1); opacity: 0.6; }
        }

        /* Content Area */
        .content {
            position: relative;
            z-index: 3;
            display: flex;
            width: 100%;
            height: 100%;
            padding: 40px;
            gap: 60px;
        }

        /* Left Panel */
        .left-panel {
            flex: 0 0 35%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 30px;
        }

        .state-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .state-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #7AB89A;
            transition: all 0.3s ease;
        }

        .state-name {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 0.15em;
            color: #A8A8A8;
        }

        .state-message {
            font-size: 16px;
            line-height: 1.6;
            color: #D0D0D0;
            font-weight: 300;
        }

        .technique-counter {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .counter-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #7AB89A;
            background: rgba(122, 184, 154, 0.1);
            color: #7AB89A;
            font-family: 'Cinzel', serif;
            font-size: 20px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .counter-btn:hover:not(:disabled) {
            background: rgba(122, 184, 154, 0.25);
            box-shadow: 0 0 15px rgba(122, 184, 154, 0.3);
        }

        .counter-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .counter-display {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .counter-number {
            font-family: 'Cinzel', serif;
            font-size: 56px;
            font-weight: 700;
            color: #7AB89A;
            line-height: 1;
            letter-spacing: 0.05em;
        }

        .counter-label {
            font-size: 12px;
            color: #A8A8A8;
            letter-spacing: 0.1em;
            margin-top: 8px;
        }

        /* Right Panel - Sequence */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .state-switcher {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .switcher-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(122, 184, 154, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #7AB89A;
        }

        .switcher-dot.active {
            background: #7AB89A;
            transform: scale(1.3);
        }

        .sequence-container {
            display: flex;
            align-items: center;
            gap: 20px;
            overflow-x: auto;
            padding: 20px 0;
        }

        .technique-card {
            flex: 0 0 110px;
            height: 160px;
            background: rgba(30, 30, 40, 0.8);
            border: 1px solid rgba(122, 184, 154, 0.3);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease;
            animation: cardPulse 3s ease-in-out infinite;
        }

        .technique-card.shiho {
            flex: 0 0 80px;
            opacity: 0.6;
        }

        .technique-card.entering {
            animation: slideIn 0.4s ease-out, cardPulse 3s ease-in-out infinite;
        }

        .technique-card.exiting {
            animation: slideOut 0.4s ease-in forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateX(40px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            to {
                transform: translateX(40px);
                opacity: 0;
            }
        }

        @keyframes cardPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .card-color-bar {
            height: 8px;
            width: 100%;
            background: #7AB89A;
        }

        .card-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .card-name {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: #E8E8E8;
        }

        .card-element {
            font-family: 'Crimson Pro', serif;
            font-size: 11px;
            font-style: italic;
            color: #A8A8A8;
        }

        .card-feeling {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
        }

        .card-icon {
            width: 24px;
            height: 24px;
            background: rgba(122, 184, 154, 0.2);
            border-radius: 4px;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .card-shiho-icon {
            width: 32px;
            height: 32px;
            background: rgba(122, 184, 154, 0.15);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            color: #7AB89A;
        }

        /* Connector */
        .connector {
            flex: 0 0 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #7AB89A, transparent);
            opacity: 0.5;
        }

        /* Bottom Section */
        .bottom-section {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            z-index: 4;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .session-note {
            font-size: 12px;
            color: #888;
            font-style: italic;
        }

        .begin-btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, #7AB89A, #6aa085);
            border: 1px solid rgba(122, 184, 154, 0.5);
            color: #0A0A12;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 0.15em;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(122, 184, 154, 0.3);
            animation: glowPulse 2s ease-in-out infinite;
        }

        .begin-btn:hover {
            box-shadow: 0 0 30px rgba(122, 184, 154, 0.5);
            transform: translateY(-2px);
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(122, 184, 154, 0.3); }
            50% { box-shadow: 0 0 30px rgba(122, 184, 154, 0.5); }
        }
    </style>
</head>
<body>
    <div class="device-toggle">
        <button class="device-btn active" onclick="switchDevice('phone')">iPhone</button>
        <button class="device-btn" onclick="switchDevice('tablet')">iPad</button>
    </div>

    <div class="device-container">
        <div class="device active" id="device-phone">
            <div class="screen" id="screen-phone">
                <div class="ambient-particles" id="particles-phone"></div>
                <div class="content">
                    <!-- LEFT PANEL -->
                    <div class="left-panel">
                        <div class="state-indicator">
                            <div class="state-dot" id="state-dot"></div>
                            <div class="state-name" id="state-name">Stormy</div>
                        </div>

                        <div class="state-message" id="state-message">
                            Your path begins with Cloud breathing to settle the storm, then builds toward stillness.
                        </div>

                        <div class="technique-counter">
                            <button class="counter-btn" onclick="decrementTechniques()">−</button>
                            <div class="counter-display">
                                <div class="counter-number" id="counter">3</div>
                                <div class="counter-label">TECHNIQUES</div>
                            </div>
                            <button class="counter-btn" onclick="incrementTechniques()">+</button>
                        </div>
                    </div>

                    <!-- RIGHT PANEL -->
                    <div class="right-panel">
                        <div class="state-switcher">
                            <div class="switcher-dot active" onclick="setState('Stormy')"></div>
                            <div class="switcher-dot" onclick="setState('Flat')"></div>
                            <div class="switcher-dot" onclick="setState('Scattered')"></div>
                            <div class="switcher-dot" onclick="setState('Clear')"></div>
                        </div>

                        <div class="sequence-container" id="sequence">
                            <!-- Cards will be generated here -->
                        </div>
                    </div>
                </div>

                <!-- BOTTOM SECTION -->
                <div class="bottom-section">
                    <div class="session-note">Shiho opens and closes every session</div>
                    <button class="begin-btn" onclick="beginSession()">BEGIN SESSION</button>
                </div>
            </div>
        </div>

        <div class="device tablet" id="device-tablet">
            <div class="screen" id="screen-tablet">
                <div class="ambient-particles" id="particles-tablet"></div>
                <div class="content">
                    <!-- LEFT PANEL -->
                    <div class="left-panel">
                        <div class="state-indicator">
                            <div class="state-dot" id="state-dot-tablet"></div>
                            <div class="state-name" id="state-name-tablet">Stormy</div>
                        </div>

                        <div class="state-message" id="state-message-tablet">
                            Your path begins with Cloud breathing to settle the storm, then builds toward stillness.
                        </div>

                        <div class="technique-counter">
                            <button class="counter-btn" onclick="decrementTechniques()">−</button>
                            <div class="counter-display">
                                <div class="counter-number" id="counter-tablet">3</div>
                                <div class="counter-label">TECHNIQUES</div>
                            </div>
                            <button class="counter-btn" onclick="incrementTechniques()">+</button>
                        </div>
                    </div>

                    <!-- RIGHT PANEL -->
                    <div class="right-panel">
                        <div class="state-switcher">
                            <div class="switcher-dot active" onclick="setState('Stormy')"></div>
                            <div class="switcher-dot" onclick="setState('Flat')"></div>
                            <div class="switcher-dot" onclick="setState('Scattered')"></div>
                            <div class="switcher-dot" onclick="setState('Clear')"></div>
                        </div>

                        <div class="sequence-container" id="sequence-tablet">
                            <!-- Cards will be generated here -->
                        </div>
                    </div>
                </div>

                <!-- BOTTOM SECTION -->
                <div class="bottom-section">
                    <div class="session-note">Shiho opens and closes every session</div>
                    <button class="begin-btn" onclick="beginSession()">BEGIN SESSION</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const stateData = {
            'Stormy': {
                message: 'Your path begins with Cloud breathing to settle the storm, then builds toward stillness.',
                sequence: ['Cloud', 'Warrior', 'Wave'],
                color: '#7AB89A'
            },
            'Flat': {
                message: 'Phoenix brings fire and energy. Ground yourself in Warrior, then flow with Cloud.',
                sequence: ['Phoenix', 'Warrior', 'Cloud'],
                color: '#D4826A'
            },
            'Scattered': {
                message: 'Center yourself with Warrior strength, clear with Cloud, and find your rhythm with Wave.',
                sequence: ['Warrior', 'Cloud', 'Wave'],
                color: '#C8A46A'
            },
            'Clear': {
                message: 'Begin with Wave's flow, settle with Cloud, and anchor in Warrior's strength.',
                sequence: ['Wave', 'Cloud', 'Warrior'],
                color: '#5B8FA8'
            }
        };

        const techniqueData = {
            'Cloud': { element: 'Wind', feeling: 'Settled', color: '#C8D8E8', icon: '💨' },
            'Phoenix': { element: 'Fire', feeling: 'Energized', color: '#D4826A', icon: '🔥' },
            'Warrior': { element: 'Earth', feeling: 'Grounded', color: '#C8A46A', icon: '⛰️' },
            'Wave': { element: 'Water', feeling: 'Flowing', color: '#5B8FA8', icon: '🌊' }
        };

        let currentState = 'Stormy';
        let techniqueCount = 3;

        function createParticles(container) {
            const particlesContainer = document.querySelector(container);
            if (!particlesContainer) return;
            particlesContainer.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 100 + 50 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 2 + 's';
                particle.style.animationDuration = (5 + Math.random() * 3) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        function updateSequence() {
            const data = stateData[currentState];
            const techniques = data.sequence.slice(0, techniqueCount);

            ['sequence', 'sequence-tablet'].forEach(id => {
                const container = document.getElementById(id);
                if (!container) return;
                container.innerHTML = '';

                // Shiho Start
                const shihoStart = createShihoCard();
                container.appendChild(shihoStart);

                // Technique Cards
                techniques.forEach((tech, idx) => {
                    const connector = document.createElement('div');
                    connector.className = 'connector';
                    container.appendChild(connector);

                    const card = createTechniqueCard(tech);
                    card.classList.add('entering');
                    container.appendChild(card);
                });

                // Shiho End
                const connector = document.createElement('div');
                connector.className = 'connector';
                container.appendChild(connector);

                const shihoEnd = createShihoCard();
                container.appendChild(shihoEnd);
            });
        }

        function createTechniqueCard(technique) {
            const card = document.createElement('div');
            card.className = 'technique-card';
            const tech = techniqueData[technique];
            card.innerHTML = `
                <div class="card-color-bar" style="background: ${tech.color};"></div>
                <div class="card-content">
                    <div>
                        <div class="card-name">${technique}</div>
                        <div class="card-element">${tech.element}</div>
                        <div class="card-feeling">${tech.feeling}</div>
                    </div>
                    <div class="card-icon">${tech.icon}</div>
                </div>
            `;
            return card;
        }

        function createShihoCard() {
            const card = document.createElement('div');
            card.className = 'technique-card shiho';
            card.innerHTML = `
                <div class="card-color-bar" style="background: rgba(122, 184, 154, 0.3);"></div>
                <div class="card-content" style="justify-content: center; align-items: center;">
                    <div class="card-shiho-icon">□</div>
                    <div class="card-name" style="margin-top: 8px; font-size: 10px;">Shiho</div>
                </div>
            `;
            return card;
        }

        function incrementTechniques() {
            if (techniqueCount < 4) {
                techniqueCount++;
                updateUI();
            }
        }

        function decrementTechniques() {
            if (techniqueCount > 1) {
                techniqueCount--;
                updateUI();
            }
        }

        function setState(state) {
            currentState = state;
            updateUI();

            // Update switcher dots
            document.querySelectorAll('.switcher-dot').forEach((dot, idx) => {
                dot.classList.toggle('active',
                    (idx === 0 && state === 'Stormy') ||
                    (idx === 1 && state === 'Flat') ||
                    (idx === 2 && state === 'Scattered') ||
                    (idx === 3 && state === 'Clear')
                );
            });
        }

        function updateUI() {
            const data = stateData[currentState];

            ['', '-tablet'].forEach(suffix => {
                const stateDot = document.getElementById('state-dot' + suffix);
                const stateName = document.getElementById('state-name' + suffix);
                const stateMsg = document.getElementById('state-message' + suffix);
                const counter = document.getElementById('counter' + suffix);

                if (stateDot) stateDot.style.background = data.color;
                if (stateName) stateName.textContent = currentState;
                if (stateMsg) stateMsg.textContent = data.message;
                if (counter) counter.textContent = techniqueCount;
            });

            updateSequence();
        }

        function switchDevice(device) {
            document.querySelectorAll('.device').forEach(d => d.classList.remove('active'));
            document.getElementById('device-' + device).classList.add('active');

            document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            createParticles('#particles-phone');
            createParticles('#particles-tablet');
        }

        function beginSession() {
            alert(`Beginning session with ${techniqueCount} techniques in ${currentState} state!\n\nSequence: ${stateData[currentState].sequence.slice(0, techniqueCount).join(' → ')}`);
        }

        // Initialize
        createParticles('#particles-phone');
        createParticles('#particles-tablet');
        updateSequence();
    </script>
</body>
</html>
