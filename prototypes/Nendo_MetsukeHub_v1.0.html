<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metsuke Hub · Prototype v1.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A12;color:#F5F0E8;font-family:'Crimson Pro',serif;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column}

/* ── Landscape note: designs are landscape-optimised ── */
.rotate-msg{display:none}

/* ── Topbar — matches Mushin exactly ── */
.topbar{height:44px;display:flex;align-items:center;padding:0 20px;border-bottom:0.5px solid rgba(245,240,232,0.07);flex-shrink:0}
.back{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.12em;color:rgba(245,240,232,0.35);background:none;border:none;cursor:pointer;padding:0;width:80px;text-align:left}
.back:hover{color:rgba(245,240,232,0.55)}
.tb-title{flex:1;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;color:rgba(245,240,232,0.28)}
.tb-right{width:80px;text-align:right;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.1em;color:rgba(141,184,212,0.3)}

/* ── Body ── */
.body{flex:1;display:flex;align-items:center;justify-content:center;padding:4px 8px;overflow:hidden}
.main-svg{width:100%;height:auto;max-width:760px;display:block}

/* ── Pulse animation for centre eye ── */
@keyframes eye-pulse{
  0%,100%{opacity:0.08}
  50%{opacity:0.16}
}
@keyframes iris-scan{
  0%,100%{r:14}
  50%{r:16}
}
@keyframes ring-breathe{
  0%,100%{stroke-opacity:0.06}
  50%{stroke-opacity:0.14}
}

/* ── Detail overlay ── */
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(8,8,14,0.88);align-items:center;justify-content:center;padding:24px}
.overlay.visible{display:flex}
.card{background:#0E0E18;border:0.5px solid rgba(141,184,212,0.15);border-radius:14px;padding:24px 28px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
.card-close{position:absolute;top:12px;right:16px;font-family:'Cinzel',serif;font-size:18px;color:rgba(245,240,232,0.3);cursor:pointer;background:none;border:none;padding:4px}
.card-close:hover{color:rgba(245,240,232,0.6)}
.card-title{font-family:'Cinzel',serif;font-size:16px;letter-spacing:0.08em;color:rgba(141,184,212,0.85);margin-bottom:4px}
.card-sub{font-size:10px;font-style:italic;color:rgba(245,240,232,0.3);margin-bottom:14px}
.card-section{margin-bottom:12px}
.card-section-title{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.18em;color:rgba(141,184,212,0.4);text-transform:uppercase;margin-bottom:5px}
.card-text{font-size:12px;color:rgba(245,240,232,0.5);line-height:1.55}
.card-list{list-style:none;padding:0}
.card-list li{font-size:11px;color:rgba(245,240,232,0.42);padding:3px 0 3px 10px;position:relative;line-height:1.35}
.card-list li::before{content:'';position:absolute;left:0;top:9px;width:3px;height:3px;border-radius:50%;background:rgba(141,184,212,0.3)}
.challenge-preview{margin-top:8px;padding:10px 12px;border-radius:8px;border:0.5px solid rgba(141,184,212,0.12);background:rgba(141,184,212,0.03)}
.preview-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.15em;color:rgba(141,184,212,0.35);margin-bottom:6px}
.preview-grid{display:grid;gap:4px}
</style>
</head>

<script>
const info = {

function showInfo(id) {
  const d = info[id];
  if (!d) return;
  const el = document.getElementById('card-content');
  let html = `<div class="card-title">${d.title}</div><div class="card-sub">${d.sub}</div>`;
  d.sections.forEach(s => {
    html += `<div class="card-section"><div class="card-section-title">${s.title}</div>`;
    if (s.text) html += `<div class="card-text">${s.text}</div>`;
    if (s.list) { html += '<ul class="card-list">'; s.list.forEach(li => html += `<li>${li}</li>`); html += '</ul>'; }
    html += '</div>';
  });
  el.innerHTML = html;
  document.getElementById('overlay').classList.add('visible');
}

function closeInfo() {
  document.getElementById('overlay').classList.remove('visible');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeInfo(); });
