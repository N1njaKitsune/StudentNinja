.hero::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(3,3,5,0.84) 0%, rgba(10,10,18,0.7) 50%, rgba(3,3,5,0.86) 100%);
}
.env-vignette {
  position:absolute; inset:0; z-index:1;
  background: radial-gradient(ellipse 120% 110% at 50% 50%, transparent 40%, rgba(3,3,5,0.7) 100%);
}
.screen { position:relative; z-index:2; width:100%; height:100%; }

/* ═══ Layout ═══ */
.layout { display:flex; height:100%; padding:0 30px; }

/* ─── Column separators ─── */
.col-sep {
  width:1px; align-self:stretch; margin:28px 0;
  background: linear-gradient(to bottom,
    transparent 0%,
    rgba(245,240,232,0.045) 20%,
    rgba(245,240,232,0.045) 80%,
    transparent 100%
  );
}

/* ════════════════════════════════════════
   LEFT COLUMN — Identity + Belt + Stripes + Stats
════════════════════════════════════════ */
.col-left {
  flex:0 0 240px;
  display:flex; flex-direction:column;
  align-items:center;
  padding:24px 8px 20px 4px;
  gap:0;
  justify-content:center;
  text-align:center;
}

/* Name */
.id-name {
  font-family:'Cinzel',serif; font-size:16px; font-weight:600;
  letter-spacing:0.07em; color:rgba(245,240,232,0.92);
  text-shadow:0 0 20px rgba(245,240,232,0.08);
  margin-bottom:3px;
}

/* Aura */
.id-aura {
  font-family:'Crimson Pro',serif; font-size:11.5px; font-weight:300; font-style:italic;
  color:rgba(210,178,90,0.72);
  margin-bottom:14px;
}

/* Belt display */
.id-belt-row {
  display:flex; align-items:center; gap:10px; justify-content:center;
  margin-bottom:3px;
}
.belt-bar {
  width:80px; height:13px; border-radius:3px; overflow:hidden; position:relative;
}
.belt-bar-fill { width:100%; height:100%; transition:background 0.3s; }
.belt-bar-stripe {
  position:absolute; left:0; right:0; top:50%; transform:translateY(-50%);
  height:35%; display:none;
}
.id-belt-name {
  font-family:'Cinzel',serif; font-size:11px; font-weight:600;
  letter-spacing:0.05em; color:rgba(245,240,232,0.8);
}
.id-belt-tier {
  font-family:'Cinzel',serif; font-size:7.5px; letter-spacing:0.13em;
  text-transform:uppercase; color:rgba(245,240,232,0.3);
  margin-bottom:12px;
}

/* Stripes */
.id-stripes {
  display:flex; gap:5px; justify-content:center;
  margin-bottom:16px;
}
.stripe-badge-wrap { display:flex; flex-direction:column; align-items:center; gap:1px; }
.stripe-badge-label {
  font-family:'Crimson Pro',serif; font-size:7px; font-weight:300;
  color:rgba(245,240,232,0.3); text-transform:uppercase; letter-spacing:0.05em;
}

/* Stats */
.id-stats {
  display:flex; gap:16px; justify-content:center;
}
.id-stat {
  display:flex; align-items:baseline; gap:4px;
}
.id-stat .val {
  font-family:'Cinzel',serif; font-size:13px; font-weight:600;
  color:rgba(245,240,232,0.75);
}
.id-stat .lbl {
  font-family:'Crimson Pro',serif; font-size:9px; font-weight:300; font-style:italic;
  color:rgba(245,240,232,0.35);
}

/* ════════════════════════════════════════
   CENTER COLUMN — Avatar
════════════════════════════════════════ */
.col-center {
  flex:1;
  display:flex; align-items:flex-end; justify-content:center;
  position:relative;
  min-width:0;
}

/* Ground — extends full width of center, slight perspective hint */
.ground {
  position:absolute; bottom:0; left:-20px; right:-20px; height:50px;
  background: linear-gradient(to top,
    rgba(245,240,232,0.035) 0%,
    rgba(245,240,232,0.01) 60%,
    transparent 100%
  );
  z-index:0;
}
.ground::after {
  content:''; position:absolute; bottom:8px; left:50%;
  transform:translateX(-50%);
  width:110px; height:2px; border-radius:50%;
  background:rgba(245,240,232,0.04);
  box-shadow: 0 0 12px 4px rgba(245,240,232,0.02);
}

/* Character — positioned slightly back (higher ground contact = further away feel) */
.char-wrap {
  position:relative; z-index:2;
  width:124px; height:295px;
  margin-bottom:10px;
  display:flex; align-items:flex-end; justify-content:center;
  overflow:visible;
}

/* Aura ring — placeholder */
/* .aura-ring replaced by canvas in v3.2 */
.aura-canvas {
  position:absolute;
  left:-40px; top:-40px;
  z-index:0;
  pointer-events:none;
  /* sizing set by JS based on device */
}
.frame.ipad .aura-canvas {
  left:-52px; top:-52px;
}

/* ════════════════════════════════════════
   RIGHT COLUMN — Nav pills
════════════════════════════════════════ */
.col-right {
  flex:0 0 230px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:9px; padding:16px 4px 16px 8px;
}

.nav-pill {
  width:auto; min-width:155px; padding:10px 13px;
  border-radius:12px;
  background: rgba(245,240,232,0.035);
  border:1px solid rgba(245,240,232,0.07);
  backdrop-filter: blur(12px);
  display:flex; align-items:center; gap:11px;
  cursor:pointer; transition:all 0.3s;
}
.nav-pill:hover {
  background:rgba(245,240,232,0.065);
  border-color:rgba(245,240,232,0.14);
  transform:translateX(3px);
}
.pill-icon {
  width:30px; height:30px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  background:rgba(245,240,232,0.05); flex-shrink:0;
}
.pill-icon svg { width:17px; height:17px; }
.pill-text { display:flex; flex-direction:column; gap:1px; }
.pill-title {
  font-family:'Cinzel',serif; font-size:10.5px; letter-spacing:0.05em;
  color:rgba(245,240,232,0.85);
}
.pill-sub {
  font-family:'Crimson Pro',serif; font-size:9.5px; font-weight:300; font-style:italic;
  color:rgba(245,240,232,0.35);
}

/* ═══ iPad ═══ */
.frame.ipad .col-left { flex:0 0 320px; padding:40px 24px 30px 40px; }
.frame.ipad .id-name { font-size:22px; }
.frame.ipad .id-aura { font-size:15px; margin-bottom:20px; }
.frame.ipad .belt-bar { width:110px; height:18px; }
.frame.ipad .id-belt-name { font-size:14px; }
.frame.ipad .id-belt-tier { font-size:9px; margin-bottom:16px; }
.frame.ipad .id-stripes { gap:8px; margin-bottom:22px; }
.frame.ipad .id-stat .val { font-size:17px; }
.frame.ipad .id-stat .lbl { font-size:11px; }
.frame.ipad .char-wrap { width:160px; height:440px; margin-bottom:24px; }
.frame.ipad .aura-ring { inset:-14px -24px -2px -24px; }
.frame.ipad .col-right { flex:0 0 300px; gap:12px; }
.frame.ipad .nav-pill { max-width:270px; padding:15px 18px; border-radius:14px; gap:13px; }
.frame.ipad .pill-icon { width:38px; height:38px; border-radius:10px; }
.frame.ipad .pill-icon svg { width:21px; height:21px; }
.frame.ipad .pill-title { font-size:13px; }
.frame.ipad .pill-sub { font-size:11px; }

/* ═══ Controls ═══ */
.controls { display:flex; gap:8px; margin-top:6px; }
.ctrl-btn {
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.12em; text-transform:uppercase;
  padding:6px 16px; border:1px solid rgba(245,240,232,0.15); border-radius:5px;
  background:rgba(245,240,232,0.04); color:rgba(245,240,232,0.5); cursor:pointer; transition:all 0.25s;
}
.ctrl-btn:hover { background:rgba(245,240,232,0.08); }
.ctrl-btn.active { background:rgba(245,240,232,0.1); color:rgba(245,240,232,0.9); border-color:rgba(245,240,232,0.3); }
.belt-swatch.active { box-shadow:0 0 6px rgba(245,240,232,0.4); transform:scale(1.2); }

/* ═══ In-frame belt switcher bar ═══ */
.switcher-bar {
  position:absolute; top:0; left:0; right:0; z-index:10;
  display:flex; align-items:center; justify-content:center; gap:6px;
  padding:5px 16px;
  background: linear-gradient(to bottom, rgba(3,3,5,0.6) 0%, rgba(3,3,5,0.3) 70%, transparent 100%);
}
.switcher-tier-label {
  font-family:'Cinzel',serif; font-size:6.5px; letter-spacing:0.1em;
  text-transform:uppercase; color:rgba(245,240,232,0.22);
  margin:0 2px;
}
.switcher-group { display:flex; gap:4px; align-items:center; }
.switcher-divider {
  width:1px; height:8px; margin:0 4px;
  background:rgba(245,240,232,0.08);
}
.frame.ipad .switcher-bar { padding:8px 24px; gap:10px; }
.frame.ipad .switcher-tier-label { font-size:8px; }
.frame.ipad .switcher-group { gap:6px; }
.frame.ipad .switcher-divider { height:12px; margin:0 6px; }
</style>
</head>

function elementSymbol(id, cx, cy, fill, scale) {
  var s = scale || 1, op = 'opacity="0.9"';
  if (id==='air') return '<g transform="translate('+(cx-5*s)+','+(cy-4*s)+') scale('+s+')" '+op+'><path d="M2,3 Q5,0 8,3" stroke="'+fill+'" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1,6 Q5,2.5 9,6" stroke="'+fill+'" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="5" cy="8.5" r="1" fill="'+fill+'"/></g>';
  if (id==='earth') return '<g transform="translate('+(cx-5*s)+','+(cy-5*s)+') scale('+s+')" '+op+'><polygon points="5,1 9,9 1,9" stroke="'+fill+'" stroke-width="1.5" fill="none" stroke-linejoin="round"/><line x1="2.5" y1="6.5" x2="7.5" y2="6.5" stroke="'+fill+'" stroke-width="1.5" stroke-linecap="round"/></g>';
  if (id==='water') return '<g transform="translate('+(cx-4.5*s)+','+(cy-5.5*s)+') scale('+s+')" '+op+'><path d="M4.5,1 Q8,4 8,6.5 Q8,10 4.5,10 Q1,10 1,6.5 Q1,4 4.5,1Z" stroke="'+fill+'" stroke-width="1.5" fill="none" stroke-linejoin="round"/></g>';
  if (id==='fire') return '<g transform="translate('+(cx-4.5*s)+','+(cy-5*s)+') scale('+s+')" '+op+'><path d="M4.5,0 Q7,3 6,5 Q8,3 6.5,7 Q5.5,10 4.5,10 Q3.5,10 2.5,7 Q1,3 3,5 Q2,3 4.5,0Z" stroke="'+fill+'" stroke-width="1.3" fill="none" stroke-linejoin="round"/></g>';
  return '';
}

function makeBadgeSVG(el, state) {
  var r=13,cx=14,cy=14,sz=28;
  var uid = el.id+'_'+Math.random().toString(36).slice(2,6);
  if (state==='ghost') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 28 28"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="rgba(245,240,232,0.04)" stroke="'+el.accentStroke+'" stroke-width="1" stroke-opacity="0.22"/></svg>';
  if (state==='full') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 28 28"><defs><radialGradient id="fg_'+uid+'" cx="38%" cy="32%"><stop offset="0%" stop-color="rgba(255,255,255,0.18)"/><stop offset="100%" stop-color="rgba(0,0,0,0.08)"/></radialGradient></defs><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+el.darkBg+'"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="url(#fg_'+uid+')"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+el.accentStroke+'" stroke-width="1.5"/>'+elementSymbol(el.id,cx,cy,el.accentFill)+'</svg>';
  if (state==='half') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 28 28"><defs><clipPath id="lh_'+uid+'"><rect x="0" y="0" width="14" height="28"/></clipPath><clipPath id="rh_'+uid+'"><rect x="14" y="0" width="14" height="28"/></clipPath></defs><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+el.darkBg+'" clip-path="url(#lh_'+uid+')"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="rgba(245,240,232,0.04)" clip-path="url(#rh_'+uid+')"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+el.accentStroke+'" stroke-width="1.5"/><line x1="14" y1="1" x2="14" y2="27" stroke="rgba(245,240,232,0.15)" stroke-width="0.5"/>'+elementSymbol(el.id,cx-3.5,cy,el.accentFill,0.75)+'</svg>';
  return '';
}

function renderStripes(belt, ss) {
  var c = document.getElementById('stripe-badges'); c.innerHTML='';
  if (belt.stripeRule==='shokyu') {
    ELEMENTS.forEach(function(el,i) {
      var w=document.createElement('div'); w.className='stripe-badge-wrap';
      w.innerHTML=makeBadgeSVG(el,ss[i]===1?'full':'ghost')+'<div class="stripe-badge-label">'+el.label+'</div>';
      c.appendChild(w);
    });
  } else if (belt.stripeRule==='chokyu') {
    ELEMENTS.forEach(function(el,i) {
      var h=ss[i]||[0,0]; var st=(h[0]&&h[1])?'full':h[0]?'half':'ghost';
      var w=document.createElement('div'); w.className='stripe-badge-wrap';
      w.innerHTML=makeBadgeSVG(el,st)+'<div class="stripe-badge-label">'+el.label+'</div>';
      c.appendChild(w);
    });
  } else {
    var airEl=ELEMENTS[0]; var earned=ss[0]||0;
    for(var j=0;j<4;j++) {
      var w=document.createElement('div'); w.className='stripe-badge-wrap';
      w.innerHTML=makeBadgeSVG(airEl,j<earned?'full':'ghost')+'<div class="stripe-badge-label">Air '+(j+1)+'</div>';
      c.appendChild(w);
    }
  }
}

function renderBelt(beltId) {
  currentBeltId=beltId;
  var belt=BELTS.find(function(b){return b.id===beltId}); if(!belt) return;

  document.getElementById('belt-fill').style.background=belt.colour;
  document.getElementById('belt-name').textContent=belt.name.replace(' Belt','');
  document.getElementById('belt-tier').textContent=belt.tierDisp;

  var s=document.getElementById('belt-stripe');
  if(belt.stripe){ s.style.display='block'; s.style.background=belt.stripe; }
  else { s.style.display='none'; }

  // Character belt
  document.getElementById('char-belt').setAttribute('fill',belt.colour);
  // Tint belt tails to match belt
  var tailColour = belt.colour + '55';
  var tailL = document.getElementById('char-belt-tail-l');
  var tailR = document.getElementById('char-belt-tail-r');
  if (tailL) tailL.setAttribute('stroke', tailColour);
  if (tailR) tailR.setAttribute('stroke', tailColour);
  var cs=document.getElementById('char-belt-stripe');
  if(belt.stripe){ cs.setAttribute('fill',belt.stripe); cs.setAttribute('opacity','0.6'); }
  else { cs.setAttribute('opacity','0'); }

  renderStripes(belt, DEMO_STRIPES[beltId]||[]);

  document.querySelectorAll('.belt-swatch').forEach(function(sw){
    sw.classList.toggle('active',sw.dataset.id===beltId);
  });
}

function buildSwitchers() {
  var tiers={shokyu:[],chokyu:[],jokyu:[]};
  BELTS.forEach(function(b){tiers[b.tier.toLowerCase()].push(b)});
  ['shokyu','chokyu','jokyu'].forEach(function(tier){
    var c=document.getElementById('switcher-'+tier);
    tiers[tier].forEach(function(belt){
      var sw=document.createElement('div');
      sw.className='belt-swatch'+(belt.id===currentBeltId?' active':'');
      sw.dataset.id=belt.id;
      sw.style.cssText='width:18px;height:8px;border-radius:2px;cursor:pointer;transition:all 0.2s;background:'+belt.colour+';border:1px solid rgba(245,240,232,0.15);';
      if(belt.stripe) sw.style.borderColor=belt.stripe+'99';
      sw.onclick=function(){ renderBelt(belt.id); };
      c.appendChild(sw);
    });
  });
}

function setDevice(type) {
  document.getElementById('frame').className='frame '+(type==='ipad'?'ipad':'');
  document.getElementById('btn-iphone').classList.toggle('active',type==='iphone');
  document.getElementById('btn-ipad').classList.toggle('active',type==='ipad');
}

buildSwitchers();
renderBelt('shin-mori');

/* ════════════════════════════════════════════════════════════
   AURA CANVAS SYSTEM — v3.2 (Static proof of concept)
   Goal: prove the aura conforms to the body silhouette shape.
   Stage: Kogane (3), gold. Density: 0.60 fixed.
   No animation yet — that comes in v3.3.
   ════════════════════════════════════════════════════════════ */

/* ── Stage data (full 13 stages, ready for v3.3+) ── */
var AURA_STAGES = [
  { name:'Tomoshibi', rgb:[250,246,238] },
  { name:'Hikari',    rgb:[245,237,208] },
  { name:'Kogane',    rgb:[240,208,96]  },
  { name:'Kohaku',    rgb:[232,184,48]  },
  { name:'Kagayaki',  rgb:[216,144,24]  },
  { name:'Moeru',     rgb:[200,108,8]   },
  { name:'Akane',     rgb:[192,80,32]   },
  { name:'Honoo',     rgb:[168,48,24]   },
  { name:'Homura',    rgb:[168,50,30]   },
  { name:'Shinku',    rgb:[160,64,64]   },
  { name:'Kurenai',   rgb:[160,64,112]  },
  { name:'Tasogare',  rgb:[144,80,176]  },
  { name:'—',         rgb:[176,96,255]  },
];

/* ── Density formula (mirrors aura prototype v1.1) ── */
function auraDensity(xp, stageIndex) {
  var raw = 1 - Math.pow(1 - xp / 100, 2);
  return stageIndex === 0 ? 0.15 + raw * 0.85 : 0.25 + raw * 0.75;
}

/* ── Silhouette path in canvas-local coordinates (iPhone base, 23 points) ── */
var SIL_BASE = [
  /* hair */   {x:99,  y:63},  {x:74,  y:67},
  /* head L */ {x:72,  y:94},
  /* L shoulder → hand → wrist */
               {x:67,  y:158}, {x:65,  y:193},
               {x:66,  y:213}, {x:72,  y:224},
  /* L hip → foot */
               {x:73,  y:255}, {x:76,  y:297},
               {x:72,  y:327}, {x:72,  y:336},
               {x:86,  y:339},
  /* R foot → hip */
               {x:120, y:338}, {x:125, y:333},
               {x:120, y:323}, {x:118, y:297},
               {x:124, y:255},
  /* R wrist → hand → shoulder */
               {x:124, y:222}, {x:131, y:211},
               {x:133, y:192}, {x:129, y:157},
  /* head R */ {x:126, y:93},
  /* hair */   {x:124, y:67},
];

var SIL_CX = 99;
var SIL_CY = 219;
var SIL_SCALE_IPAD = 160 / 124;   /* 1.29 */

/* ── Layer config: 5 layers inner → outer ── */
var LAYERS = [
  { scale:1.00, blur:5,  maxOp:0.42, threshold:0.00 },
  { scale:1.08, blur:12, maxOp:0.30, threshold:0.15 },
  { scale:1.18, blur:22, maxOp:0.20, threshold:0.35 },
  { scale:1.30, blur:34, maxOp:0.12, threshold:0.55 },
  { scale:1.44, blur:48, maxOp:0.07, threshold:0.75 },
];

/* ── Per-point noise descriptors (randomised once at startup) ──
   Each point gets independent x/y frequencies and phase offsets
   so movement is organic rather than synchronised.              ── */
var NOISE_PHASES = SIL_BASE.map(function() {
  return {
    px: Math.random() * Math.PI * 2,
    py: Math.random() * Math.PI * 2,
    fx: 0.35 + Math.random() * 0.55,
    fy: 0.30 + Math.random() * 0.50,
  };
});

/* Noise amplitude in canvas px (before device scale).
   Small enough to stay organic; larger at surge. */
var NOISE_AMP_BASE = 2.0;

/* ── Animation state ── */
var _animFrame = null;
var _animStage = 2;
var _animXP    = 60;

/* ── Breathing scale multiplier for a layer at time t ──
   Returns a value near 1.0.
   • Speed: ~0.9 rad/s gives a gentle ~6-second breath cycle.
   • Each layer is phase-offset so they don't all peak together.
   • Amplitude grows with density for a living-flame feel.       ── */
function breathMult(layerIndex, t, density) {
  var speed = 0.0015;           /* rad/ms — ~4s cycle, clearly visible */
  var phase = layerIndex * 0.42;
  var amp   = 0.055 + density * 0.10;  /* ~6–16% scale swing per layer */
  return 1 + amp * Math.sin(t * speed + phase);
}

/* ── Apply sine noise to a single point ──
   Uses time-varying sine in x and y with independent frequencies. ── */
function noisedPt(pt, np, t, noiseAmp) {
  var s = 0.00085;  /* rad/ms */
  return {
    x: pt.x + Math.sin(t * s * np.fx + np.px) * noiseAmp,
    y: pt.y + Math.sin(t * s * np.fy + np.py) * noiseAmp,
  };
}

/* ── Draw one glow layer onto mainCtx ── */
function drawGlowLayer(mainCtx, pts, cx, cy, layer, r, g, b, density, bMult) {
  if (density < layer.threshold) return;

  var progress = Math.min((density - layer.threshold) / (1 - layer.threshold + 0.001), 1);
  var opacity  = progress * layer.maxOp;
  var s        = layer.scale * bMult;  /* breathing-scaled dilation */

  var w = mainCtx.canvas.width;
  var h = mainCtx.canvas.height;

  var off    = new OffscreenCanvas(w, h);
  var offCtx = off.getContext('2d');
  offCtx.filter    = 'blur(' + layer.blur + 'px)';
  offCtx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',1)';

  offCtx.beginPath();
  pts.forEach(function(p, i) {
    var x = cx + (p.x - cx) * s;
    var y = cy + (p.y - cy) * s;
    if (i === 0) offCtx.moveTo(x, y);
    else         offCtx.lineTo(x, y);
  });
  offCtx.closePath();
  offCtx.fill();

  mainCtx.save();
  mainCtx.globalAlpha = opacity;
  mainCtx.drawImage(off, 0, 0);
  mainCtx.restore();
}

/* ── Size the canvas to match the current device frame (call once on init/switch) ── */
function sizeCanvas() {
  var canvas   = document.getElementById('aura-canvas');
  if (!canvas) return;
  var isIpad   = document.getElementById('frame').classList.contains('ipad');
  var pad      = isIpad ? 52 : 40;
  var charW    = isIpad ? 160 : 124;
  var charH    = isIpad ? 440 : 295;
  canvas.width        = charW + pad * 2;
  canvas.height       = charH + pad * 2;
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
  canvas.style.left   = (-pad) + 'px';
  canvas.style.top    = (-pad) + 'px';
}

/* ── Full aura render for a single frame ── */
function renderAura(stageIndex, xp, t) {
  var canvas = document.getElementById('aura-canvas');
  if (!canvas) return;

  var isIpad   = document.getElementById('frame').classList.contains('ipad');
  var devScale = isIpad ? SIL_SCALE_IPAD : 1.0;
  var pad      = isIpad ? 52 : 40;
  var cw = canvas.width;
  var ch = canvas.height;

  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, cw, ch);

  var density = auraDensity(xp, stageIndex);
  /* Noise amplitude scales up toward surge */
  var noiseAmp = NOISE_AMP_BASE * (0.6 + density * 0.9) * devScale;

  /* Build time-perturbed, device-scaled silhouette points */
  var pts = SIL_BASE.map(function(p, i) {
    var np = noisedPt(p, NOISE_PHASES[i], t, noiseAmp / devScale);
    return {
      x: np.x * devScale + (pad - 40 * devScale),
      y: np.y * devScale + (pad - 40 * devScale),
    };
  });
  var cx = SIL_CX * devScale + (pad - 40 * devScale);
  var cy = SIL_CY * devScale + (pad - 40 * devScale);

  var stage = AURA_STAGES[stageIndex] || AURA_STAGES[2];
  var rgb   = stage.rgb;

  LAYERS.forEach(function(layer, li) {
    var bm = breathMult(li, t, density);
    drawGlowLayer(ctx, pts, cx, cy, layer, rgb[0], rgb[1], rgb[2], density, bm);
  });
}

/* ── RAF animation loop ── */
function _animTick(ts) {
  renderAura(_animStage, _animXP, ts);
  _animFrame = requestAnimationFrame(_animTick);
}

/* Public: start (or restart) the animation for a given stage+xp */
function startAura(stageIndex, xp) {
  _animStage = stageIndex;
  _animXP    = xp;
  if (_animFrame) cancelAnimationFrame(_animFrame);
  sizeCanvas();
  _animFrame = requestAnimationFrame(_animTick);
}

/* Patch setDevice to resize canvas then restart aura */
var _origSetDevice = setDevice;
setDevice = function(type) {
  _origSetDevice(type);
  setTimeout(function() {
    sizeCanvas();
    startAura(_animStage, _animXP);
  }, 50);
};

/* Boot: Stage 3 (Kogane), 60% XP */
startAura(2, 60);

</script>
