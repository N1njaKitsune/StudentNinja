.env-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 28%, rgba(0,0,0,0.58) 100%);
  z-index: 2;
  pointer-events: none;
}

.env-overlay {
  position: absolute; inset: 0;
  background: rgba(6,10,8,0.32);
  z-index: 3;
  pointer-events: none;
}

.env-texture {
  position: absolute; inset: 0;
  background: none;
  opacity: 0.025;
  z-index: 4;
  pointer-events: none;
}

/* ── Particle Canvas ── */
#particle-canvas {
  position: absolute; inset: 0;
  z-index: 5;
  pointer-events: none;
}

/* ── UI Layer ── */
.ui-layer {
  position: absolute; inset: 0;
  z-index: 10;
}

/* ── Layout ── */
.bt-layout {
  position: absolute;
  inset: 0 0 44px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 32px;
  gap: 0;
}

/* ── Header ── */
.bt-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 22px;
}

.bt-kanji {
  font-family: serif;
  font-size: 28px;
  line-height: 1;
  color: rgba(122,184,154,0.85);
  text-shadow: 0 0 22px rgba(122,184,154,0.4);
  margin-bottom: 4px;
}

.bt-title {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(240,235,224,0.8);
  margin-bottom: 6px;
}

.bt-subtitle {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 10.5px;
  color: rgba(240,235,224,0.38);
  text-align: center;
  max-width: 520px;
  letter-spacing: 0.02em;
}

/* ── Element Cards ── */
.bt-elements {
  display: flex;
  gap: 14px;
}

.bt-element-card {
  width: 168px;
  padding: 16px 12px 14px;
  background: rgba(6,10,8,0.45);
  backdrop-filter: blur(14px);
  border: 0.5px solid rgba(255,255,255,0.07);
  border-radius: 7px;
  text-align: center;
  cursor: pointer;
  transition: all 0.28s;
  text-decoration: none;
  display: block;
  animation: cardFloat 5s ease-in-out infinite;
}

.bt-element-card:nth-child(1) { border-top: 2px solid var(--c-kaze); animation-delay: 0s;    --c-kaze: rgba(140,200,185,0.5); }
.bt-element-card:nth-child(2) { border-top: 2px solid var(--c-chi);  animation-delay: 0.6s;  --c-chi:  rgba(190,165,110,0.5); }
.bt-element-card:nth-child(3) { border-top: 2px solid var(--c-mizu); animation-delay: 1.2s;  --c-mizu: rgba(110,160,210,0.5); }
.bt-element-card:nth-child(4) { border-top: 2px solid var(--c-hi);   animation-delay: 1.8s;  --c-hi:   rgba(212,130,100,0.5); }

<script>
/* ── Particle System — multi-element mixed motes ── */
(function(){
  var canvas = document.getElementById('particle-canvas');
  var ctx    = canvas.getContext('2d');
  var W = 844, H = 390;

  /* One colour per element */
  var COLOURS = [
    [140,200,185],  /* Kaze — teal */
    [200,175,110],  /* Chi  — amber */
    [110,165,215],  /* Mizu — blue */
    [215,130,100]   /* Hi   — orange */
  ];

  var MOTE_COUNT = 24;
  var motes = [];

  function rand(a,b){ return a + Math.random()*(b-a); }

  function makeMote(){
    var c = COLOURS[Math.floor(Math.random()*COLOURS.length)];
    return {
      x:     rand(0, W),
      y:     rand(H*0.2, H),
      vy:    rand(-0.18, -0.05),
      vx:    rand(-0.04, 0.04),
      r:     rand(0.5, 1.4),
      life:  rand(0, 1),
      speed: rand(0.003, 0.006),
      c:     c
    };
  }

  for(var i=0; i<MOTE_COUNT; i++){
    motes.push(makeMote());
    motes[i].life = Math.random();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    motes.forEach(function(m){
      m.life += m.speed;
      if(m.life > 1){ Object.assign(m, makeMote()); m.life=0; }

      var a = m.life < 0.15 ? m.life/0.15 :
              m.life > 0.75 ? 1-(m.life-0.75)/0.25 : 1;
      a *= 0.38;
      m.x += m.vx; m.y += m.vy;

      var col = m.c;
      var g = ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.r*2.5);
      g.addColorStop(0,'rgba('+col[0]+','+col[1]+','+col[2]+','+a+')');
      g.addColorStop(1,'rgba('+col[0]+','+col[1]+','+col[2]+',0)');
      ctx.beginPath();
      ctx.arc(m.x,m.y,m.r*2.5,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
