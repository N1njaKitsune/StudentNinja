<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Nendō Home · v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #050508;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px 24px 56px;
  gap: 24px;
  font-family: 'Crimson Pro', serif;
  color: #F5F0E8;
}

/* ── Device toggle ── */
.device-toggle {
  display: flex;
  gap: 8px;
  z-index: 50;
}
.device-toggle button {
  background: rgba(122,184,154,0.12);
  border: 0.5px solid rgba(122,184,154,0.25);
  color: rgba(245,240,232,0.5);
  padding: 5px 14px;
  cursor: pointer;
  font-size: 10px;
  border-radius: 4px;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.1em;
  transition: all 0.2s;
}
.device-toggle button.active {
  background: rgba(122,184,154,0.25);
  color: rgba(122,184,154,0.9);
  border-color: rgba(122,184,154,0.5);
}

/* ── Frame ── */
.frame {
  position: relative;
  overflow: hidden;
  border-radius: 4px;
  box-shadow: 0 0 0 1.5px rgba(245,240,232,0.06), 0 24px 80px rgba(0,0,0,0.7);
  transition: all 0.4s ease;
}
.frame.iphone { width: 844px; height: 390px; }
.frame.ipad   { width: 1194px; height: 834px; }

/* Door colour panels — coloured light in each bay */
.doors {
  position: absolute; inset: 0; z-index: 2;
  display: flex;
}
.door {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* Door glow — the coloured light coming through each opening */
.door-glow {
  position: absolute; inset: 0;
  opacity: 0.82;
  transition: opacity 0.4s ease;
}
.door:hover .door-glow { opacity: 1; }

/* Metsuke — cool blue, clear perception */
.door-metsuke .door-glow {
  background:
    radial-gradient(ellipse at 50% 30%, rgba(141,184,212,0.22) 0%, rgba(100,150,200,0.10) 40%, transparent 70%),
    radial-gradient(ellipse at 50% 80%, rgba(80,120,180,0.08) 0%, transparent 60%),
    linear-gradient(180deg, rgba(20,30,60,0.72) 0%, rgba(15,25,50,0.45) 40%, rgba(10,16,35,0.60) 100%);
}
/* Mushin — deep forest green, stillness */
.door-mushin .door-glow {
  background:
    radial-gradient(ellipse at 50% 35%, rgba(100,170,120,0.25) 0%, rgba(60,130,80,0.12) 40%, transparent 70%),
    radial-gradient(ellipse at 50% 75%, rgba(40,100,60,0.10) 0%, transparent 60%),
    linear-gradient(180deg, rgba(10,25,15,0.72) 0%, rgba(8,22,12,0.45) 40%, rgba(6,18,10,0.65) 100%);
}
/* Tachi — warm crimson, decisive fire */
.door-tachi .door-glow {
  background:
    radial-gradient(ellipse at 50% 30%, rgba(212,120,80,0.28) 0%, rgba(180,80,50,0.14) 40%, transparent 68%),
    radial-gradient(ellipse at 50% 75%, rgba(160,60,40,0.12) 0%, transparent 60%),
    linear-gradient(180deg, rgba(35,12,8,0.72) 0%, rgba(28,10,6,0.45) 40%, rgba(20,8,5,0.65) 100%);
}

/* Floating particles of light in each door bay */
.door-particles {
  position: absolute; inset: 0; overflow: hidden;
  pointer-events: none; z-index: 1;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: particleDrift linear infinite;
  opacity: 0;
}
@keyframes particleDrift {
  0%   { transform: translateY(100%) translateX(0);    opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-20%) translateX(20px); opacity: 0; }
}

/* Pillar dividers — between door bays, behind UI */
.pillar {
  position: absolute; top: 0; bottom: 0;
  width: 22px;
  background: linear-gradient(90deg,
    rgba(6,4,3,0.0) 0%,
    rgba(22,15,10,0.88) 30%,
    #1A0F0A 50%,
    rgba(22,15,10,0.88) 70%,
    rgba(6,4,3,0.0) 100%
  );
  z-index: 4;
  pointer-events: none;
}
.pillar::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 50%; transform: translateX(-50%);
  width: 2px;
  background: linear-gradient(180deg,
    rgba(60,40,25,0.0) 0%,
    rgba(60,40,25,0.5) 15%,
    rgba(80,55,35,0.6) 50%,
    rgba(60,40,25,0.5) 85%,
    rgba(60,40,25,0.0) 100%
  );
}
.pillar-1 { left: calc(33.33% - 11px); }
.pillar-2 { left: calc(66.66% - 11px); }

/* Environment overlays */
.env-vignette {
  position: absolute; inset: 0; z-index: 5;
  background: radial-gradient(ellipse at center, transparent 25%, rgba(5,4,6,0.50) 100%);
  pointer-events: none;
}
.env-texture {
  position: absolute; inset: 0; z-index: 6;
  opacity: 0.025;
  background: none;
  pointer-events: none;
}
.env-warmth {
  position: absolute; inset: 0; z-index: 7;
  background: radial-gradient(ellipse at 50% 85%, rgba(160,100,60,0.05) 0%, transparent 60%);
  pointer-events: none;
}

/* ── UI Layer ── */
.ui-layer {
  position: absolute; inset: 0; z-index: 20;
}

/* Screen title */
.screen-title {
  position: absolute;
  top: 18px; left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.22em;
  color: rgba(245,240,232,0.38);
  text-transform: uppercase;
  white-space: nowrap;
  pointer-events: none;
}

/* Discipline cards — sit bottom-centre of each door bay */
.disc-cards {
  position: absolute;
  bottom: 46px;
  left: 0; right: 0;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: end;
}

.disc-card {
  width: 145px;
  justify-self: center;
  text-align: center;
  background: rgba(8,8,14,0.40);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 0.5px solid rgba(245,240,232,0.07);
  border-radius: 8px;
  border-top: 2px solid transparent;
  padding: 16px 12px 12px;
  cursor: pointer;
  transition: all 0.35s ease;
  animation: cardFloat 4s ease-in-out infinite;
}
.disc-card.metsuke { border-top-color: rgba(141,184,212,0.65); animation-delay: 0s;   }
.disc-card.mushin  { border-top-color: rgba(100,170,120,0.65); animation-delay: 0.6s; }
.disc-card.tachi   { border-top-color: rgba(212,120,80,0.65);  animation-delay: 1.2s; }

@keyframes cardFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

.disc-card:hover { animation: none; background: rgba(8,8,14,0.65); transform: translateY(-6px); }
.disc-card.metsuke:hover {
  border-color: rgba(141,184,212,0.28); border-top-color: rgba(141,184,212,0.9);
  box-shadow: 0 10px 40px rgba(141,184,212,0.18), 0 0 20px rgba(141,184,212,0.08);
}
.disc-card.mushin:hover {
  border-color: rgba(100,170,120,0.28); border-top-color: rgba(100,170,120,0.9);
  box-shadow: 0 10px 40px rgba(100,170,120,0.18), 0 0 20px rgba(100,170,120,0.08);
}
.disc-card.tachi:hover {
  border-color: rgba(212,120,80,0.28); border-top-color: rgba(212,120,80,0.9);
  box-shadow: 0 10px 40px rgba(212,120,80,0.18), 0 0 20px rgba(212,120,80,0.08);
}

/* Unfocused cards dim when a sibling is hovered */
.disc-cards:has(.disc-card:hover) .disc-card:not(:hover) {
  opacity: 0.45;
  transform: scale(0.97);
  filter: brightness(0.7);
}

.card-kanji {
  font-family: serif;
  font-size: 26px;
  letter-spacing: 0.04em;
  margin-bottom: 7px;
  opacity: 0.85;
  line-height: 1;
}
.metsuke .card-kanji { color: rgba(141,184,212,1); text-shadow: 0 0 24px rgba(141,184,212,0.35); }
.mushin  .card-kanji { color: rgba(100,170,120,1); text-shadow: 0 0 24px rgba(100,170,120,0.35); }
.tachi   .card-kanji { color: rgba(212,120,80,1);  text-shadow: 0 0 24px rgba(212,120,80,0.35);  }

.card-name {
  font-family: 'Cinzel', serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.metsuke .card-name { color: rgba(141,184,212,0.9); }
.mushin  .card-name { color: rgba(122,184,154,0.9); }
.tachi   .card-name { color: rgba(212,130,106,0.9); }

.card-desc {
  font-family: 'Crimson Pro', serif;
  font-size: 9px; font-style: italic;
  color: rgba(245,240,232,0.52);
  line-height: 1.3;
}

/* Nav bar */
.nav-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 32px;
  display: flex; align-items: center;
  padding: 0 16px;
  background: rgba(8,8,14,0.35);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 0.5px solid rgba(245,240,232,0.05);
  z-index: 30;
}
.nav-back {
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 0.12em;
  color: rgba(245,240,232,0.38);
  cursor: pointer; width: 70px;
  text-decoration: none;
  transition: color 0.2s;
}
.nav-back:hover { color: rgba(245,240,232,0.7); }
.nav-title {
  flex: 1; text-align: center;
  font-family: 'Cinzel', serif;

}

/* ── DEV MODE ────────────────────────────────────────────────────────────────
   Activate by opening any screen with ?dev in the URL, e.g.
     StudentProfile_v4.1.html?dev
   Dev mode persists across all screens for the tab session.
   In demo mode (default): frame fills the viewport, dev controls hidden.
──────────────────────────────────────────────────────────────────────────── */
html:not(.dev-mode) .device-toggle,

html:not(.dev-mode) .frame {

</style>
<script>
/* DEV MODE — StudentNinja · set class on <html> before first paint */
(function () {
  var isDev = new URLSearchParams(location.search).has('dev');
  if (isDev) sessionStorage.setItem('ninja_dev', '1');
  if (isDev || sessionStorage.getItem('ninja_dev') === '1') {
    document.documentElement.classList.add('dev-mode');
  }

</script>
</head>
<body>

<div class="device-toggle">
  <button id="btn-iphone" class="active" onclick="setDevice('iphone')">iPhone</button>
  <button id="btn-ipad"                  onclick="setDevice('ipad')">iPad</button>
</div>

<div class="frame iphone" id="frame">

  <!-- ══ BACKGROUND ENVIRONMENT ══ -->

  <!-- L0: Sky — deepest background layer -->
  <div class="bg-sky"></div>

  <!-- Door colour panels — coloured light in each bay, sit in front of sky -->
  <div class="doors">
    <div class="door door-metsuke">
      <div class="door-glow"></div>
      <div class="door-particles" id="particles-metsuke"></div>
      <!-- Door frame outline hint -->
      <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.15;pointer-events:none" viewBox="0 0 281 390" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="18" y="28" width="245" height="280" rx="1" fill="none" stroke="rgba(141,184,212,0.5)" stroke-width="0.8"/>
        <rect x="24" y="34" width="233" height="268" rx="1" fill="none" stroke="rgba(141,184,212,0.25)" stroke-width="0.5"/>
      </svg>
    </div>
    <div class="door door-mushin">
      <div class="door-glow"></div>
      <div class="door-particles" id="particles-mushin"></div>
      <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.15;pointer-events:none" viewBox="0 0 281 390" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="18" y="28" width="245" height="280" rx="1" fill="none" stroke="rgba(100,170,120,0.5)" stroke-width="0.8"/>
        <rect x="24" y="34" width="233" height="268" rx="1" fill="none" stroke="rgba(100,170,120,0.25)" stroke-width="0.5"/>
      </svg>
    </div>
    <div class="door door-tachi">
      <div class="door-glow"></div>
      <div class="door-particles" id="particles-tachi"></div>
      <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.15;pointer-events:none" viewBox="0 0 281 390" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="18" y="28" width="245" height="280" rx="1" fill="none" stroke="rgba(212,120,80,0.5)" stroke-width="0.8"/>
        <rect x="24" y="34" width="233" height="268" rx="1" fill="none" stroke="rgba(212,120,80,0.25)" stroke-width="0.5"/>
      </svg>

  </div>

  <!-- L3: Dojo frame — architectural overlay in front of door glows -->
  <div class="bg-dojo-frame"></div>

</div>

<div class="version-label">Nendō Home · v4.0</div>

<script>
/* ── Device toggle ── */
function setDevice(type) {
  document.getElementById('frame').className = 'frame ' + type;
  document.getElementById('btn-iphone').classList.toggle('active', type === 'iphone');
  document.getElementById('btn-ipad').classList.toggle('active', type === 'ipad');
}

/* ── Navigation ── */
function navigate(file) {
  window.location.href = file;
}

/* ── Floating particles ── */
var PARTICLES = {
  metsuke: { color: '141,184,212', count: 12 },
  mushin:  { color: '100,170,120', count: 14 },
  tachi:   { color: '212,120,80',  count: 10 }
};
var particlesOn = true;

function spawnParticles() {
  if (!particlesOn) return;
  Object.keys(PARTICLES).forEach(function(key) {
    var container = document.getElementById('particles-' + key);
    if (!container) return;
    var cfg = PARTICLES[key];
    if (container.children.length > cfg.count) return;
    var p = document.createElement('div');
    p.className = 'particle';
    var size     = 1 + Math.random() * 2;
    var left     = 10 + Math.random() * 80;
    var duration = 6 + Math.random() * 10;
    var delay    = Math.random() * -duration;
    p.style.cssText = [
      'width:'    + size + 'px',
      'height:'   + size + 'px',
      'left:'     + left + '%',
      'bottom:0',
      'background:rgba(' + cfg.color + ',' + (0.3 + Math.random() * 0.4) + ')',
      'box-shadow:0 0 ' + (size * 3) + 'px rgba(' + cfg.color + ',0.5)',
      'animation-duration:' + duration + 's',
      'animation-delay:'    + delay    + 's'
    ].join(';');
    container.appendChild(p);
  });
  setTimeout(spawnParticles, 800);
}
spawnParticles();

/* ── Dev toggles ── */
function toggleParticles(btn) {
  particlesOn = !particlesOn;
  btn.classList.toggle('active', particlesOn);
  document.querySelectorAll('.door-particles').forEach(function(c) {
    c.style.display = particlesOn ? '' : 'none';
  });
  if (particlesOn) spawnParticles();
}
function toggleLabels(btn) {
  var labels = document.querySelector('.disc-cards');
  var title  = document.querySelector('.screen-title');
  var on = labels.style.opacity !== '0';
  labels.style.opacity = on ? '0' : '1';
  title.style.opacity  = on ? '0' : '1';
  btn.classList.toggle('active', !on);
}
function toggleNav(btn) {
  var nav = document.querySelector('.nav-bar');
  var on  = nav.style.opacity !== '0';
  nav.style.opacity = on ? '0' : '1';
  nav.style.pointerEvents = on ? 'none' : '';
  btn.classList.toggle('active', !on);
}
</script>
</body>
