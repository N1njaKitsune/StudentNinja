<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Nendō · Entry Prototype v2.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#0A0A12;
  color:#F5F0E8;
  font-family:'Crimson Pro',serif;
  overflow:hidden;
  width:100vw;
  height:100vh;
  position:relative;
}

/* ══════════════════════════════════════════ */
/* LAYER 2 — ENVIRONMENTAL ATMOSPHERE       */
/* ══════════════════════════════════════════ */

/* Ambient gradient — warm glow from below (embers beneath wood) */
.env-gradient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 120% 60% at 50% 110%, rgba(200,149,26,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 80% 40% at 50% 105%, rgba(168,48,24,0.025) 0%, transparent 60%),
    linear-gradient(180deg, rgba(10,10,18,0) 0%, rgba(10,10,18,0) 60%, rgba(30,20,12,0.03) 100%);
}

/* Organic texture overlay — paper grain feel */
.env-texture{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* Particle canvas — floating embers */
canvas#particles{
  position:fixed;inset:0;z-index:2;pointer-events:none;
}

/* ══════════════════════════════════════════ */
/* PROTOTYPE CONTROLS                        */
/* ══════════════════════════════════════════ */

.proto-label{position:fixed;top:12px;left:12px;z-index:200;font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.2em;color:rgba(245,240,232,0.15);text-transform:uppercase}
.switcher{position:fixed;top:12px;right:12px;z-index:200;display:flex;gap:6px;background:rgba(8,8,14,0.9);border:0.5px solid rgba(245,240,232,0.1);border-radius:8px;padding:4px}
.switcher button{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.12em;padding:5px 12px;border-radius:6px;border:none;cursor:pointer;transition:all 0.2s;background:transparent;color:rgba(245,240,232,0.35)}
.switcher button.active{background:rgba(122,184,154,0.15);color:rgba(122,184,154,0.8);border:0.5px solid rgba(122,184,154,0.3)}
.switcher button:hover:not(.active){color:rgba(245,240,232,0.55)}
.restart-btn{position:fixed;bottom:12px;right:12px;z-index:200;font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.12em;padding:6px 14px;border-radius:6px;border:0.5px solid rgba(245,240,232,0.12);background:rgba(245,240,232,0.03);color:rgba(245,240,232,0.3);cursor:pointer;transition:all 0.25s}
.restart-btn:hover{border-color:rgba(245,240,232,0.25);color:rgba(245,240,232,0.5)}

/* ══════════════════════════════════════════ */
/* FULL-SCREEN LAYERS                        */
/* ══════════════════════════════════════════ */

.layer{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  z-index:10;
  opacity:1;
  transition:opacity 0.6s cubic-bezier(0.22,0.61,0.36,1);
}
.layer.hidden{opacity:0;pointer-events:none}

/* ══════════════════════════════════════════ */
/* PROFILE LAYER — starting state            */
/* ══════════════════════════════════════════ */

.profile-layer{background:rgba(18,18,24,0.85);z-index:30}
.profile-card{
  display:flex;flex-direction:row;align-items:center;gap:24px;
  padding:22px 36px;border-radius:16px;
  border:0.5px solid rgba(245,240,232,0.08);
  background:rgba(245,240,232,0.015);
  backdrop-filter:blur(20px);
  max-width:560px;
  animation:cardFloat 4s cubic-bezier(0.37,0,0.63,1) infinite;
}
@keyframes cardFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-3px)}
}

.profile-avatar{
  width:56px;height:56px;border-radius:50%;
  background:rgba(122,184,154,0.06);
  border:1px solid rgba(122,184,154,0.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  position:relative;
}
/* Aura glow behind avatar */
.profile-avatar::before{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  background:radial-gradient(circle,rgba(250,246,238,0.06) 0%,transparent 70%);
  animation:auraPulse 4s cubic-bezier(0.37,0,0.63,1) infinite;
}
@keyframes auraPulse{
  0%,100%{opacity:0.5;transform:scale(1)}
  50%{opacity:1;transform:scale(1.08)}
}

.profile-avatar svg{width:24px;height:24px}
.profile-info{flex:1}
.profile-name{font-family:'Cinzel',serif;font-size:14px;letter-spacing:0.06em;margin-bottom:3px}
.profile-rank{font-size:11px;font-style:italic;color:rgba(245,240,232,0.35)}

.enter-btn{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.18em;
  padding:10px 24px;border-radius:10px;
  border:0.5px solid rgba(141,184,212,0.3);
  background:rgba(141,184,212,0.04);
  color:rgba(141,184,212,0.75);
  cursor:pointer;
  transition:all 0.35s cubic-bezier(0.22,0.61,0.36,1);
  display:inline-flex;align-items:center;gap:8px;flex-shrink:0;white-space:nowrap;
  position:relative;overflow:hidden;
}
.enter-btn::before{
  content:'';position:absolute;inset:0;border-radius:10px;
  background:radial-gradient(circle at 50% 50%,rgba(141,184,212,0.08),transparent 70%);
  opacity:0;transition:opacity 0.35s;
}
.enter-btn:hover{
  border-color:rgba(141,184,212,0.5);
  background:rgba(141,184,212,0.06);
  color:rgba(141,184,212,0.95);
  transform:translateY(-1px);
}
.enter-btn:hover::before{opacity:1}
.enter-btn svg{width:14px;height:14px}

/* ══════════════════════════════════════════ */
/* ENTRY LAYER — the ritual moment           */
/* ══════════════════════════════════════════ */

.entry-layer{background:rgba(8,8,14,0.98);z-index:40}
.entry-content{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative}

/* Kanji reveal — with soft glow */
.kanji{
  font-size:72px;font-weight:300;line-height:1;
  color:rgba(245,240,232,0);
  letter-spacing:0.15em;
  transition:all 1.2s cubic-bezier(0.16,1,0.3,1);
  position:relative;
  filter:blur(0px);
}
.kanji.visible{color:rgba(245,240,232,0.12);filter:blur(0px)}
.kanji.bright{
  color:rgba(245,240,232,0.3);
  text-shadow:0 0 40px rgba(250,246,238,0.08),0 0 80px rgba(200,149,26,0.04);
}

/* Gate line */
.gate-line{
  width:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,240,232,0.18),transparent);
  transition:width 1.2s cubic-bezier(0.16,1,0.3,1);
  margin:16px 0;
}
.gate-line.open{width:260px}

/* Subtitle text */
.entry-text{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.25em;
  color:rgba(245,240,232,0);
  transition:all 0.8s cubic-bezier(0.22,0.61,0.36,1);
  text-transform:uppercase;
}
.entry-text.visible{color:rgba(245,240,232,0.3)}

/* Breath ring — organic expansion */
.breath-ring{
  position:absolute;width:120px;height:120px;border-radius:50%;
  border:0.5px solid rgba(245,240,232,0);
  transition:all 1.8s cubic-bezier(0.16,1,0.3,1);
}
.breath-ring.pulse{
  border-color:rgba(245,240,232,0.06);
  width:180px;height:180px;
  box-shadow:0 0 60px rgba(250,246,238,0.02);
}
.breath-ring.dissolve{
  border-color:rgba(245,240,232,0);
  width:320px;height:320px;
  box-shadow:0 0 100px rgba(250,246,238,0);
}

/* ══════════════════════════════════════════ */
/* HOME LAYER — Nendō Hub              */
/* ══════════════════════════════════════════ */

.home-layer{z-index:20}
.home-content{width:100%;height:100%;display:flex;flex-direction:column}

.home-topbar{
  height:44px;display:flex;align-items:center;padding:0 20px;
  border-bottom:0.5px solid rgba(245,240,232,0.06);
  flex-shrink:0;
  background:rgba(10,10,18,0.4);
  backdrop-filter:blur(12px);
}
.home-back{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.12em;color:rgba(245,240,232,0.35);background:none;border:none;cursor:pointer;padding:0;width:80px;text-align:left;transition:color 0.25s}
.home-back:hover{color:rgba(245,240,232,0.55)}
.home-title{flex:1;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;color:rgba(245,240,232,0.28)}
.home-body{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;position:relative;overflow:hidden}

/* ── Three discipline doors ── */
.doors{display:flex;gap:24px;align-items:center}

.door{
  width:164px;height:228px;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all 0.4s cubic-bezier(0.22,0.61,0.36,1);
  backdrop-filter:blur(8px);
}
.door:hover{transform:translateY(-4px)}

/* Door atmosphere — each has a subtle inner glow */
.door::before{
  content:'';position:absolute;inset:0;border-radius:14px;
  opacity:0;transition:opacity 0.5s cubic-bezier(0.22,0.61,0.36,1);
  pointer-events:none;
}
.door:hover::before{opacity:1}

/* Metsuke — cool blue atmosphere */
.door-metsuke{
  border:0.5px solid rgba(141,184,212,0.12);
  background:rgba(141,184,212,0.015);
}
.door-metsuke:hover{
  border-color:rgba(141,184,212,0.3);
  background:rgba(141,184,212,0.03);
  box-shadow:0 8px 40px rgba(141,184,212,0.04),inset 0 0 30px rgba(141,184,212,0.02);
}
.door-metsuke::before{
  background:radial-gradient(ellipse at 50% 80%,rgba(141,184,212,0.04),transparent 70%);
}

/* Tachi — warm red atmosphere */
.door-tachi{
  border:0.5px solid rgba(212,130,106,0.12);
  background:rgba(212,130,106,0.015);
}
.door-tachi:hover{
  border-color:rgba(212,130,106,0.3);
  background:rgba(212,130,106,0.03);
  box-shadow:0 8px 40px rgba(212,130,106,0.04),inset 0 0 30px rgba(212,130,106,0.02);
}
.door-tachi::before{
  background:radial-gradient(ellipse at 50% 80%,rgba(212,130,106,0.04),transparent 70%);
}

/* Mushin — calm green atmosphere */
.door-mushin{
  border:0.5px solid rgba(122,184,154,0.12);
  background:rgba(122,184,154,0.015);
}
.door-mushin:hover{
  border-color:rgba(122,184,154,0.3);
  background:rgba(122,184,154,0.03);
  box-shadow:0 8px 40px rgba(122,184,154,0.04),inset 0 0 30px rgba(122,184,154,0.02);
}
.door-mushin::before{
  background:radial-gradient(ellipse at 50% 80%,rgba(122,184,154,0.04),transparent 70%);
}

.door-icon{
  width:50px;height:50px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin-bottom:14px;
  transition:all 0.4s cubic-bezier(0.22,0.61,0.36,1);
  position:relative;
}
/* Icon breathing glow */
.door-icon::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  opacity:0;transition:opacity 0.5s;
}
.door:hover .door-icon::after{opacity:1}

.door-metsuke .door-icon{background:rgba(141,184,212,0.05);border:0.5px solid rgba(141,184,212,0.18)}
.door-metsuke .door-icon::after{background:radial-gradient(circle,rgba(141,184,212,0.12),transparent 70%)}
.door-tachi .door-icon{background:rgba(212,130,106,0.05);border:0.5px solid rgba(212,130,106,0.18)}
.door-tachi .door-icon::after{background:radial-gradient(circle,rgba(212,130,106,0.12),transparent 70%)}
.door-mushin .door-icon{background:rgba(122,184,154,0.05);border:0.5px solid rgba(122,184,154,0.18)}
.door-mushin .door-icon::after{background:radial-gradient(circle,rgba(122,184,154,0.12),transparent 70%)}

.door-name{font-family:'Cinzel',serif;font-size:13px;letter-spacing:0.1em;margin-bottom:5px;transition:color 0.3s}
.door-metsuke .door-name{color:rgba(141,184,212,0.7)}
.door-metsuke:hover .door-name{color:rgba(141,184,212,0.9)}
.door-tachi .door-name{color:rgba(212,130,106,0.7)}
.door-tachi:hover .door-name{color:rgba(212,130,106,0.9)}
.door-mushin .door-name{color:rgba(122,184,154,0.7)}
.door-mushin:hover .door-name{color:rgba(122,184,154,0.9)}

.door-sub{font-size:10px;font-style:italic;color:rgba(245,240,232,0.25);text-align:center;padding:0 14px;line-height:1.35;transition:color 0.3s}
.door:hover .door-sub{color:rgba(245,240,232,0.38)}

.door-kanji{
  position:absolute;bottom:14px;
  font-size:22px;
  color:rgba(245,240,232,0.04);
  letter-spacing:0.1em;
  transition:all 0.5s cubic-bezier(0.22,0.61,0.36,1);
}
.door:hover .door-kanji{color:rgba(245,240,232,0.08);transform:scale(1.05)}

/* ── Centre aura orb ── */
.aura-centre{position:absolute;display:flex;flex-direction:column;align-items:center}
.aura-orb{
  width:48px;height:48px;border-radius:50%;position:relative;
  animation:orbBreathe 4s cubic-bezier(0.37,0,0.63,1) infinite;
}
@keyframes orbBreathe{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.06)}
}
.aura-orb-inner{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,rgba(250,246,238,0.28) 0%,rgba(200,164,106,0.1) 50%,transparent 100%);
  border:0.5px solid rgba(250,246,238,0.18);
}
.aura-orb-glow{
  position:absolute;inset:-12px;border-radius:50%;
  background:radial-gradient(circle,rgba(250,246,238,0.06) 0%,rgba(200,149,26,0.02) 40%,transparent 70%);
  animation:glowPulse 4s cubic-bezier(0.37,0,0.63,1) infinite;
}
@keyframes glowPulse{
  0%,100%{opacity:0.5;transform:scale(1)}
  50%{opacity:1;transform:scale(1.15)}
}
.aura-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.15em;color:rgba(245,240,232,0.2);margin-top:8px}
.aura-stage{font-family:'Cinzel',serif;font-size:9px;color:rgba(250,246,238,0.45);margin-top:2px}

/* Home mantra */
.home-mantra{
  position:absolute;bottom:16px;
  font-family:'Crimson Pro',serif;font-size:10.5px;font-style:italic;
  color:rgba(245,240,232,0.08);
  animation:mantraBreath 4s cubic-bezier(0.37,0,0.63,1) infinite;
}
@keyframes mantraBreath{
  0%,100%{opacity:0.08}
  50%{opacity:0.14}
}

/* ── Approach B overlay modifier ── */
.entry-layer.overlay-mode{background:rgba(8,8,14,0.97)}

/* ── Home fade-in (post entry) ── */
.home-layer.arriving .door{
  opacity:0;
  transform:translateY(8px);
}
.home-layer.arriving .door-metsuke{animation:doorArrive 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s forwards}
.home-layer.arriving .door-tachi{animation:doorArrive 0.6s cubic-bezier(0.16,1,0.3,1) 0.25s forwards}
.home-layer.arriving .door-mushin{animation:doorArrive 0.6s cubic-bezier(0.16,1,0.3,1) 0.4s forwards}
.home-layer.arriving .aura-centre{opacity:0;animation:doorArrive 0.5s cubic-bezier(0.16,1,0.3,1) 0.55s forwards}

@keyframes doorArrive{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Portrait rotation message ── */
.rotate-msg{display:none}
@media (orientation:portrait) and (max-width:600px){
  .rotate-msg{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    position:fixed;inset:0;z-index:999;background:#0A0A12;
    font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.15em;color:rgba(245,240,232,0.3);
  }
  .rotate-msg svg{width:48px;height:48px}
}

</style>
</head>
<body>

<!-- Environmental atmosphere layers -->
<div class="env-gradient"></div>
<div class="env-texture"></div>
<canvas id="particles"></canvas>

<!-- Landscape enforcement -->
<div class="rotate-msg">
  <svg viewBox="0 0 48 48" fill="none"><rect x="8" y="14" width="32" height="20" rx="3" stroke="rgba(245,240,232,0.3)" stroke-width="1.5"/><path d="M24 38v4M20 42h8" stroke="rgba(245,240,232,0.2)" stroke-width="1.2" stroke-linecap="round"/><path d="M36 8l4 4-4 4" stroke="rgba(245,240,232,0.25)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span>Rotate to landscape</span>
</div>

<!-- Prototype controls -->
<div class="proto-label">Nendō · Entry Prototype v2.0</div>
<div class="switcher">
  <button id="btn-a" class="active" onclick="setMode('a')">A · Standalone</button>
  <button id="btn-b" onclick="setMode('b')">B · Built into Home</button>
</div>
<button class="restart-btn" onclick="restart()">&#8635; Restart</button>

<!-- ════════════════════════════════════ -->
<!-- PROFILE LAYER — starting state      -->
<!-- ════════════════════════════════════ -->
<div class="layer profile-layer" id="profile-layer">
  <div class="profile-card">
    <div class="profile-avatar">
      <svg viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="10" r="5" stroke="rgba(122,184,154,0.5)" stroke-width="0.85"/>
        <path d="M6 24c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="rgba(122,184,154,0.5)" stroke-width="0.85" fill="none"/>
      </svg>
    </div>
    <div class="profile-info">
      <div class="profile-name">Kai Tanaka</div>
      <div class="profile-rank">Green Belt · Age 8</div>
    </div>
    <button class="enter-btn" onclick="enterDojo()">
      <svg viewBox="0 0 14 14" fill="none">
        <path d="M1 7 Q4 3 7 3 Q10 3 13 7 Q10 11 7 11 Q4 11 1 7Z" stroke="rgba(141,184,212,0.6)" stroke-width="0.75" fill="none"/>
        <circle cx="7" cy="7" r="2" fill="rgba(141,184,212,0.4)"/>
      </svg>
      Enter Nendō
    </button>
  </div>
</div>

<!-- ════════════════════════════════════ -->
<!-- ENTRY LAYER — the ritual moment     -->
<!-- ════════════════════════════════════ -->
<div class="layer entry-layer hidden" id="entry-layer">
  <div class="entry-content">
    <div class="breath-ring" id="breath-ring"></div>
    <div class="kanji" id="entry-kanji">念</div>
    <div class="gate-line" id="gate-line"></div>
    <div class="entry-text" id="entry-text">Train the mind</div>
  </div>
</div>

<!-- ════════════════════════════════════ -->
<!-- HOME LAYER — Nendō Hub        -->
<!-- ════════════════════════════════════ -->
<div class="layer home-layer hidden" id="home-layer">
  <div class="home-content">
    <div class="home-topbar">
      <button class="home-back" onclick="restart()">&#8592; Profile</button>
      <div class="home-title">Nendō</div>
      <div style="width:80px;text-align:right;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.1em;color:rgba(245,240,232,0.12)">念</div>
    </div>
    <div class="home-body">
      <div class="doors">

        <!-- Metsuke door -->
        <div class="door door-metsuke">
          <div class="door-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M2 10 Q6 5 10 5 Q14 5 18 10 Q14 15 10 15 Q6 15 2 10Z" stroke="rgba(141,184,212,0.6)" stroke-width="0.85" fill="none"/>
              <circle cx="10" cy="10" r="3" fill="rgba(141,184,212,0.12)" stroke="rgba(141,184,212,0.5)" stroke-width="0.7"/>
              <circle cx="10" cy="10" r="1" fill="rgba(141,184,212,0.5)"/>
            </svg>
          </div>
          <div class="door-name">Metsuke</div>
          <div class="door-sub">The Reading Mind</div>
          <div class="door-kanji">目付</div>
        </div>

        <!-- Centre aura -->
        <div class="aura-centre">
          <div class="aura-orb">
            <div class="aura-orb-glow"></div>
            <div class="aura-orb-inner"></div>
          </div>
          <div class="aura-label">AURA</div>
          <div class="aura-stage">Hikari</div>
        </div>

        <!-- Tachi door -->
        <div class="door door-tachi">
          <div class="door-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <line x1="10" y1="3" x2="10" y2="14" stroke="rgba(212,130,106,0.6)" stroke-width="0.85" stroke-linecap="round"/>
              <line x1="7" y1="14" x2="13" y2="14" stroke="rgba(212,130,106,0.6)" stroke-width="0.85" stroke-linecap="round"/>
              <circle cx="10" cy="17" r="1" fill="rgba(212,130,106,0.4)"/>
            </svg>
          </div>
          <div class="door-name">Tachi</div>
          <div class="door-sub">The Striking Mind</div>
          <div class="door-kanji">太刀</div>
        </div>

        <!-- Mushin door -->
        <div class="door door-mushin">
          <div class="door-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="10" r="7" stroke="rgba(122,184,154,0.5)" stroke-width="0.75" fill="none"/>
              <circle cx="10" cy="10" r="4" stroke="rgba(122,184,154,0.35)" stroke-width="0.5" fill="none"/>
              <circle cx="10" cy="10" r="1.5" fill="rgba(122,184,154,0.4)"/>
            </svg>
          </div>
          <div class="door-name">Mushin</div>
          <div class="door-sub">The Still Mind</div>
          <div class="door-kanji">無心</div>
        </div>

      </div>

      <div class="home-mantra">A ninja without both is only half complete.</div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════ */
/* PARTICLE SYSTEM — floating embers                 */
/* ══════════════════════════════════════════════════ */

const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
let particleState = 'neutral'; // neutral | entry | metsuke | tachi | mushin

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height + 10;
    this.size = Math.random() * 1.6 + 0.4;
    this.speedY = -(Math.random() * 0.25 + 0.08);
    this.speedX = (Math.random() - 0.5) * 0.12;
    this.opacity = Math.random() * 0.2 + 0.05;
    this.maxOpacity = this.opacity;
    this.life = 0;
    this.maxLife = Math.random() * 600 + 300;
    // Warmth: base ember colour with subtle variation
    const warmth = Math.random();
    if (warmth < 0.6) {
      this.r = 250; this.g = 240; this.b = 230; // warm white
    } else if (warmth < 0.85) {
      this.r = 200; this.g = 149; this.b = 26; // gold
    } else {
      this.r = 180; this.g = 100; this.b = 50; // deep ember
    }
    // Phase offset for drift
    this.phase = Math.random() * Math.PI * 2;
    this.drift = Math.random() * 0.3 + 0.1;
  }
  update() {
    this.life++;
    // Organic drift — sinusoidal lateral movement
    this.x += this.speedX + Math.sin(this.life * 0.008 + this.phase) * this.drift * 0.1;
    this.y += this.speedY;

    // State-based speed adjustment
    if (particleState === 'entry') {
      this.speedY *= 0.998; // slow to near-stillness during ritual
    }

    // Fade in and out over lifespan
    const lifeRatio = this.life / this.maxLife;
    if (lifeRatio < 0.15) {
      this.opacity = this.maxOpacity * (lifeRatio / 0.15);
    } else if (lifeRatio > 0.8) {
      this.opacity = this.maxOpacity * (1 - (lifeRatio - 0.8) / 0.2);
    }

    if (this.life >= this.maxLife || this.y < -10) {
      this.reset();
    }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${this.opacity})`;
    ctx.fill();

    // Soft glow for larger particles
    if (this.size > 1) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${this.opacity * 0.15})`;
      ctx.fill();
    }
  }
}

// Create particle field — sparse, not dense
const PARTICLE_COUNT = 35;
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const p = new Particle();
  p.y = Math.random() * canvas.height; // scatter initial positions
  p.life = Math.random() * p.maxLife; // stagger lifecycles
  particles.push(p);
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();


/* ══════════════════════════════════════════════════ */
/* SCREEN FLOW LOGIC                                 */
/* ══════════════════════════════════════════════════ */

let mode = 'a';
let running = false;

function setMode(m) {
  mode = m;
  document.getElementById('btn-a').classList.toggle('active', m === 'a');
  document.getElementById('btn-b').classList.toggle('active', m === 'b');
  restart();
}

function restart() {
  running = false;
  particleState = 'neutral';
  const profile = document.getElementById('profile-layer');
  const entry = document.getElementById('entry-layer');
  const home = document.getElementById('home-layer');
  const kanji = document.getElementById('entry-kanji');
  const gate = document.getElementById('gate-line');
  const text = document.getElementById('entry-text');
  const ring = document.getElementById('breath-ring');

  profile.classList.remove('hidden');
  entry.classList.add('hidden');
  home.classList.add('hidden');
  home.classList.remove('arriving');
  kanji.className = 'kanji';
  gate.className = 'gate-line';
  text.className = 'entry-text';
  ring.className = 'breath-ring';
  entry.classList.remove('overlay-mode');
  entry.style.transition = '';
  entry.style.opacity = '';
  profile.style.opacity = '';
  profile.style.transition = '';
}

function enterDojo() {
  if (running) return;
  running = true;

  const profile = document.getElementById('profile-layer');
  const entry = document.getElementById('entry-layer');
  const home = document.getElementById('home-layer');
  const kanji = document.getElementById('entry-kanji');
  const gate = document.getElementById('gate-line');
  const text = document.getElementById('entry-text');
  const ring = document.getElementById('breath-ring');

  if (mode === 'a') {
    runApproachA(profile, entry, home, kanji, gate, text, ring);
  } else {
    runApproachB(profile, entry, home, kanji, gate, text, ring);
  }
}


/* ═══════════════════════════════════════════════ */
/* APPROACH A — Standalone entry screen           */
/* ═══════════════════════════════════════════════ */
function runApproachA(profile, entry, home, kanji, gate, text, ring) {

  // Step 1: Fade out profile
  profile.style.transition = 'opacity 0.5s cubic-bezier(0.22,0.61,0.36,1)';
  profile.style.opacity = '0';

  setTimeout(() => {
    profile.classList.add('hidden');
    profile.style.opacity = '';
    profile.style.transition = '';

    // Step 2: Enter ritual — particles slow
    particleState = 'entry';
    entry.classList.remove('hidden');

    // Step 3: Breath ring
    setTimeout(() => ring.classList.add('pulse'), 150);

    // Step 4: Kanji fades in
    setTimeout(() => kanji.classList.add('visible'), 300);

    // Step 5: Kanji brightens with glow
    setTimeout(() => {
      kanji.classList.remove('visible');
      kanji.classList.add('bright');
    }, 1200);

    // Step 6: Gate line opens
    setTimeout(() => gate.classList.add('open'), 1000);

    // Step 7: Text appears
    setTimeout(() => text.classList.add('visible'), 1600);

    // Step 8: Dissolve to home — particles resume
    setTimeout(() => {
      ring.classList.remove('pulse');
      ring.classList.add('dissolve');
      entry.style.transition = 'opacity 0.8s cubic-bezier(0.22,0.61,0.36,1)';
      entry.style.opacity = '0';
    }, 3000);

    setTimeout(() => {
      entry.classList.add('hidden');
      entry.style.opacity = '';
      entry.style.transition = '';
      particleState = 'neutral';

      // Home arrives with staggered door animation
      home.classList.add('arriving');
      home.classList.remove('hidden');
      home.style.opacity = '0';
      home.style.transition = 'opacity 0.5s cubic-bezier(0.22,0.61,0.36,1)';
      requestAnimationFrame(() => { home.style.opacity = '1'; });
    }, 3800);

  }, 500);
}


/* ═══════════════════════════════════════════════ */
/* APPROACH B — Entry built into Home             */
/* ═══════════════════════════════════════════════ */
function runApproachB(profile, entry, home, kanji, gate, text, ring) {

  profile.style.transition = 'opacity 0.5s cubic-bezier(0.22,0.61,0.36,1)';
  profile.style.opacity = '0';

  setTimeout(() => {
    profile.classList.add('hidden');
    profile.style.opacity = '';
    profile.style.transition = '';

    // Home underneath, entry overlay on top
    home.classList.remove('hidden');
    home.style.opacity = '1';
    entry.classList.remove('hidden');
    entry.classList.add('overlay-mode');
    particleState = 'entry';

    // Ritual sequence
    setTimeout(() => ring.classList.add('pulse'), 150);
    setTimeout(() => kanji.classList.add('visible'), 300);
    setTimeout(() => {
      kanji.classList.remove('visible');
      kanji.classList.add('bright');
    }, 1200);
    setTimeout(() => gate.classList.add('open'), 1000);
    setTimeout(() => text.classList.add('visible'), 1600);

    // Overlay dissolves revealing home
    setTimeout(() => {
      ring.classList.remove('pulse');
      ring.classList.add('dissolve');
      entry.style.transition = 'opacity 1s cubic-bezier(0.22,0.61,0.36,1)';
      entry.style.opacity = '0';
      particleState = 'neutral';
    }, 3000);

    setTimeout(() => {
      entry.classList.add('hidden');
      entry.style.opacity = '';
      entry.style.transition = '';
    }, 4000);

  }, 500);
}
</script>
