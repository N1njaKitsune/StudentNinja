<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Nendō · Mushin Practice Prototype v1.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#0A0A12;color:#F5F0E8;
  font-family:'Crimson Pro',serif;
  overflow:hidden;width:100vw;height:100vh;
}

/* ══════════════════════════════════ */
/* ENVIRONMENT — atmosphere layers   */
/* ══════════════════════════════════ */

/* Ambient gradient — shifts per element */
.env-gradient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  transition:background 1.2s cubic-bezier(0.22,0.61,0.36,1);
}

/* Texture */
.env-texture{
  position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.02;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* Breath-responsive brightness overlay */
.env-breath{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:rgba(245,240,232,0);
  transition:background 0.4s linear;
}

canvas#particles{position:fixed;inset:0;z-index:3;pointer-events:none}

/* ══════════════════════════════════ */
/* LAYOUT                            */
/* ══════════════════════════════════ */

.app{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column}

.topbar{
  height:42px;display:flex;align-items:center;padding:0 16px;
  border-bottom:0.5px solid rgba(245,240,232,0.06);
  background:rgba(10,10,18,0.5);backdrop-filter:blur(10px);
  flex-shrink:0;z-index:20;
}
.tb-back{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.12em;color:rgba(245,240,232,0.32);background:none;border:none;cursor:pointer;padding:0;width:100px;text-align:left;transition:color 0.25s}
.tb-back:hover{color:rgba(245,240,232,0.5)}
.tb-title{flex:1;text-align:center;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.2em;color:rgba(245,240,232,0.25);transition:color 0.6s}
.tb-timer{width:100px;text-align:right;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.1em;color:rgba(245,240,232,0.22)}

.main{flex:1;display:flex;overflow:hidden;min-height:0}

/* ══════════════════════════════════ */
/* SCREENS                           */
/* ══════════════════════════════════ */

.scr{display:none;flex:1}
.scr.on{display:flex}

/* ── ELEMENT HUB ── */
.hub{flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:8px}
.hub-diamond{position:relative;width:280px;height:280px}
.hub-node{
  position:absolute;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:all 0.4s cubic-bezier(0.22,0.61,0.36,1);
}
.hub-node:hover{transform:scale(1.08)}
.hub-node-circle{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.35s cubic-bezier(0.22,0.61,0.36,1);
  position:relative;
}
/* Node glow on hover */
.hub-node-circle::after{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  opacity:0;transition:opacity 0.4s;pointer-events:none;
}
.hub-node:hover .hub-node-circle::after{opacity:1}
.hub-node-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.12em;margin-top:5px;transition:color 0.3s}
.hub-node-elem{font-size:8px;font-style:italic;color:rgba(245,240,232,0.22);margin-top:1px}

/* Shiho centre */
.hub-shiho{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.35s;
  background:rgba(200,216,232,0.04);border:0.5px solid rgba(200,216,232,0.18);
}
.hub-shiho:hover{background:rgba(200,216,232,0.08);border-color:rgba(200,216,232,0.35)}
.hub-shiho-label{
  position:absolute;left:50%;top:calc(50% + 30px);transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.15em;color:rgba(200,216,232,0.35);
  white-space:nowrap;
}

.hub-btn{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.2em;
  padding:8px 28px;border-radius:10px;
  border:0.5px solid rgba(122,184,154,0.3);background:rgba(122,184,154,0.03);
  color:rgba(122,184,154,0.7);cursor:pointer;
  transition:all 0.35s cubic-bezier(0.22,0.61,0.36,1);
}
.hub-btn:hover{border-color:rgba(122,184,154,0.5);background:rgba(122,184,154,0.06);color:rgba(122,184,154,0.9)}

/* ── BREATHING RUNNER ── */
.runner{flex-direction:row;align-items:stretch}

.runner-left{
  width:180px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;
  padding:12px 14px 12px 18px;border-right:0.5px solid rgba(245,240,232,0.05);
}
.runner-tech-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;letter-spacing:0.06em;margin-bottom:4px;line-height:1.1}
.runner-tech-real{font-size:9px;font-style:italic;color:rgba(245,240,232,0.3);margin-bottom:8px}
.runner-cue{font-size:10px;font-style:italic;color:rgba(245,240,232,0.35);line-height:1.5;margin-bottom:10px}
.runner-word{font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.2em;color:rgba(245,240,232,0.18)}

.runner-centre{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;position:relative}
.runner-phase-label{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.22em;
  text-transform:uppercase;margin-bottom:8px;min-height:14px;
  transition:color 0.3s;
}
.runner-countdown{font-family:'Cinzel',serif;font-size:28px;font-weight:700;line-height:1;margin-top:8px}
.runner-phase-sub{font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.18em;opacity:0.3;margin-top:3px}

.runner-right{
  width:110px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;
  padding:12px 14px;border-left:0.5px solid rgba(245,240,232,0.05);
}
.runner-pip{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.runner-pip-dot{width:5px;height:5px;border-radius:50%;transition:background 0.4s}
.runner-pip-text{font-family:'Cinzel',serif;font-size:7px}
.runner-progress-bar{width:100%;height:2px;background:rgba(245,240,232,0.06);border-radius:2px;overflow:hidden;margin-top:6px}
.runner-progress-fill{height:100%;border-radius:2px;transition:width 0.2s linear}

.runner-end{
  position:absolute;bottom:10px;right:14px;z-index:20;
  background:none;border:0.5px solid rgba(245,240,232,0.1);
  border-radius:6px;padding:4px 12px;
  font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.12em;
  color:rgba(245,240,232,0.25);cursor:pointer;
  transition:all 0.25s;
}
.runner-end:hover{border-color:rgba(245,240,232,0.25);color:rgba(245,240,232,0.45)}

/* ── SUMMARY ── */
.summary{flex-direction:row;align-items:stretch}
.summary-left{
  width:220px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;
  padding:20px 24px;border-right:0.5px solid rgba(245,240,232,0.06);
}
.summary-right{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 24px;gap:14px}
.summary-stat{
  flex:1;padding:10px 12px;border:0.5px solid rgba(245,240,232,0.08);
  border-radius:8px;text-align:center;
}

/* ── PROTOTYPE CONTROLS ── */
.proto-label{position:fixed;top:12px;left:12px;z-index:200;font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.2em;color:rgba(245,240,232,0.12);text-transform:uppercase}
.elem-switcher{
  position:fixed;bottom:12px;left:12px;z-index:200;display:flex;gap:5px;
  background:rgba(8,8,14,0.9);border:0.5px solid rgba(245,240,232,0.08);
  border-radius:8px;padding:4px;
}
.elem-switcher button{
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.1em;
  padding:4px 10px;border-radius:5px;border:none;cursor:pointer;
  transition:all 0.2s;background:transparent;
}

/* ── PORTRAIT ── */
.rotate-msg{display:none}
@media (orientation:portrait) and (max-width:600px){
  .rotate-msg{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    position:fixed;inset:0;z-index:999;background:#0A0A12;
    font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.15em;color:rgba(245,240,232,0.3);
  }
}
</style>
</head>
<body>

<div class="env-gradient" id="env-gradient"></div>
<div class="env-texture"></div>
<div class="env-breath" id="env-breath"></div>
<canvas id="particles"></canvas>

<div class="rotate-msg">
  <svg viewBox="0 0 48 48" fill="none" width="48" height="48"><rect x="8" y="14" width="32" height="20" rx="3" stroke="rgba(245,240,232,0.3)" stroke-width="1.5"/></svg>
  <span>Rotate to landscape</span>
</div>

<div class="proto-label">Nendō · Mushin Practice v1.0</div>
<div class="elem-switcher" id="elem-switcher"></div>

<div class="app">
  <div class="topbar">
    <button class="tb-back" id="tb-back">&#8592; Mushin</button>
    <div class="tb-title" id="tb-title">Mushin · Breath</div>
    <div class="tb-timer" id="tb-timer"></div>
  </div>
  <div class="main">

    <!-- HUB SCREEN -->
    <div class="scr on" id="scr-hub">
      <div class="hub">
        <div class="hub-diamond" id="hub-diamond"></div>
        <button class="hub-btn" onclick="beginSession()">Begin Session</button>
      </div>
    </div>

    <!-- RUNNER SCREEN -->
    <div class="scr" id="scr-runner">
      <div class="runner">
        <div class="runner-left">
          <div style="font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.2em;color:rgba(245,240,232,0.18);margin-bottom:6px">NOW BREATHING</div>
          <div class="runner-tech-name" id="r-name"></div>
          <div class="runner-tech-real" id="r-real"></div>
          <div class="runner-cue" id="r-cue"></div>
          <div class="runner-word" id="r-word"></div>
        </div>
        <div class="runner-centre">
          <div class="runner-phase-label" id="r-phase"></div>
          <canvas id="breath-canvas" width="200" height="200" style="width:200px;height:200px"></canvas>
          <div class="runner-countdown" id="r-countdown">—</div>
          <div class="runner-phase-sub" id="r-phase-sub"></div>
        </div>
        <div class="runner-right">
          <div style="font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.15em;color:rgba(245,240,232,0.2);margin-bottom:5px">PROGRESS</div>
          <div id="r-pips"></div>
          <div style="font-family:'Cinzel',serif;font-size:7px;color:rgba(245,240,232,0.18);margin-top:8px;margin-bottom:3px">Overall</div>
          <div class="runner-progress-bar"><div class="runner-progress-fill" id="r-bar"></div></div>
        </div>
        <button class="runner-end" onclick="endSession()">&#10005; End</button>
      </div>
    </div>

    <!-- SUMMARY SCREEN -->
    <div class="scr" id="scr-summary">
      <div class="summary">
        <div class="summary-left">
          <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.25em;color:rgba(245,240,232,0.25);margin-bottom:10px">SESSION COMPLETE</div>
          <div style="font-family:'Cinzel',serif;font-size:26px;font-weight:700;color:#7AB89A;margin-bottom:6px;letter-spacing:0.08em">Present</div>
          <div style="font-size:11px;font-style:italic;color:rgba(245,240,232,0.38);line-height:1.6">Shiho opened. You breathed. Shiho closed. The dojo is always here.</div>
        </div>
        <div class="summary-right">
          <div style="display:flex;gap:10px" id="summary-stats"></div>
          <button class="hub-btn" onclick="returnToHub()" style="align-self:flex-start">Return</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ══════════════════════════════════════════ */
/* DATA — inline from data.js               */
/* ══════════════════════════════════════════ */

const ELEMENTS = {
  kaze: { id:'kaze', name:'Kaze', element:'Air', color:'#8DB8D4', rgb:'141,184,212', bg:'#080E14',
    techniques:['cloud','raven','lantern'] },
  chi:  { id:'chi', name:'Chi', element:'Earth', color:'#C8A46A', rgb:'200,164,106', bg:'#0E0A06',
    techniques:['warrior','stone','mountain'] },
  mizu: { id:'mizu', name:'Mizu', element:'Water', color:'#6A9CC8', rgb:'106,156,200', bg:'#060C14',
    techniques:['wave','tide'] },
  hi:   { id:'hi', name:'Hi', element:'Fire', color:'#D4826A', rgb:'212,130,106', bg:'#100806',
    techniques:['phoenix','dragon','bellows'] },
};

const TECHNIQUES = {
  cloud:    { id:'cloud', name:'Cloud Breathing', real:'Diaphragmatic', elem:'kaze', color:'#8DB8D4', rgb:'141,184,212',
              inhale:4, hold:0, exhale:4, endHold:0, dur:56, cue:'"Fill the belly like a cloud getting bigger."', word:'Settled' },
  raven:    { id:'raven', name:"Raven's Breath", real:'Lengthened Exhale', elem:'kaze', color:'#8DB8D4', rgb:'141,184,212',
              inhale:4, hold:0, exhale:6, endHold:0, dur:60, cue:'"Let the breath glide out for longer."', word:'Calm' },
  lantern:  { id:'lantern', name:'Lantern Breathing', real:'4-7-8 Breath', elem:'kaze', color:'#8DB8D4', rgb:'141,184,212',
              inhale:4, hold:5, exhale:6, endHold:0, dur:60, cue:'"Light the lantern, keep it glowing, let it fade."', word:'Still' },
  warrior:  { id:'warrior', name:"Warrior's Breath", real:'Bhramari', elem:'chi', color:'#C8A46A', rgb:'200,164,106',
              inhale:4, hold:0, exhale:6, endHold:0, dur:60, cue:'"Hum steadily as you breathe out."', word:'Rooted' },
  stone:    { id:'stone', name:'Stone Breathing', real:'Ujjayi', elem:'chi', color:'#C8A46A', rgb:'200,164,106',
              inhale:4, hold:0, exhale:5, endHold:0, dur:54, cue:'"Breathe like stone — strong, slow, steady."', word:'Solid' },
  mountain: { id:'mountain', name:'Mountain Breathing', real:'Resonance', elem:'chi', color:'#C8A46A', rgb:'200,164,106',
              inhale:3, hold:0, exhale:3, endHold:0, dur:60, cue:'"Steady, patient, unmoving."', word:'Steady' },
  wave:     { id:'wave', name:'Wave Breathing', real:'Intercostal Expansion', elem:'mizu', color:'#6A9CC8', rgb:'106,156,200',
              inhale:4, hold:0, exhale:5, endHold:0, dur:54, cue:'"Send the breath into the sides and back."', word:'Open' },
  tide:     { id:'tide', name:'Tide Breathing', real:'Alternate Nostril', elem:'mizu', color:'#6A9CC8', rgb:'106,156,200',
              inhale:4, hold:0, exhale:4, endHold:0, dur:56, cue:'"The breath flows side to side like the tide."', word:'Balanced' },
  phoenix:  { id:'phoenix', name:'Phoenix Breath', real:'Kapalabhati', elem:'hi', color:'#D4826A', rgb:'212,130,106',
              inhale:2, hold:0, exhale:2, endHold:0, dur:48, cue:'"Short, sharp bursts. The inhale follows naturally."', word:'Ignited' },
  dragon:   { id:'dragon', name:'Dragon Breath', real:'Bhastrika', elem:'hi', color:'#D4826A', rgb:'212,130,106',
              inhale:2, hold:0, exhale:2, endHold:0, dur:48, cue:'"Strong in, strong out. Like a dragon."', word:'Fierce' },
  bellows:  { id:'bellows', name:'Bellows Breath', real:'Wim Hof adapted', elem:'hi', color:'#D4826A', rgb:'212,130,106',
              inhale:2, hold:0, exhale:2, endHold:0, dur:48, cue:'"Fill up, release. Build energy."', word:'Charged' },
};

/* ══════════════════════════════════════════ */
/* PARTICLE SYSTEM                           */
/* ══════════════════════════════════════════ */

const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
let lungScale = 0; // 0 = empty, 1 = full — drives environment
let currentElemColor = { r:200, g:149, b:26 }; // gold default
let particleSpeedMult = 1;

function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor(){this.reset()}
  reset(){
    this.x = Math.random() * canvas.width;
    this.y = canvas.height + 10;
    this.size = Math.random() * 1.5 + 0.4;
    this.baseSpeedY = -(Math.random() * 0.22 + 0.06);
    this.speedX = (Math.random() - 0.5) * 0.1;
    this.opacity = Math.random() * 0.18 + 0.04;
    this.maxOpacity = this.opacity;
    this.life = 0;
    this.maxLife = Math.random() * 650 + 300;
    this.phase = Math.random() * Math.PI * 2;
    this.drift = Math.random() * 0.25 + 0.08;
    this.useElemColor = Math.random() > 0.4;
  }
  update(){
    this.life++;
    // Speed responds to breathing — slows on inhale, resumes on exhale
    const breathFactor = 1 - (lungScale * 0.6); // at full lungs, particles slow 60%
    this.x += this.speedX + Math.sin(this.life * 0.007 + this.phase) * this.drift * 0.1;
    this.y += this.baseSpeedY * breathFactor * particleSpeedMult;

    const lifeRatio = this.life / this.maxLife;
    if(lifeRatio < 0.15) this.opacity = this.maxOpacity * (lifeRatio / 0.15);
    else if(lifeRatio > 0.8) this.opacity = this.maxOpacity * (1 - (lifeRatio-0.8)/0.2);

    // Brightness responds to breathing — particles glow brighter at full inhale
    const breathBright = 1 + lungScale * 0.4;
    this.renderOpacity = this.opacity * breathBright;

    if(this.life >= this.maxLife || this.y < -10) this.reset();
  }
  draw(){
    const r = this.useElemColor ? currentElemColor.r : 250;
    const g = this.useElemColor ? currentElemColor.g : 240;
    const b = this.useElemColor ? currentElemColor.b : 230;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${r},${g},${b},${this.renderOpacity})`;
    ctx.fill();
    if(this.size > 1){
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${this.renderOpacity * 0.12})`;
      ctx.fill();
    }
  }
}

for(let i = 0; i < 30; i++){
  const p = new Particle();
  p.y = Math.random() * canvas.height;
  p.life = Math.random() * p.maxLife;
  particles.push(p);
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();


/* ══════════════════════════════════════════ */
/* ENVIRONMENT — atmosphere controls         */
/* ══════════════════════════════════════════ */

const envGradient = document.getElementById('env-gradient');
const envBreath = document.getElementById('env-breath');

function setElementAtmosphere(elemId){
  const el = ELEMENTS[elemId];
  if(!el) return;
  const [r,g,b] = el.rgb.split(',').map(Number);
  currentElemColor = {r,g,b};

  // Shift ambient gradient to element's warmth
  envGradient.style.background = `
    radial-gradient(ellipse 120% 60% at 50% 110%, rgba(${r},${g},${b},0.04) 0%, transparent 70%),
    radial-gradient(ellipse 80% 40% at 50% 105%, rgba(${r},${g},${b},0.025) 0%, transparent 60%)
  `;
}

function updateBreathEnvironment(lung){
  lungScale = lung;
  // Screen brightens 1.5% at full inhale
  const brightness = lung * 0.015;
  envBreath.style.background = `rgba(245,240,232,${brightness})`;
}

// Neutral warm atmosphere by default
envGradient.style.background = `
  radial-gradient(ellipse 120% 60% at 50% 110%, rgba(200,149,26,0.035) 0%, transparent 70%),
  radial-gradient(ellipse 80% 40% at 50% 105%, rgba(168,48,24,0.02) 0%, transparent 60%)
`;


/* ══════════════════════════════════════════ */
/* BREATH CIRCLE — canvas drawing            */
/* ══════════════════════════════════════════ */

function drawBreathCircle(cvs, lung, color){
  if(!cvs) return;
  const c = cvs.getContext('2d');
  const w = cvs.width, h = cvs.height;
  c.clearRect(0,0,w,h);
  const cx = w/2, cy = h/2, maxR = 90, minR = 16;
  const r = minR + (maxR - minR) * lung;
  const rv = parseInt(color.slice(1,3),16);
  const gv = parseInt(color.slice(3,5),16);
  const bv = parseInt(color.slice(5,7),16);

  // Outer reference rings
  [1.0, 0.78, 0.6].forEach(rr => {
    c.beginPath(); c.arc(cx,cy,maxR*rr,0,Math.PI*2);
    c.strokeStyle = `rgba(${rv},${gv},${bv},0.04)`; c.lineWidth = 0.5; c.stroke();
  });

  // Outer boundary — glows at full
  c.beginPath(); c.arc(cx,cy,maxR,0,Math.PI*2);
  c.strokeStyle = lung > 0.95 ? `rgba(${rv},${gv},${bv},0.5)` : `rgba(${rv},${gv},${bv},0.12)`;
  c.lineWidth = 1; c.stroke();

  // Breath glow aura
  const grad = c.createRadialGradient(cx,cy,r*0.3,cx,cy,r*1.3);
  grad.addColorStop(0, `rgba(${rv},${gv},${bv},${0.06 + lung * 0.06})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  c.beginPath(); c.arc(cx,cy,r*1.3,0,Math.PI*2);
  c.fillStyle = grad; c.fill();

  // Main circle
  c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2);
  c.fillStyle = `rgba(${rv},${gv},${bv},0.08)`; c.fill();

  // Inner glow
  c.beginPath(); c.arc(cx,cy,r*0.55,0,Math.PI*2);
  c.fillStyle = `rgba(${rv},${gv},${bv},0.1)`; c.fill();

  // Core
  c.beginPath(); c.arc(cx,cy,r*0.17,0,Math.PI*2);
  c.fillStyle = `rgba(${rv},${gv},${bv},0.6)`; c.fill();

  // Ring stroke
  c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2);
  c.strokeStyle = `rgba(${rv},${gv},${bv},0.5)`; c.lineWidth = 1.2; c.stroke();
}


/* ══════════════════════════════════════════ */
/* HUB — element diamond                     */
/* ══════════════════════════════════════════ */

function buildHub(){
  const diamond = document.getElementById('hub-diamond');
  diamond.innerHTML = '';

  // Positions: top=kaze, left=chi, right=hi, bottom=mizu
  const positions = {
    kaze: {x:'50%',y:'0%',tx:'-50%',ty:'0%'},
    chi:  {x:'0%',y:'50%',tx:'-50%',ty:'-50%'},
    hi:   {x:'100%',y:'50%',tx:'-50%',ty:'-50%'},
    mizu: {x:'50%',y:'100%',tx:'-50%',ty:'-100%'},
  };

  // Connecting lines (SVG)
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 280 280');
  svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none';
  svg.innerHTML = `
    <polygon points="140,26 254,140 140,254 26,140" fill="none" stroke="rgba(245,240,232,0.04)" stroke-width="0.5"/>
    <line x1="140" y1="40" x2="140" y2="110" stroke="rgba(141,184,212,0.12)" stroke-width="0.5" stroke-dasharray="3 4"/>
    <line x1="140" y1="170" x2="140" y2="240" stroke="rgba(106,156,200,0.12)" stroke-width="0.5" stroke-dasharray="3 4"/>
    <line x1="40" y1="140" x2="110" y2="140" stroke="rgba(200,164,106,0.12)" stroke-width="0.5" stroke-dasharray="3 4"/>
    <line x1="170" y1="140" x2="240" y2="140" stroke="rgba(212,130,106,0.12)" stroke-width="0.5" stroke-dasharray="3 4"/>
  `;
  diamond.appendChild(svg);

  // Shiho centre
  const shiho = document.createElement('div');
  shiho.className = 'hub-shiho';
  shiho.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="3" width="10" height="10" stroke="rgba(200,216,232,0.5)" stroke-width="0.85" rx="1" fill="none"/></svg>`;
  shiho.onclick = () => startTechnique('cloud'); // placeholder
  diamond.appendChild(shiho);

  const shihoLabel = document.createElement('div');
  shihoLabel.className = 'hub-shiho-label';
  shihoLabel.textContent = 'SHIHO';
  diamond.appendChild(shihoLabel);

  // Element nodes
  Object.entries(positions).forEach(([id, pos]) => {
    const el = ELEMENTS[id];
    const node = document.createElement('div');
    node.className = 'hub-node';
    node.style.cssText = `left:${pos.x};top:${pos.y};transform:translate(${pos.tx},${pos.ty})`;
    node.innerHTML = `
      <div class="hub-node-circle" style="background:rgba(${el.rgb},0.06);border:0.5px solid rgba(${el.rgb},0.25)">
        <div style="width:12px;height:12px;border-radius:50%;background:rgba(${el.rgb},0.2);border:0.5px solid rgba(${el.rgb},0.4)"></div>
        <div style="position:absolute;inset:-6px;border-radius:50%;background:radial-gradient(circle,rgba(${el.rgb},0.1),transparent 70%);pointer-events:none" class="node-glow"></div>
      </div>
      <div class="hub-node-label" style="color:rgba(${el.rgb},0.7)">${el.name.toUpperCase()}</div>
      <div class="hub-node-elem">${el.element}</div>
    `;
    node.onclick = () => startTechnique(el.techniques[0]);
    diamond.appendChild(node);
  });
}

// Element switcher (prototype-only)
function buildSwitcher(){
  const sw = document.getElementById('elem-switcher');
  sw.innerHTML = '<button onclick="setElementAtmosphere(\'neutral\')" style="color:rgba(245,240,232,0.3)">Neutral</button>';
  Object.values(ELEMENTS).forEach(el => {
    const btn = document.createElement('button');
    btn.textContent = el.name;
    btn.style.color = `rgba(${el.rgb},0.6)`;
    btn.onclick = () => setElementAtmosphere(el.id);
    sw.appendChild(btn);
  });
}


/* ══════════════════════════════════════════ */
/* BREATHING RUNNER                          */
/* ══════════════════════════════════════════ */

let runnerAnim = null;
let runnerPhaseStart = 0;
let runnerPhases = [];
let runnerPhaseIdx = 0;
let runnerTech = null;
let sessionStart = 0;

function buildPhases(t){
  const out = [];
  const cl = (t.inhale||0)+(t.hold||0)+(t.exhale||0)+(t.endHold||0);
  const cycles = Math.round((t.dur||60)/cl);
  for(let c = 0; c < cycles; c++){
    if(t.inhale) out.push({name:'inhale', dur:t.inhale, cycle:c+1, tot:cycles, label:'Breathe in'});
    if(t.hold)   out.push({name:'hold',   dur:t.hold,   cycle:c+1, tot:cycles, label:'Hold'});
    if(t.exhale) out.push({name:'exhale', dur:t.exhale, cycle:c+1, tot:cycles, label:'Breathe out'});
    if(t.endHold)out.push({name:'endHold',dur:t.endHold,cycle:c+1, tot:cycles, label:'Hold'});
  }
  return out;
}

function startTechnique(techId){
  runnerTech = TECHNIQUES[techId];
  if(!runnerTech) return;

  setElementAtmosphere(runnerTech.elem);
  showScreen('runner');
  document.getElementById('tb-title').textContent = 'Mushin · Breathing';
  document.getElementById('tb-title').style.color = `rgba(${runnerTech.rgb},0.35)`;

  document.getElementById('r-name').textContent = runnerTech.name;
  document.getElementById('r-name').style.color = runnerTech.color;
  document.getElementById('r-real').textContent = runnerTech.real;
  document.getElementById('r-cue').textContent = runnerTech.cue;
  document.getElementById('r-word').textContent = `Target state: ${runnerTech.word}`;

  runnerPhases = buildPhases(runnerTech);
  runnerPhaseIdx = 0;
  sessionStart = performance.now();

  // Build pips
  const ppc = [runnerTech.inhale,runnerTech.hold,runnerTech.exhale,runnerTech.endHold].filter(Boolean).length;
  const totalCycles = Math.round((runnerTech.dur||60)/((runnerTech.inhale||0)+(runnerTech.hold||0)+(runnerTech.exhale||0)+(runnerTech.endHold||0)));
  const pipsEl = document.getElementById('r-pips');
  pipsEl.innerHTML = '';
  for(let i = 0; i < totalCycles; i++){
    pipsEl.innerHTML += `<div class="runner-pip"><div class="runner-pip-dot" id="pip-${i}" style="background:rgba(245,240,232,0.08)"></div><div class="runner-pip-text" style="color:rgba(245,240,232,0.18)">Breath ${i+1}</div></div>`;
  }

  document.getElementById('r-bar').style.width = '0%';
  document.getElementById('r-bar').style.background = runnerTech.color;

  drawBreathCircle(document.getElementById('breath-canvas'), 0.05, runnerTech.color);
  runnerPhaseStart = performance.now();
  updateTimer();
  runnerTick();
}

function runnerTick(){
  const ph = runnerPhases[runnerPhaseIdx];
  if(!ph){ finishSession(); return; }

  const el = (performance.now() - runnerPhaseStart) / 1000;
  const prog = Math.min(el / ph.dur, 1);

  // Calculate lung scale
  let lung;
  if(ph.name === 'inhale') lung = prog;
  else if(ph.name === 'exhale') lung = 1 - prog;
  else if(ph.name === 'hold') lung = 1;
  else lung = 0.05;

  // Draw breath circle
  drawBreathCircle(document.getElementById('breath-canvas'), lung, runnerTech.color);

  // Update environment — room breathes with student
  updateBreathEnvironment(lung);

  // Update particle speed based on element
  if(runnerTech.elem === 'hi') particleSpeedMult = 1.3 + lung * 0.3;
  else if(runnerTech.elem === 'kaze') particleSpeedMult = 0.7 - lung * 0.3;
  else if(runnerTech.elem === 'mizu') particleSpeedMult = 0.8 - lung * 0.2;
  else particleSpeedMult = 1 - lung * 0.3;

  // UI updates
  document.getElementById('r-phase').textContent = ph.label;
  document.getElementById('r-phase').style.color = runnerTech.color;
  document.getElementById('r-phase-sub').textContent = ph.label;
  document.getElementById('r-countdown').textContent = Math.max(1, Math.ceil(ph.dur * (1-prog)));
  document.getElementById('r-countdown').style.color = runnerTech.color;

  // Overall progress
  const overall = (runnerPhaseIdx / runnerPhases.length) + (prog / runnerPhases.length);
  document.getElementById('r-bar').style.width = `${Math.round(overall * 100)}%`;

  // Pips
  const ppc = [runnerTech.inhale,runnerTech.hold,runnerTech.exhale,runnerTech.endHold].filter(Boolean).length;
  const doneCycles = Math.floor(runnerPhaseIdx / ppc);
  for(let i = 0; i < 20; i++){
    const pip = document.getElementById(`pip-${i}`);
    if(pip) pip.style.background = i < doneCycles ? runnerTech.color : 'rgba(245,240,232,0.08)';
  }

  // Timer
  updateTimer();

  // Phase advance
  if(prog >= 1){
    runnerPhaseIdx++;
    if(runnerPhaseIdx >= runnerPhases.length){ finishSession(); return; }
    runnerPhaseStart = performance.now();
  }

  runnerAnim = requestAnimationFrame(runnerTick);
}

function updateTimer(){
  const el = Math.floor((performance.now() - sessionStart) / 1000);
  const m = Math.floor(el/60), s = el%60;
  document.getElementById('tb-timer').textContent = `${m}:${s<10?'0':''}${s}`;
}

function finishSession(){
  if(runnerAnim) cancelAnimationFrame(runnerAnim);
  lungScale = 0;
  updateBreathEnvironment(0);
  particleSpeedMult = 1;

  // Reset atmosphere to neutral warm
  envGradient.style.background = `
    radial-gradient(ellipse 120% 60% at 50% 110%, rgba(200,149,26,0.035) 0%, transparent 70%),
    radial-gradient(ellipse 80% 40% at 50% 105%, rgba(168,48,24,0.02) 0%, transparent 60%)
  `;

  const elapsed = document.getElementById('tb-timer').textContent;
  const stats = document.getElementById('summary-stats');
  stats.innerHTML = `
    <div class="summary-stat"><div style="font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:#7AB89A;line-height:1">${elapsed}</div><div style="font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.12em;color:rgba(245,240,232,0.28);margin-top:3px">Time</div></div>
    <div class="summary-stat"><div style="font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:#7AB89A;line-height:1">1</div><div style="font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.12em;color:rgba(245,240,232,0.28);margin-top:3px">Technique</div></div>
    <div class="summary-stat"><div style="font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:#7AB89A;line-height:1">+20</div><div style="font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.12em;color:rgba(245,240,232,0.28);margin-top:3px">Mushin XP</div></div>
  `;
  showScreen('summary');
  document.getElementById('tb-title').textContent = 'Mushin · Complete';
  document.getElementById('tb-title').style.color = 'rgba(122,184,154,0.35)';
}

function endSession(){
  if(runnerAnim) cancelAnimationFrame(runnerAnim);
  lungScale = 0;
  updateBreathEnvironment(0);
  particleSpeedMult = 1;
  returnToHub();
}

function beginSession(){
  startTechnique('cloud'); // Default to Cloud Breathing for prototype
}

function returnToHub(){
  envGradient.style.background = `
    radial-gradient(ellipse 120% 60% at 50% 110%, rgba(200,149,26,0.035) 0%, transparent 70%),
    radial-gradient(ellipse 80% 40% at 50% 105%, rgba(168,48,24,0.02) 0%, transparent 60%)
  `;
  showScreen('hub');
  document.getElementById('tb-title').textContent = 'Mushin · Breath';
  document.getElementById('tb-title').style.color = 'rgba(245,240,232,0.25)';
  document.getElementById('tb-timer').textContent = '';
}

function showScreen(id){
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  document.getElementById('scr-'+id).classList.add('on');
}

/* ══════════════════════════════════════════ */

buildHub();
buildSwitcher();
</script>
