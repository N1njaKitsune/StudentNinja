<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #050508;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px 24px 56px;
  gap: 24px; font-family: 'Crimson Pro', serif; color: #F5F0E8;
}

/* ── Device toggle ── */
.device-toggle { display: flex; gap: 8px; z-index: 50; }
.device-toggle button {
  background: rgba(141,184,212,0.1); border: 0.5px solid rgba(141,184,212,0.22);
  color: rgba(245,240,232,0.45); padding: 5px 14px; cursor: pointer;
  font-size: 10px; border-radius: 4px; font-family: 'Cinzel', serif;
  letter-spacing: 0.1em; transition: all 0.2s;
}
.device-toggle button.active {
  background: rgba(141,184,212,0.22); color: rgba(141,184,212,0.9);
  border-color: rgba(141,184,212,0.45);
}

/* ── Frame ── */
.frame {
  position: relative; overflow: hidden; border-radius: 4px;
  box-shadow: 0 0 0 1.5px rgba(245,240,232,0.06), 0 24px 80px rgba(0,0,0,0.7);
  transition: all 0.4s ease;
}
.frame.iphone { width: 844px; height: 390px; }
.frame.ipad   { width: 1194px; height: 834px; }

/* ── Environment overlays ── */
.env-warmth {
  position: absolute; inset: 0; z-index: 2;
  background: radial-gradient(ellipse at 50% 85%, rgba(80,110,160,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.env-texture {
  position: absolute; inset: 0; z-index: 3;
  background: none;
  opacity: 0.025; pointer-events: none;
}
.env-vignette {
  position: absolute; inset: 0; z-index: 4;
  background: radial-gradient(ellipse at center, transparent 20%, rgba(5,5,14,0.52) 100%);
  pointer-events: none;
}

/* ── Canvas particles ── */
canvas.particles { position: absolute; inset: 0; z-index: 5; pointer-events: none; }

/* ── UI Layer ── */
.ui-layer { position: absolute; inset: 0; z-index: 20; }

/* ── Discipline header ── */
.disc-header {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 18px 24px 0;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  pointer-events: none;
}
.disc-kanji {
  font-family: serif; font-size: 32px; line-height: 1;
  color: rgba(141,184,212,0.75); text-shadow: 0 0 30px rgba(141,184,212,0.3);
}
.disc-title {
  font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: 0.22em; text-transform: uppercase; color: rgba(141,184,212,0.55);
}
.disc-mantra {
  font-family: 'Crimson Pro', serif; font-size: 9px; font-style: italic;
  color: rgba(245,240,232,0.28); letter-spacing: 0.04em; margin-top: 2px;
}

/* ── Hub cards ── */
.hub-cards {
  position: absolute; bottom: 44px; left: 0; right: 0;
  display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; align-items: end;
}

.hub-card {
  position: relative;
  width: 110px; justify-self: center; text-align: center;
  background: rgba(8,10,20,0.42);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 0.5px solid rgba(141,184,212,0.1); border-radius: 6px;
  border-top: 2px solid rgba(141,184,212,0.55);
  padding: 14px 10px 11px;
  transition: all 0.3s ease;
  animation: cardFloat 4s ease-in-out infinite;
}
.hub-card:nth-child(1) { animation-delay: 0s;   }
.hub-card:nth-child(2) { animation-delay: 0.7s; }
.hub-card:nth-child(3) { animation-delay: 1.4s; }
.hub-card:nth-child(4) { animation-delay: 2.1s; }

@keyframes cardFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

/* ── Locked state ── */
.hub-card.locked {
  opacity: 0.35;
  cursor: not-allowed;
  pointer-events: none;
  animation: none;
  filter: grayscale(0.3);
}
.lock-icon {
  position: absolute; top: 6px; right: 8px;
  font-size: 9px; opacity: 0.7;
  color: rgba(245,240,232,0.5);
}
.coming-soon {
  position: absolute; bottom: -1px; left: 0; right: 0;
  font-family: 'Cinzel', serif; font-size: 6px; letter-spacing: 0.14em;
  text-align: center; text-transform: uppercase;
  color: rgba(141,184,212,0.4); padding-bottom: 4px;
}

.card-kanji {
  font-family: serif; font-size: 24px; line-height: 1; margin-bottom: 7px;
  color: rgba(141,184,212,0.95); text-shadow: 0 0 20px rgba(141,184,212,0.32);
}
.card-name {
  font-family: 'Cinzel', serif; font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(141,184,212,0.85); margin-bottom: 3px;
}
.card-desc {
  font-family: 'Crimson Pro', serif; font-size: 8.5px; font-style: italic;
  color: rgba(245,240,232,0.38); line-height: 1.3;
}

/* ── Nav bar ── */
.nav-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 32px;
  display: flex; align-items: center; padding: 0 16px;
  background: rgba(8,8,20,0.38); backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 0.5px solid rgba(245,240,232,0.05); z-index: 30;
}
.nav-back {
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.12em;
  color: rgba(245,240,232,0.3); cursor: pointer; width: 70px;
  text-decoration: none; transition: color 0.2s;
}
.nav-back:hover { color: rgba(245,240,232,0.6); }
.nav-title {
  flex: 1; text-align: center;
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.18em;
  color: rgba(141,184,212,0.38); text-transform: uppercase;
}
.nav-right {
  width: 70px; text-align: right;
  font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.12em;
  color: rgba(245,240,232,0.2);
  display: flex; align-items: center; justify-content: flex-end; gap: 5px;
}
.aura-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(122,184,154,0.5); box-shadow: 0 0 6px rgba(122,184,154,0.4);
  animation: auraPulse 3s ease-in-out infinite;
}
@keyframes auraPulse {
  0%,100% { box-shadow: 0 0 6px rgba(122,184,154,0.3); }
  50%      { box-shadow: 0 0 12px rgba(122,184,154,0.6); }
}

/* ── iPad overrides ── */
.frame.ipad .disc-kanji  { font-size: 52px; }
.frame.ipad .disc-title  { font-size: 15px; }
.frame.ipad .disc-mantra { font-size: 13px; margin-top: 4px; }
.frame.ipad .disc-header { padding: 28px 36px 0; gap: 6px; }
.frame.ipad .hub-cards   { bottom: 80px; }
.frame.ipad .hub-card    { width: 190px; padding: 22px 16px 18px; border-radius: 8px; }
.frame.ipad .card-kanji  { font-size: 40px; margin-bottom: 12px; }
.frame.ipad .card-name   { font-size: 13px; margin-bottom: 5px; }
.frame.ipad .card-desc   { font-size: 12px; }
.frame.ipad .nav-bar     { height: 48px; padding: 0 28px; }
.frame.ipad .nav-back,
.frame.ipad .nav-title,
.frame.ipad .nav-right   { font-size: 12px; }
.frame.ipad .nav-back,
.frame.ipad .nav-right   { width: 100px; }

/* ── Dev controls ── */
.controls {
  position: fixed; bottom: 0; left: 0; right: 0; height: 40px;
  background: rgba(8,8,14,0.92); border-top: 0.5px solid rgba(245,240,232,0.06);
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 0 12px; z-index: 100;
}
.ctrl-btn {
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.08em;
  padding: 5px 10px; border-radius: 4px;
  border: 0.5px solid rgba(245,240,232,0.1); background: rgba(245,240,232,0.03);
  color: rgba(245,240,232,0.4); cursor: pointer; transition: all 0.2s;
}
.ctrl-btn:hover  { background: rgba(245,240,232,0.06); color: rgba(245,240,232,0.65); }

<script>
function setDevice(type) {
  document.getElementById('frame').className = 'frame ' + type;
  document.getElementById('btn-iphone').classList.toggle('active', type === 'iphone');
  document.getElementById('btn-ipad').classList.toggle('active', type === 'ipad');
  resizeCanvas();
}

/* ── Particle system ── */
var particlesOn = true;
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var particles = [];

function resizeCanvas() {
  var frame = document.getElementById('frame');
  canvas.width  = frame.offsetWidth;
  canvas.height = frame.offsetHeight;
}

function Particle() { this.reset(); }
Particle.prototype.reset = function() {
  this.x = Math.random() * canvas.width;
  this.y = canvas.height + 4;
  this.size  = 0.6 + Math.random() * 1.4;
  this.speed = 0.2 + Math.random() * 0.5;
  this.drift = (Math.random() - 0.5) * 0.3;
  this.life  = 0;
  this.maxLife = 180 + Math.random() * 180;
  var blues = [[141,184,212],[160,200,230],[120,160,210],[180,210,240]];
  this.color = blues[Math.floor(Math.random() * blues.length)];
};
Particle.prototype.update = function() {
  this.y -= this.speed; this.x += this.drift; this.life += 1;
};
Particle.prototype.draw = function() {
  var prog = this.life / this.maxLife;
  var opacity = prog < 0.1 ? prog / 0.1 : prog > 0.8 ? (1 - prog) / 0.2 : 1;
  opacity *= 0.45;
  var c = this.color;
  ctx.beginPath();
  ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + opacity + ')';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + (opacity * 0.2) + ')';
  ctx.fill();
};

for (var i = 0; i < 40; i++) {
  var p = new Particle();
  p.y = Math.random() * canvas.height;
  p.life = Math.random() * p.maxLife;
  particles.push(p);
}

function animateParticles() {
  if (!particlesOn) { requestAnimationFrame(animateParticles); return; }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (var i = 0; i < particles.length; i++) {
    if (particles[i].life >= particles[i].maxLife) particles[i].reset();
    particles[i].update();
    particles[i].draw();
  }
  requestAnimationFrame(animateParticles);
}
resizeCanvas();
animateParticles();

/* ── Dev toggles ── */
function toggleParticles(btn) {
  particlesOn = !particlesOn;
  if (!particlesOn) ctx.clearRect(0, 0, canvas.width, canvas.height);
  btn.classList.toggle('active', particlesOn);
}
function toggleHeader(btn) {
  var el = document.getElementById('disc-header');
  var on = el.style.opacity !== '0';
  el.style.opacity = on ? '0' : '1';
  btn.classList.toggle('active', !on);
}
function toggleNav(btn) {
  var el = document.getElementById('nav-bar');
  var on = el.style.display !== 'none';
  el.style.display = on ? 'none' : 'flex';
  btn.classList.toggle('active', !on);
}
</script>
