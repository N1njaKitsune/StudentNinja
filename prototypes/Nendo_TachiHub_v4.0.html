.env-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%);
  z-index: 2;
  pointer-events: none;
}

.env-texture {
  position: absolute; inset: 0;
  background: none;
  opacity: 0.025;
  z-index: 3;
  pointer-events: none;
}

/* ── Particle Canvas ── */
#particle-canvas {
  position: absolute; inset: 0;
  z-index: 4;
  pointer-events: none;
}

/* ── UI Layer ── */
.ui-layer {
  position: absolute; inset: 0;
  z-index: 10;
}

/* ── Discipline Header ── */
.disc-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 20px 32px 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.disc-kanji {
  font-family: serif;
  font-size: 38px;
  line-height: 1;
  color: rgba(212,130,106,1);
  text-shadow: 0 0 30px rgba(212,130,106,0.5), 0 0 60px rgba(212,130,106,0.25);
  letter-spacing: 0.04em;
}

.disc-title {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.2em;
  color: rgba(240,235,224,0.8);
  text-transform: uppercase;
}

.disc-mantra {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 10.5px;
  color: rgba(212,130,106,0.55);
  letter-spacing: 0.04em;
  max-width: 480px;
}

/* ── Hub Cards ── */
.hub-cards {
  position: absolute;
  bottom: 52px; left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 0 24px;
}

.hub-card {
  position: relative;
  flex: 1;
  max-width: 168px;
  background: rgba(8,6,4,0.52);
  border: 1px solid rgba(212,130,106,0.22);
  border-top: 2px solid rgba(212,130,106,0.55);
  border-radius: 6px;
  padding: 14px 12px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  backdrop-filter: blur(6px);
  animation: cardFloat 5s ease-in-out infinite;
}

.hub-card:nth-child(1) { animation-delay: 0s; }
.hub-card:nth-child(2) { animation-delay: 0.7s; }
.hub-card:nth-child(3) { animation-delay: 1.4s; }
.hub-card:nth-child(4) { animation-delay: 2.1s; }

@keyframes cardFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-4px); }
}

/* ── All cards locked ── */
.hub-card.locked {
  opacity: 0.35;
  cursor: not-allowed;
  pointer-events: none;
  animation: none;
  filter: grayscale(0.3);
}

.lock-icon {
  position: absolute;
  top: 6px; right: 8px;
  font-size: 9px;
  opacity: 0.7;
}

.card-kanji {
  font-family: serif;
  font-size: 28px;
  line-height: 1;
  margin-bottom: 6px;
  color: rgba(212,130,106,0.9);
  text-shadow: 0 0 18px rgba(212,130,106,0.3);
}

<script>
/* ── Particle System — warm ember drifts ── */
(function(){
  var canvas = document.getElementById('particle-canvas');
  var ctx    = canvas.getContext('2d');
  var W = 844, H = 390;
  var MOTE_COUNT = 20;
  var motes = [];

  function rand(a, b){ return a + Math.random() * (b - a); }

  function makeMote(){
    return {
      x:     rand(0, W),
      y:     rand(H * 0.25, H),
      vy:    rand(-0.22, -0.07),
      vx:    rand(-0.06, 0.06),
      r:     rand(0.5, 1.5),
      life:  rand(0, 1),
      speed: rand(0.003, 0.007)
    };
  }

  for(var i = 0; i < MOTE_COUNT; i++){
    motes.push(makeMote());
    motes[i].life = Math.random();
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    motes.forEach(function(m){
      m.life += m.speed;
      if(m.life > 1){ Object.assign(m, makeMote()); m.life = 0; }

      var alpha = m.life < 0.15 ? m.life / 0.15 :
                  m.life > 0.75 ? 1 - (m.life - 0.75) / 0.25 : 1;
      alpha *= 0.4;

      m.x += m.vx;
      m.y += m.vy;

      var grad = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r * 2.5);
      grad.addColorStop(0, 'rgba(212,130,106,' + alpha + ')');
      grad.addColorStop(1, 'rgba(212,130,106,0)');

      ctx.beginPath();
      ctx.arc(m.x, m.y, m.r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
