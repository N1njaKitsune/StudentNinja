<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiho Box-Breathing Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050508;
            color: #F5F0E8;
            font-family: 'Cinzel', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            max-width: 1400px;
        }

        /* Device Frame */
        .device-frame {
            width: 844px;
            height: 390px;
            background-color: #0A0A12;
            border: 0.5px solid rgba(245, 240, 232, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .breathing-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(245, 240, 232, 0);
            transition: background-color 0.3s ease;
            pointer-events: none;
        }

        .breathing-content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Canvas for animations */
        #shihoCanvas {
            display: block;
        }

        /* Control Panel */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: rgba(10, 10, 18, 0.4);
            backdrop-filter: blur(16px);
            border: 0.5px solid rgba(245, 240, 232, 0.1);
            border-radius: 12px;
            padding: 24px;
            min-width: 220px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(245, 240, 232, 0.6);
        }

        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 12px;
            background-color: rgba(122, 184, 154, 0.15);
            border: 0.5px solid rgba(122, 184, 154, 0.3);
            border-radius: 6px;
            color: #F5F0E8;
            font-family: 'Cinzel', serif;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        button:hover {
            background-color: rgba(122, 184, 154, 0.25);
            border-color: rgba(122, 184, 154, 0.5);
        }

        button.active {
            background-color: rgba(122, 184, 154, 0.4);
            border-color: rgba(122, 184, 154, 0.7);
            box-shadow: 0 0 12px rgba(122, 184, 154, 0.2);
        }

        .button-primary {
            background-color: rgba(122, 184, 154, 0.25);
            border: 0.5px solid rgba(122, 184, 154, 0.5);
            padding: 10px 16px;
            font-size: 12px;
            width: 100%;
        }

        .button-primary:hover {
            background-color: rgba(122, 184, 154, 0.35);
        }

        .info-display {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            background: rgba(122, 184, 154, 0.05);
            border: 0.5px solid rgba(122, 184, 154, 0.15);
            border-radius: 6px;
            font-size: 11px;
        }

        .info-label {
            color: rgba(245, 240, 232, 0.5);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-value {
            color: #F5F0E8;
            font-weight: 600;
        }

        .completion-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Crimson Pro', serif;
            font-size: 24px;
            color: rgba(245, 240, 232, 0);
            font-style: italic;
            text-align: center;
            z-index: 20;
            pointer-events: none;
            animation: fadeInOut 3s ease-in-out;
        }

        @keyframes fadeInOut {
            0%, 100% { color: rgba(245, 240, 232, 0); }
            20%, 80% { color: rgba(245, 240, 232, 0.7); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Device Frame -->
        <div class="device-frame">
            <div class="breathing-overlay" id="breathingOverlay"></div>
            <div class="breathing-content">
                <canvas id="shihoCanvas" width="844" height="390"></canvas>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="control-group">
                <div class="control-label">Session</div>
                <button class="button-primary" id="startPauseBtn">Start Breathing</button>
            </div>

            <div class="control-group">
                <div class="control-label">Speed</div>
                <div class="button-group">
                    <button class="speed-btn" data-speed="slow">Slow (5s)</button>
                    <button class="speed-btn active" data-speed="normal">Normal (4s)</button>
                    <button class="speed-btn" data-speed="fast">Fast (3s)</button>
                </div>
            </div>

            <div class="control-group">
                <div class="control-label">Rounds</div>
                <div class="button-group">
                    <button class="rounds-btn active" data-rounds="1">1</button>
                    <button class="rounds-btn" data-rounds="3">3</button>
                    <button class="rounds-btn" data-rounds="5">5</button>
                </div>
            </div>

            <div class="info-display">
                <div class="info-label">Current Round</div>
                <div class="info-value" id="roundInfo">—</div>
                <div class="info-label" style="margin-top: 6px;">Phase</div>
                <div class="info-value" id="phaseInfo">—</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('shihoCanvas');
        const ctx = canvas.getContext('2d');
        const breathingOverlay = document.getElementById('breathingOverlay');
        const startPauseBtn = document.getElementById('startPauseBtn');
        const roundInfo = document.getElementById('roundInfo');
        const phaseInfo = document.getElementById('phaseInfo');

        // State
        let isRunning = false;
        let phaseIndex = 0;
        let roundIndex = 1;
        let totalRounds = 1;
        let phaseTime = 0;
        let phaseDuration = 4000; // milliseconds
        let totalCycles = 0;
        let startTime = 0;

        const phases = [
            { name: 'breathe in', action: 'inhale' },
            { name: 'hold', action: 'hold-inhale' },
            { name: 'breathe out', action: 'exhale' },
            { name: 'hold', action: 'hold-exhale' }
        ];

        // Speed settings
        const speeds = {
            slow: 5000,
            normal: 4000,
            fast: 3000
        };

        let currentSpeed = 'normal';

        // Event Listeners
        startPauseBtn.addEventListener('click', toggleBreathing);

        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentSpeed = e.target.dataset.speed;
                phaseDuration = speeds[currentSpeed];
                if (isRunning) {
                    phaseTime = 0;
                }
            });
        });

        document.querySelectorAll('.rounds-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.rounds-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                totalRounds = parseInt(e.target.dataset.rounds);
                if (!isRunning) {
                    roundIndex = 1;
                    phaseIndex = 0;
                    updateInfo();
                }
            });
        });

        function toggleBreathing() {
            isRunning = !isRunning;
            startPauseBtn.textContent = isRunning ? 'Pause' : 'Start Breathing';
            if (isRunning) {
                startTime = Date.now() - phaseTime;
                animate();
            }
        }

        function updateInfo() {
            roundInfo.textContent = `Round ${roundIndex} of ${totalRounds}`;
            phaseInfo.textContent = phases[phaseIndex].name;
        }

        function getSquareScale() {
            const phase = phases[phaseIndex];
            const progress = phaseTime / phaseDuration;

            if (phase.action === 'inhale') {
                return 1 + progress * 0.3; // Expand
            } else if (phase.action === 'hold-inhale') {
                return 1.3; // Stay expanded
            } else if (phase.action === 'exhale') {
                return 1.3 - progress * 0.4; // Contract
            } else {
                return 0.9; // Stay contracted
            }
        }

        function getOverlayBrightness() {
            const phase = phases[phaseIndex];
            const progress = phaseTime / phaseDuration;

            if (phase.action === 'inhale') {
                return progress * 0.02;
            } else if (phase.action === 'hold-inhale') {
                return 0.02;
            } else if (phase.action === 'exhale') {
                return Math.max(0, 0.02 - progress * 0.02);
            } else {
                return 0;
            }
        }

        function drawSquare(centerX, centerY, size, scale) {
            const halfSize = size * scale / 2;

            // Draw glow
            const gradient = ctx.createRadialGradient(centerX, centerY, halfSize - 10, centerX, centerY, halfSize + 30);
            gradient.addColorStop(0, 'rgba(122, 184, 154, 0.3)');
            gradient.addColorStop(0.5, 'rgba(122, 184, 154, 0.1)');
            gradient.addColorStop(1, 'rgba(122, 184, 154, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(centerX - halfSize - 30, centerY - halfSize - 30, halfSize * 2 + 60, halfSize * 2 + 60);

            // Draw square lines
            ctx.strokeStyle = 'rgba(122, 184, 154, 0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(centerX - halfSize, centerY - halfSize, halfSize * 2, halfSize * 2);

            // Draw corner circles
            const corners = [
                { x: centerX - halfSize, y: centerY - halfSize }, // top-left
                { x: centerX + halfSize, y: centerY - halfSize }, // top-right
                { x: centerX + halfSize, y: centerY + halfSize }, // bottom-right
                { x: centerX - halfSize, y: centerY + halfSize }  // bottom-left
            ];

            corners.forEach((corner, idx) => {
                ctx.fillStyle = idx === phaseIndex ? 'rgba(122, 184, 154, 0.6)' : 'rgba(122, 184, 154, 0.2)';
                ctx.beginPath();
                ctx.arc(corner.x, corner.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawDot(centerX, centerY, size, scale) {
            const halfSize = size * scale / 2;
            const corners = [
                { x: centerX - halfSize, y: centerY - halfSize },
                { x: centerX + halfSize, y: centerY - halfSize },
                { x: centerX + halfSize, y: centerY + halfSize },
                { x: centerX - halfSize, y: centerY + halfSize }
            ];

            const progress = phaseTime / phaseDuration;
            const current = corners[phaseIndex];
            const next = corners[(phaseIndex + 1) % 4];

            const x = current.x + (next.x - current.x) * progress;
            const y = current.y + (next.y - current.y) * progress;

            // Glow effect
            const glowGradient = ctx.createRadialGradient(x, y, 0, x, y, 20);
            glowGradient.addColorStop(0, 'rgba(122, 184, 154, 0.8)');
            glowGradient.addColorStop(1, 'rgba(122, 184, 154, 0)');
            ctx.fillStyle = glowGradient;
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fill();

            // Dot
            ctx.fillStyle = 'rgba(122, 184, 154, 1)';
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPhaseLabel(centerX, centerY) {
            const phase = phases[phaseIndex];
            const countdown = Math.ceil((phaseDuration - phaseTime) / 1000);

            // Phase label
            ctx.font = 'italic 14px "Crimson Pro", serif';
            ctx.fillStyle = 'rgba(245, 240, 232, 0.5)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(phase.name, centerX, centerY - 10);

            // Countdown
            ctx.font = '10px "Cinzel", serif';
            ctx.fillStyle = 'rgba(245, 240, 232, 0.25)';
            ctx.fillText(countdown + '...', centerX, centerY + 15);
        }

        function animate() {
            if (!isRunning) return;

            phaseTime = Date.now() - startTime;

            // Clear canvas
            ctx.fillStyle = '#0A0A12';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update phase and round
            const cycleDuration = phaseDuration * 4;
            const totalTime = phaseTime;
            const cyclePosition = totalTime % cycleDuration;
            phaseIndex = Math.floor(cyclePosition / phaseDuration);
            roundIndex = Math.floor(totalTime / cycleDuration) + 1;

            // Draw animations
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const squareSize = 120;
            const scale = getSquareScale();

            drawSquare(centerX, centerY, squareSize, scale);
            drawDot(centerX, centerY, squareSize, scale);
            drawPhaseLabel(centerX, centerY);

            // Update breathing overlay
            const brightness = getOverlayBrightness();
            breathingOverlay.style.backgroundColor = `rgba(245, 240, 232, ${brightness})`;

            // Update info
            updateInfo();

            // Check completion
            if (roundIndex > totalRounds) {
                isRunning = false;
                startPauseBtn.textContent = 'Start Breathing';
                phaseTime = 0;
                roundIndex = totalRounds;
                updateInfo();
                showCompletion();
                return;
            }

            requestAnimationFrame(animate);
        }

        function showCompletion() {
            const msg = document.createElement('div');
            msg.className = 'completion-message';
            msg.textContent = 'Breathing Complete';
            canvas.parentElement.appendChild(msg);
            setTimeout(() => msg.remove(), 3500);
        }

        updateInfo();
    </script>
</body>
</html>
